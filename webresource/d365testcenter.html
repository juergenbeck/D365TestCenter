// ================================================================
//  Demo-Metadata-Loader: Externe JSON-Dateien für Demo-Metadaten
// ================================================================
// Demo-Metadaten (zusätzliche Entities und Attribute) werden aus
// packs/demo-*.json geladen und in _sharedIttMeta gemerged.
// So kann jedes Projekt eigene Demo-Metadaten mitliefern.

async function _loadDemoMetadata() {
    const demoFiles = ["packs/demo-standard.json"];
    for (const file of demoFiles) {
        try {
            const resp = await fetch(file);
            if (!resp.ok) continue;
            const data = await resp.json();
            // Merge additional entities
            if (data.additionalEntities) {
                for (const ent of data.additionalEntities) {
                    if (!_sharedIttMeta.entities.find(e => e.LogicalName === ent.LogicalName)) {
                        _sharedIttMeta.entities.push(ent);
                    }
                }
            }
            // Merge additional attributes
            if (data.additionalAttributes) {
                for (const [entity, attrs] of Object.entries(data.additionalAttributes)) {
                    if (!_sharedIttMeta.attributes[entity]) {
                        _sharedIttMeta.attributes[entity] = attrs;
                    } else {
                        const existing = new Set(_sharedIttMeta.attributes[entity].map(a => a.LogicalName));
                        for (const attr of attrs) {
                            if (!existing.has(attr.LogicalName)) {
                                _sharedIttMeta.attributes[entity].push(attr);
                            }
                        }
                    }
                }
            }
            JBELog.info("DemoMeta", "Loaded: " + file + " (" + (data.additionalEntities?.length || 0) + " entities, " + Object.keys(data.additionalAttributes || {}).length + " entity attributes)");
        } catch (e) {
            // Silently skip if file not found (e.g. in live mode)
        }
    }
}

// ================================================================
//  Pack-Loader: Externe JSON-Dateien
// ================================================================
// Packs werden dynamisch aus packs/*.json geladen statt hardcodiert.
// _sharedIttMeta wird mit den Pack-spezifischen Attributen zusammengeführt.

const DemoPacks = {};
let DemoData = null;
let _packsManifest = null;

const PackLoader = {
    _basePath: "packs/",
    _loaded: {},

    // Resolve "$date:daysAgo,hour,minute" templates to ISO strings
    _resolveDate(val) {
        if (typeof val !== "string" || !val.startsWith("$date:")) return val;
        const parts = val.slice(6).split(",").map(Number);
        const d = new Date();
        d.setDate(d.getDate() - (parts[0] || 0));
        d.setHours(parts[1] || 10, parts[2] || 30, parts[3] || 0, 0);
        return d.toISOString();
    },

    // Recursively resolve $date: templates in an object
    _resolveDates(obj) {
        if (Array.isArray(obj)) return obj.map(v => this._resolveDates(v));
        if (obj && typeof obj === "object") {
            const result = {};
            for (const [k, v] of Object.entries(obj)) {
                result[k] = this._resolveDates(v);
            }
            return result;
        }
        if (typeof obj === "string" && obj.startsWith("$date:")) return this._resolveDate(obj);
        return obj;
    },

    // Map generic pack OptionSet values (100000000-based) to CONFIG values
    _optionSetMap: null,
    _getOptionSetMap() {
        if (this._optionSetMap) return this._optionSetMap;
        const base = CONFIG.optionSetBase; // 100570000
        if (base === 100000000) { this._optionSetMap = {}; return this._optionSetMap; }
        const m = {};
        for (let i = 0; i <= 8; i++) m[100000000 + i] = base + i;
        this._optionSetMap = m;
        return m;
    },

    // Remap OptionSet fields in records from pack-generic to CONFIG values
    _remapOptionSets(records, fields) {
        const map = this._getOptionSetMap();
        if (!Object.keys(map).length) return records;
        for (const rec of records) {
            for (const f of fields) {
                if (rec[f] != null && map[rec[f]] != null) {
                    rec[f] = map[rec[f]];
                }
            }
        }
        return records;
    },

    // Hydrate a loaded JSON pack into the runtime format
    _hydrate(pack) {
        // Stringify jbe_definitionjson objects
        if (pack.testCases) {
            for (const tc of pack.testCases) {
                if (tc.jbe_definitionjson && typeof tc.jbe_definitionjson === "object") {
                    tc.jbe_definitionjson = JSON.stringify(tc.jbe_definitionjson);
                }
            }
        }
        // Resolve date templates
        if (pack.testRuns) pack.testRuns = this._resolveDates(pack.testRuns);
        if (pack.testRunResults) pack.testRunResults = this._resolveDates(pack.testRunResults);
        // Remap OptionSet values from generic (100000000-based) to CONFIG values
        if (pack.testCases) this._remapOptionSets(pack.testCases, ["jbe_category"]);
        if (pack.testRuns) this._remapOptionSets(pack.testRuns, ["jbe_teststatus"]);
        if (pack.testRunResults) this._remapOptionSets(pack.testRunResults, ["jbe_outcome"]);
        return pack;
    },

    // Load manifest
    async loadManifest() {
        if (_packsManifest) return _packsManifest;
        try {
            const resp = await fetch(this._basePath + "manifest.json");
            if (!resp.ok) throw new Error("Manifest not found");
            _packsManifest = await resp.json();
            return _packsManifest;
        } catch (e) {
            console.warn("Pack-Manifest konnte nicht geladen werden, verwende Fallback:", e.message);
            return null;
        }
    },

    // Load a single pack by ID
    async loadPack(packId) {
        if (DemoPacks[packId]) return DemoPacks[packId];

        const manifest = await this.loadManifest();
        const entry = manifest?.packs?.find(p => p.packId === packId);
        const file = entry?.file || (packId + ".json");

        try {
            const resp = await fetch(this._basePath + file);
            if (!resp.ok) throw new Error("Pack '" + packId + "' not found: " + resp.status);
            const raw = await resp.json();
            const pack = this._hydrate(raw);
            DemoPacks[packId] = pack;
            return pack;
        } catch (e) {
            console.error("Pack-Laden fehlgeschlagen:", e.message);
            return null;
        }
    },

    // Load all packs from manifest
    async loadAll() {
        const manifest = await this.loadManifest();
        if (!manifest?.packs) return;
        await Promise.all(manifest.packs.map(p => this.loadPack(p.packId)));
        // Set default
        const defaultPack = manifest.packs.find(p => p.default)?.packId || manifest.packs[0]?.packId;
        if (defaultPack && DemoPacks[defaultPack]) {
            DemoData = DemoPacks[defaultPack];
        }
    },

    // Get available pack IDs (from manifest or already loaded)
    async getAvailablePacks() {
        const manifest = await this.loadManifest();
        if (manifest?.packs) {
            return manifest.packs.map(p => ({
                packId: p.packId,
                name: DemoPacks[p.packId]?.name || p.name || p.packId,
                loaded: !!DemoPacks[p.packId]
            }));
        }
        return Object.keys(DemoPacks).map(k => ({ packId: k, name: DemoPacks[k].name, loaded: true }));
    }
};


// ── ITT Logger ──────────────────────────────────────────────────

const JBELog = {
    _enabled: true,
    _prefix: "[ITT]",
    _startTime: performance.now(),

    info(area, msg, data) {
        if (!this._enabled) return;
        const t = ((performance.now() - this._startTime) / 1000).toFixed(1);
        if (data !== undefined) console.log(`${this._prefix} ${t}s [${area}] ${msg}`, data);
        else console.log(`${this._prefix} ${t}s [${area}] ${msg}`);
    },
    warn(area, msg, data) {
        if (data !== undefined) console.warn(`${this._prefix} [${area}] ${msg}`, data);
        else console.warn(`${this._prefix} [${area}] ${msg}`);
    },
    error(area, msg, data) {
        if (data !== undefined) console.error(`${this._prefix} [${area}] ${msg}`, data);
        else console.error(`${this._prefix} [${area}] ${msg}`);
    },
    group(label) { if (this._enabled) console.groupCollapsed(`${this._prefix} ${label}`); },
    groupEnd() { if (this._enabled) console.groupEnd(); },
    table(data) { if (this._enabled && data) console.table(data); }
};

// ── Mock API ────────────────────────────────────────────────────
// Intercepts API calls and serves DemoData when running outside CRM.

const MockAPI = {
    // Aktuell aktives Pack
    currentPack: "standard",

    // In-memory mutable store (initialized from active DemoPack on activation)
    _store: null,

    async _init() {
        if (this._store) return;
        await this._reinitStore();
    },

    async _reinitStore() {
        let pack = DemoPacks[this.currentPack];
        if (!pack) pack = await PackLoader.loadPack(this.currentPack);
        if (!pack) pack = DemoPacks["standard"];
        DemoData = pack; // Alias aktualisieren
        this._store = {
            testcases: JSON.parse(JSON.stringify(pack.testCases || [])),
            testruns: JSON.parse(JSON.stringify(pack.testRuns || [])),
            testrunresults: JSON.parse(JSON.stringify(pack.testRunResults || []))
        };
    },

    async switchPack(packName) {
        const pack = await PackLoader.loadPack(packName);
        if (!pack) return;
        this.currentPack = packName;
        this._store = null;
        await this._reinitStore();
        // MetaCache leeren damit neue Metadaten geladen werden
        MetaCache.entities = null;
        MetaCache.attributes = {};
        MetaCache.optionSets = null;
        MetaCache.customApis = null;
        // Pack-Indikator aktualisieren
        updatePackIndicator();
        // Aktuelle View neu laden
        handleRoute();
    },

    _uuid() {
        return "xxxxxxxx-xxxx-4xxx-8xxx-xxxxxxxxxxxx".replace(/[x]/g, () => (Math.random()*16|0).toString(16));
    },

    // Parses OData-style $filter into a simple predicate function
    _parseFilter(filterStr, collection) {
        if (!filterStr) return collection;
        // Handle "contains(field,'value')"
        const containsMatch = filterStr.match(/contains\((\w+),'([^']+)'\)/);
        if (containsMatch) {
            const field = containsMatch[1];
            const val = containsMatch[2];
            return collection.filter(r => (r[field] || "").toLowerCase().includes(val.toLowerCase()));
        }
        // Handle "field eq 'value'" or "field eq number"
        const eqMatch = filterStr.match(/(\w+)\s+eq\s+'?([^'&$]+?)'?(?:\s|$|&)/);
        if (eqMatch) {
            const field = eqMatch[1];
            const val = eqMatch[2];
            return collection.filter(r => String(r[field]) === val || String(r[field]) === val.replace(/'/g, ""));
        }
        // Handle "_field_value eq 'value'"
        const lookupMatch = filterStr.match(/_(\w+)_value\s+eq\s+'([^']+)'/);
        if (lookupMatch) {
            const field = "_" + lookupMatch[1] + "_value";
            const val = lookupMatch[2];
            return collection.filter(r => r[field] === val);
        }
        // Handle "field eq number" (e.g., jbe_outcome eq 100000001)
        const numMatch = filterStr.match(/(\w+)\s+eq\s+(\d+)/);
        if (numMatch) {
            const field = numMatch[1];
            const val = parseInt(numMatch[2]);
            return collection.filter(r => r[field] === val);
        }
        // Multiple conditions with " and "
        if (filterStr.includes(" and ")) {
            const parts = filterStr.split(" and ");
            let result = collection;
            for (const part of parts) {
                result = this._parseFilter(part.trim(), result);
            }
            return result;
        }
        return collection;
    },

    // Parses $orderby and sorts
    _applyOrderBy(collection, orderBy) {
        if (!orderBy) return collection;
        const match = orderBy.match(/(\w+)\s+(asc|desc)/);
        if (!match) return collection;
        const field = match[1];
        const dir = match[2] === "desc" ? -1 : 1;
        return [...collection].sort((a, b) => {
            const va = a[field], vb = b[field];
            if (va == null && vb == null) return 0;
            if (va == null) return dir;
            if (vb == null) return -dir;
            if (typeof va === "number" && typeof vb === "number") return (va - vb) * dir;
            return String(va).localeCompare(String(vb)) * dir;
        });
    },

    // Main fetch handler
    async fetch(url, options) {
        await this._init();
        const method = (options?.method || "GET").toUpperCase();
        const body = options?.body ? JSON.parse(options.body) : null;

        // WhoAmI
        if (url === "/WhoAmI") {
            return { UserId: "d0d0d0d0-demo-4000-8000-000000000000" };
        }

        // systemusers
        if (url.includes("/systemusers(")) {
            return { fullname: "Demo User", systemuserid: "d0d0d0d0-demo-4000-8000-000000000000" };
        }

        // EntityDefinitions
        if (url.startsWith("/EntityDefinitions")) {
            return this._handleEntityDefinitions(url);
        }

        // GlobalOptionSetDefinitions
        if (url.startsWith("/GlobalOptionSetDefinitions")) {
            return this._handleOptionSets(url);
        }

        // Custom APIs
        if (url.startsWith("/customapis")) {
            return { value: _sharedIttMeta.customapis };
        }

        // Custom Actions
        if (url.startsWith("/jbe_RunIntegrationTests") || url.startsWith("/jbe_GovernanceApi") || url.startsWith("/jbe_AssertEnvironment")) {
            return {};
        }

        // Entity collections
        const collMatch = url.match(/^\/(\w+)/);
        if (!collMatch) throw new Error("MockAPI: Unknown URL " + url);
        const entitySet = collMatch[1];

        // Single record by ID: /entity(guid)
        const singleMatch = url.match(/^\/(\w+)\(([^)]+)\)/);
        if (singleMatch && method === "GET") {
            return this._getOne(singleMatch[1], singleMatch[2]);
        }
        if (singleMatch && method === "PATCH") {
            return this._update(singleMatch[1], singleMatch[2], body);
        }
        if (singleMatch && method === "DELETE") {
            return this._delete(singleMatch[1], singleMatch[2]);
        }

        // Collection GET with query
        if (method === "GET") {
            return this._getMany(entitySet, url);
        }

        // Collection POST (Create)
        if (method === "POST") {
            return this._create(entitySet, body);
        }

        throw new Error("MockAPI: Unhandled " + method + " " + url);
    },

    _getCollection(entitySet) {
        if (entitySet === "jbe_testcases") return this._store.testcases;
        if (entitySet === "jbe_testruns") return this._store.testruns;
        if (entitySet === "jbe_testrunresults") return this._store.testrunresults;
        if (entitySet === "jbe_teststeps") {
            if (!this._store.teststeps) this._store.teststeps = [];
            return this._store.teststeps;
        }
        // Dynamic collections for Engine (contacts, accounts, leads, etc.)
        if (!this._store._dynamic) this._store._dynamic = {};
        if (!this._store._dynamic[entitySet]) this._store._dynamic[entitySet] = [];
        return this._store._dynamic[entitySet];
    },

    _getIdField(entitySet) {
        if (entitySet === "jbe_testcases") return "jbe_testcaseid";
        if (entitySet === "jbe_testruns") return "jbe_testrunid";
        if (entitySet === "jbe_testrunresults") return "jbe_testrunresultid";
        return entitySet.replace(/s$/, "") + "id";
    },

    _getOne(entitySet, id) {
        const coll = this._getCollection(entitySet);
        const idField = this._getIdField(entitySet);
        const item = coll.find(r => r[idField] === id);
        if (!item) throw new Error("MockAPI: Record not found " + entitySet + "(" + id + ")");
        return { ...item };
    },

    _getMany(entitySet, url) {
        let coll = [...this._getCollection(entitySet)];
        const params = new URLSearchParams(url.split("?")[1] || "");
        const filter = params.get("$filter");
        const orderby = params.get("$orderby");
        const top = params.get("$top");
        const countRequested = params.has("$count") || url.includes("$count=true");

        if (filter) coll = this._parseFilter(filter, coll);
        if (orderby) coll = this._applyOrderBy(coll, orderby);

        const totalCount = coll.length;
        if (top) coll = coll.slice(0, parseInt(top));

        const result = { value: coll };
        if (countRequested) result["@odata.count"] = totalCount;
        return result;
    },

    _create(entitySet, data) {
        this._init();
        const idField = this._getIdField(entitySet);
        const newId = this._uuid();
        const record = { ...data, [idField]: newId, createdon: new Date().toISOString() };
        const coll = this._getCollection(entitySet);
        coll.push(record);

        return { ...record };
    },

    _update(entitySet, id, data) {
        const coll = this._getCollection(entitySet);
        const idField = this._getIdField(entitySet);
        const idx = coll.findIndex(r => r[idField] === id);
        if (idx >= 0) Object.assign(coll[idx], data);
        return null;
    },

    _delete(entitySet, id) {
        const coll = this._getCollection(entitySet);
        const idField = this._getIdField(entitySet);
        const idx = coll.findIndex(r => r[idField] === id);
        if (idx >= 0) coll.splice(idx, 1);
        return null;
    },

    // EntityDefinitions handler
    _handleEntityDefinitions(url) {
        const pack = DemoPacks[this.currentPack] || DemoPacks["standard"];
        const packMeta = pack.metadata || {};
        // Gemeinsame ITT-Entities + Pack-spezifische Entities zusammenführen
        const allEntities = [...(packMeta.entities || []), ..._sharedIttMeta.entities];
        // Shared + Pack-Attribute zusammenführen (nicht überschreiben, sondern konkatenieren)
        const allAttributes = { ..._sharedIttMeta.attributes };
        for (const [key, packAttrs] of Object.entries(packMeta.attributes || {})) {
            if (allAttributes[key]) {
                // Pack-Attribute ergänzen, Duplikate (gleicher LogicalName) vermeiden
                const existing = new Set(allAttributes[key].map(a => a.LogicalName));
                allAttributes[key] = [...allAttributes[key], ...packAttrs.filter(a => !existing.has(a.LogicalName))];
            } else {
                allAttributes[key] = packAttrs;
            }
        }

        // Single entity attributes: /EntityDefinitions(LogicalName='...')/Attributes
        const attrMatch = url.match(/EntityDefinitions\(LogicalName='(\w+)'\)\/Attributes/);
        if (attrMatch) {
            const entityName = attrMatch[1];
            const attrs = allAttributes[entityName] || [];
            return { value: attrs };
        }
        // Picklist metadata: ...Attributes(LogicalName='...')/Microsoft.Dynamics.CRM.PicklistAttributeMetadata
        const picklistMatch = url.match(/Attributes\(LogicalName='(\w+)'\)\/Microsoft\.Dynamics\.CRM\.PicklistAttributeMetadata/);
        if (picklistMatch) {
            return { OptionSet: { Options: [] } };
        }
        // Entity list
        return { value: allEntities };
    },

    // OptionSets handler
    _handleOptionSets(url) {
        const pack = DemoPacks[this.currentPack] || DemoPacks["standard"];
        const packMeta = pack.metadata || {};
        const allOptionSets = [..._sharedIttMeta.optionsets, ...(packMeta.optionsets || [])];

        // Single OptionSet: /GlobalOptionSetDefinitions(Name='...')
        const singleMatch = url.match(/GlobalOptionSetDefinitions\(Name='(\w+)'\)/);
        if (singleMatch) {
            const name = singleMatch[1];
            const os = allOptionSets.find(o => o.Name === name);
            return os || { Name: name, Options: [] };
        }
        // All OptionSets
        return { value: allOptionSets };
    },

    // Wrapper methods matching the API interface
    async getMany(entity, query) {
        const data = await this.fetch("/" + entity + "?" + (query || ""));
        return data?.value || [];
    },

    async getOne(entity, id, select) {
        const q = select ? "?$select=" + select : "";
        return this.fetch("/" + entity + "(" + id + ")" + q);
    },

    async create(entity, data) {
        return this.fetch("/" + entity, { method: "POST", body: JSON.stringify(data) });
    },

    async update(entity, id, data) {
        return this.fetch("/" + entity + "(" + id + ")", { method: "PATCH", body: JSON.stringify(data) });
    },

    async del(entity, id) {
        return this.fetch("/" + entity + "(" + id + ")", { method: "DELETE" });
    },

    async executeAction(actionName, params) {
        return this.fetch("/" + actionName, { method: "POST", body: JSON.stringify(params || {}) });
    },

    async fetchXml(entity, xml) {
        // Return full collection for demo
        return this.getMany(entity, "");
    },

    async count(entity, filter) {
        const q = filter ? "$filter=" + filter + "&" : "";
        const data = await this.fetch("/" + entity + "?" + q + "$count=true&$top=1");
        return data?.["@odata.count"] || 0;
    }
};

// ── ApiThrottle: Globaler Semaphor fuer parallele Requests ─────

const ApiThrottle = {
    _maxConcurrent: 8,
    _active: 0,
    _queue: [],

    async acquire() {
        if (this._active < this._maxConcurrent) { this._active++; return; }
        return new Promise(resolve => this._queue.push(resolve));
    },

    release() {
        this._active--;
        if (this._queue.length > 0) { this._active++; this._queue.shift()(); }
    },

    async throttled(fn) {
        await this.acquire();
        try { return await fn(); } finally { this.release(); }
    }
};

// ── Dataverse API (mit Throttle + Retry) ────────────────────────

const API = {
    base: "/api/data/v9.2",
    _MAX_RETRIES: 3,

    // Shared retry logic for 429/503
    async _withRetry(label, doFetch) {
        let resp = await ApiThrottle.throttled(doFetch);
        let retries = 0;
        while ((resp.status === 429 || resp.status === 503) && retries < this._MAX_RETRIES) {
            retries++;
            const retryAfter = parseInt(resp.headers.get("Retry-After") || String(2 * retries), 10);
            JBELog.warn("API", `${label} -> ${resp.status}, Retry ${retries}/${this._MAX_RETRIES} nach ${retryAfter}s`);
            await new Promise(r => setTimeout(r, retryAfter * 1000));
            resp = await ApiThrottle.throttled(doFetch);
        }
        return resp;
    },

    async fetch(url, options) {
        const doFetch = () => window.fetch(this.base + url, {
            headers: {
                "Accept": "application/json",
                "OData-MaxVersion": "4.0",
                "OData-Version": "4.0",
                "Content-Type": "application/json",
                "Prefer": "odata.include-annotations=*",
                ...(options?.headers || {})
            },
            ...options
        });
        const resp = await this._withRetry(`GET ${url.substring(0,60)}`, doFetch);
        if (!resp.ok) {
            const err = await resp.text();
            throw new Error(`API ${resp.status}: ${err}`);
        }
        if (resp.status === 204) return null;
        return resp.json();
    },

    async getMany(entity, query) {
        const data = await this.fetch(`/${entity}?${query || ""}`);
        return data?.value || [];
    },

    async getOne(entity, id, select) {
        const q = select ? `?$select=${select}` : "";
        return this.fetch(`/${entity}(${id})${q}`);
    },

    async create(entity, data) {
        JBELog.info("API", `POST /${entity}`, data);
        const doFetch = () => window.fetch(this.base + `/${entity}`, {
            method: "POST",
            headers: {
                "Accept": "application/json",
                "OData-MaxVersion": "4.0",
                "OData-Version": "4.0",
                "Content-Type": "application/json",
                "Prefer": "return=representation"
            },
            body: JSON.stringify(data)
        });
        const resp = await this._withRetry(`POST /${entity}`, doFetch);
        if (!resp.ok) {
            const errBody = await resp.text();
            JBELog.error("API", `POST /${entity} -> ${resp.status}`, errBody.substring(0, 500));
            throw new Error(`Create ${entity} fehlgeschlagen (${resp.status}): ${errBody.substring(0, 200)}`);
        }
        const result = await resp.json();
        JBELog.info("API", `POST /${entity} -> 201 OK`);
        return result;
    },

    async update(entity, id, data) {
        JBELog.info("API", `PATCH /${entity}(${id})`, data);
        const doFetch = () => window.fetch(this.base + `/${entity}(${id})`, {
            method: "PATCH",
            headers: {
                "Accept": "application/json",
                "OData-MaxVersion": "4.0",
                "OData-Version": "4.0",
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });
        const resp = await this._withRetry(`PATCH /${entity}(${id})`, doFetch);
        if (!resp.ok) {
            const errBody = await resp.text();
            JBELog.error("API", `PATCH /${entity}(${id}) -> ${resp.status}`, errBody.substring(0, 500));
            throw new Error(`Update ${entity} fehlgeschlagen (${resp.status}): ${errBody.substring(0, 200)}`);
        }
    },

    async del(entity, id) {
        const doFetch = () => window.fetch(this.base + `/${entity}(${id})`, { method: "DELETE" });
        const resp = await this._withRetry(`DELETE /${entity}(${id})`, doFetch);
        if (!resp.ok) {
            const errBody = await resp.text();
            JBELog.error("API", `DELETE /${entity}(${id}) -> ${resp.status}`, errBody.substring(0, 500));
            throw new Error(`Delete ${entity} fehlgeschlagen (${resp.status}): ${errBody.substring(0, 200)}`);
        }
    },

    async executeAction(actionName, params) {
        return this.fetch(`/${actionName}`, {
            method: "POST",
            body: JSON.stringify(params || {})
        });
    },

    async fetchXml(entity, xml) {
        const encoded = encodeURIComponent(xml);
        return this.getMany(entity, `fetchXml=${encoded}`);
    },

    async count(entity, filter) {
        const q = filter ? `$filter=${filter}&` : "";
        const data = await this.fetch(`/${entity}?${q}$count=true&$top=1`);
        return data?.["@odata.count"] || 0;
    }
};

// ── PlaceholderResolver ─────────────────────────────────────────

const PlaceholderResolver = {
    _firstNames: ["Max","Sophie","Lukas","Anna","Felix","Marie","Leon","Laura","Paul","Lena",
        "Jonas","Sarah","Tim","Julia","Markus","Katharina","Stefan","Lisa","Thomas","Nina"],
    _lastNames: ["Mueller","Schmidt","Weber","Fischer","Meyer","Wagner","Becker","Schulz",
        "Hoffmann","Koch","Richter","Klein","Wolf","Neumann","Schwarz","Braun"],
    _cities: ["Stuttgart","Berlin","Hamburg","Muenchen","Koeln","Frankfurt","Offenburg","Pforzheim"],
    _suffix() { return Math.random().toString(36).substring(2, 6); },
    _pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; },
    _randInt(min, max) { return min + Math.floor(Math.random() * (max - min + 1)); },
    _phone555() { return String(this._randInt(0, 9999)).padStart(4, "0"); },

    resolve(value, aliasMap, context) {
        if (value == null) return value;
        if (typeof value === "number" || typeof value === "boolean") return value;
        if (Array.isArray(value)) return value.map(v => this.resolve(v, aliasMap, context));
        if (typeof value === "object") {
            const out = {};
            for (const [k, v] of Object.entries(value)) {
                out[k] = this.resolve(v, aliasMap, context);
            }
            return out;
        }
        if (typeof value !== "string") return value;
        // Replace all {PATTERN} occurrences
        return value.replace(/\{([^}]+)\}/g, (match, token) => {
            // GENERATED patterns
            if (token.startsWith("GENERATED:")) {
                const type = token.substring(10).toLowerCase();
                const sfx = this._suffix();
                switch (type) {
                    case "firstname":           return this._pick(this._firstNames) + "_" + sfx;
                    case "lastname":            return this._pick(this._lastNames) + "_" + sfx;
                    case "email":               return `test_${sfx}@itt-test.example.com`;
                    case "phone":               return `+49 711 555 ${this._phone555()}`;
                    case "mobile":              return `+49 170 555 ${this._phone555()}`;
                    case "phone_international": {
                        const prefixes = ["+44 20 7946","+1 555 012","+43 1 555","+41 44 555"];
                        return `${this._pick(prefixes)} ${this._phone555()}`;
                    }
                    case "company":             return `JBE Test GmbH ${sfx}`;
                    case "text":                return `JBE Test ${sfx}`;
                    case "guid":                return crypto.randomUUID ? crypto.randomUUID() : this._uuid();
                    case "number":              return String(this._randInt(1000, 9999));
                    case "city":                return this._pick(this._cities);
                    default:                    return `ITT_${sfx}`;
                }
            }
            // System placeholders
            if (token === "TIMESTAMP")           return new Date().toISOString();
            if (token === "TIMESTAMP_PLUS_1H")  return new Date(Date.now() + 3600000).toISOString();
            if (token === "TIMESTAMP_PLUS_1D")  return new Date(Date.now() + 86400000).toISOString();
            if (token === "TIMESTAMP_MINUS_1H") return new Date(Date.now() - 3600000).toISOString();
            if (token === "TIMESTAMP_MINUS_2H") return new Date(Date.now() - 7200000).toISOString();
            if (token === "TIMESTAMP_MINUS_3H") return new Date(Date.now() - 10800000).toISOString();
            if (token === "TIMESTAMP_MINUS_1D") return new Date(Date.now() - 86400000).toISOString();
            if (token === "CONTACT_ID")        return context?.contactId || "";
            if (token === "ACCOUNT_ID")        return context?.accountId || "";
            if (token === "GUID")              return crypto.randomUUID ? crypto.randomUUID() : this._uuid();
            if (token === "CURRENT_USER")      return context?.currentUserId || "";
            if (token === "ENV_URL")           return context?.envUrl || "";
            // Alias references: {alias.id} or {alias.fieldname}
            if (token.includes(".")) {
                const [alias, field] = token.split(".", 2);
                const rec = aliasMap?.[alias];
                if (!rec) return match; // unresolved
                if (field === "id") return rec.id || "";
                return rec.fields?.[field] ?? match;
            }
            return match; // unknown, leave as-is
        });
    },
    _uuid() {
        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0;
            return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
        });
    }
};

/* ====== Visual Editor: FieldRegistry ====== */

const FieldRegistry = {
    // Date-field mapping (from CONFIG.governance.autoDateFields)
    DATE_MAPPING: CONFIG.governance.autoDateFields,

    // FG-relevant fields for ContactSource cards
    _fgFields: null,
    _getFgFields() {
        if (this._fgFields) return this._fgFields;
        this._fgFields = Object.keys(this.DATE_MAPPING).map(logName => {
            const attrs = (_sharedIttMeta.attributes.contact || []);
            const meta = attrs.find(a => a.LogicalName === logName);
            return {
                logicalName: logName,
                displayName: meta ? meta.DisplayName.UserLocalizedLabel.Label : logName,
                type: meta ? meta.AttributeType : "StringType"
            };
        });
        return this._fgFields;
    },

    getFieldsForEntity(entityName) {
        if (!entityName) return [];
        const lower = entityName.toLowerCase();
        // ContactSource: use FG-relevant fields
        if (lower.includes("contactsource") || lower.includes("contact_source")) {
            return this.getFieldsForContactSource();
        }
        // Lookup in shared meta
        const key = Object.keys(_sharedIttMeta.attributes).find(k => k.toLowerCase() === lower);
        const attrs = key ? _sharedIttMeta.attributes[key] : [];
        return attrs.map(a => ({
            logicalName: a.LogicalName,
            displayName: a.DisplayName.UserLocalizedLabel.Label,
            type: a.AttributeType
        }));
    },

    getFieldsForContactSource() {
        return [
            { logicalName: CONFIG.governance.sourceSystemField, displayName: "Source System", type: "PicklistType" },
            { logicalName: CONFIG.governance.externalIdField, displayName: "External ID", type: "StringType" },
            { logicalName: "contactid@odata.bind", displayName: "Contact (Bind)", type: "LookupBind" },
            ...this._getFgFields(),
            { logicalName: "requestcode", displayName: "Request Code", type: "PicklistType" }
        ];
    },

    getSourceSystemOptions() {
        return [
            { value: 1, label: "Dynamics" },
            { value: 4, label: "PISA" },
            { value: 5, label: "Platform" },
            { value: 6, label: "LinkedIn" },
            { value: 7, label: "Mnet" }
        ];
    },

    getFieldLabel(entity, fieldName) {
        const fields = this.getFieldsForEntity(entity);
        const f = fields.find(fl => fl.logicalName === fieldName);
        return f ? f.displayName : fieldName;
    },

    getAutoDateField(valueField) {
        return this.DATE_MAPPING[valueField] || null;
    },

    isAutoDateField(fieldName) {
        return Object.values(this.DATE_MAPPING).includes(fieldName);
    }
};

/* ====== Visual Editor: EditorModel ====== */

const EditorModel = {
    _data: { preconditions: [], steps: [], assertions: [] },
    _listeners: [],
    _nextId: 1,

    // Initialize with empty state
    init() {
        this._data = { preconditions: [], steps: [], assertions: [] };
        this._listeners = [];
        this._nextId = 1;
    },

    // Observer pattern
    onChange(listener) {
        this._listeners.push(listener);
    },

    _notify(changeType) {
        for (const fn of this._listeners) {
            try { fn(changeType); } catch(e) { console.error("EditorModel listener error:", e); }
        }
    },

    _uid() { return "ve_" + (this._nextId++); },

    // Parse from JSON (supports legacy object format and new array format)
    fromJSON(json) {
        let def;
        try { def = typeof json === "string" ? JSON.parse(json) : json; } catch { def = {}; }
        this._data = { preconditions: [], steps: [], assertions: [] };
        this._nextId = 1;

        // Parse preconditions
        const pre = def.preconditions;
        if (Array.isArray(pre)) {
            // New array format
            for (const p of pre) {
                this._data.preconditions.push({
                    _id: this._uid(),
                    entity: p.entity || "account",
                    alias: p.alias || "",
                    fields: { ...(p.fields || {}) },
                    sourceSystem: p.sourceSystem || null,
                    waitForAsync: p.waitForAsync !== undefined ? p.waitForAsync : null
                });
            }
        } else if (pre && typeof pre === "object") {
            // Legacy object format: { createAccount, accountFields, createContact, ... }
            if (pre.createAccount !== false) {
                this._data.preconditions.push({
                    _id: this._uid(), entity: "account",
                    alias: "account1", fields: { ...(pre.accountFields || { name: "{GENERATED:company}" }) },
                    sourceSystem: null, waitForAsync: null
                });
            }
            if (pre.createContact !== false) {
                this._data.preconditions.push({
                    _id: this._uid(), entity: "contact",
                    alias: "contact1", fields: { ...(pre.contactFields || { firstname: "{GENERATED:firstname}", lastname: "{GENERATED:lastname}", "parentcustomerid@odata.bind": "{account1.id}" }) },
                    sourceSystem: null, waitForAsync: null
                });
            }
            const sources = pre.existingContactSources || pre.contactSources || [];
            for (const src of sources) {
                this._data.preconditions.push({
                    _id: this._uid(),
                    entity: CONFIG.governance.sourceEntitySet,
                    alias: src.alias || "",
                    fields: { ...(src.fields || {}) },
                    sourceSystem: src.sourceSystem || null,
                    waitForAsync: src.waitForAsync !== undefined ? src.waitForAsync : true
                });
            }
        }

        // Parse steps
        const steps = def.steps || [];
        for (const s of steps) {
            this._data.steps.push({
                _id: this._uid(),
                action: s.action || "UpdateRecord",
                entity: s.entity || "",
                alias: s.alias || "",
                fields: { ...(s.fields || {}) },
                parameters: { ...(s.parameters || {}) },
                waitSeconds: s.waitSeconds || s.seconds || 0,
                apiName: s.apiName || s.actionName || "",
                target: s.target || ""
            });
        }

        // Parse assertions
        const assertions = def.assertions || [];
        for (const a of assertions) {
            this._data.assertions.push({
                _id: this._uid(),
                type: a.type || "FieldEquals",
                target: a.target || "Contact",
                targetAlias: a.targetAlias || a.alias || "",
                entity: a.entity || "",
                field: a.field || "",
                operator: a.operator || "Equals",
                expected: a.value !== undefined ? a.value : (a.expected !== undefined ? a.expected : ""),
                filter: a.filter ? { ...a.filter } : null,
                description: a.description || ""
            });
        }

        this._notify("load");
    },

    // Generate JSON (always new array format)
    // Ensures entity name is an OData EntitySet name (plural)
    _toEntitySetName(entity) {
        if (!entity) return entity;
        const e = entity.toLowerCase();
        // Standard CRM entities (singular to EntitySet plural)
        const map = { account: "accounts", contact: "contacts", lead: "leads", opportunity: "opportunities", incident: "incidents", task: "tasks", email: "emails", phonecall: "phonecalls", appointment: "appointments", annotation: "annotations" };
        if (map[e]) return map[e];
        // Dynamic: use loaded metadata EntitySetName if available
        if (_sharedIttMeta?.entities) {
            const meta = _sharedIttMeta.entities.find(ent =>
                ent.LogicalName === e || ent.EntitySetName === e || ent.LogicalName === entity);
            if (meta?.EntitySetName) return meta.EntitySetName;
        }
        // Already correct (e.g. standard entity set name) or unknown
        return entity;
    },

    toJSON() {
        const result = {
            preconditions: [],
            steps: [],
            assertions: []
        };

        for (const p of this._data.preconditions) {
            const entry = { entity: this._toEntitySetName(p.entity) };
            if (p.alias) entry.alias = p.alias;
            if (p.sourceSystem != null) entry.sourceSystem = p.sourceSystem;
            if (p.waitForAsync != null) entry.waitForAsync = p.waitForAsync;
            // Only non-empty fields
            const fields = {};
            for (const [k, v] of Object.entries(p.fields || {})) {
                if (v !== "" && v != null) fields[k] = v;
            }
            if (Object.keys(fields).length > 0) entry.fields = fields;
            result.preconditions.push(entry);
        }

        for (const s of this._data.steps) {
            const entry = { action: s.action };
            if (s.entity) entry.entity = this._toEntitySetName(s.entity);
            if (s.alias) entry.alias = s.alias;
            if (s.action === "Wait") {
                entry.seconds = s.waitSeconds || 5;
            } else if (s.action === "ExecuteAction") {
                entry.actionName = s.apiName || "";
                if (s.target) entry.target = s.target;
                const params = {};
                for (const [k, v] of Object.entries(s.parameters || {})) {
                    if (v !== "" && v != null) params[k] = v;
                }
                if (Object.keys(params).length > 0) entry.parameters = params;
            } else {
                const fields = {};
                for (const [k, v] of Object.entries(s.fields || {})) {
                    if (v !== "" && v != null) fields[k] = v;
                }
                if (Object.keys(fields).length > 0) entry.fields = fields;
            }
            result.steps.push(entry);
        }

        for (const a of this._data.assertions) {
            const entry = { type: a.type };
            if (a.target) entry.target = a.target;
            if (a.targetAlias) entry.targetAlias = a.targetAlias;
            if (a.entity) entry.entity = a.entity;
            if (a.field) entry.field = a.field;
            if (a.operator) entry.operator = a.operator;
            if (a.expected !== "" && a.expected != null) entry.value = a.expected;
            if (a.filter && Object.keys(a.filter).length > 0) entry.filter = a.filter;
            if (a.description) entry.description = a.description;
            result.assertions.push(entry);
        }

        return result;
    },

    toJSONString() {
        return JSON.stringify(this.toJSON(), null, 2);
    },

    // Validation
    validate() {
        const issues = [];
        // Preconditions
        for (const p of this._data.preconditions) {
            if (!p.entity) issues.push({ severity: "error", path: `precondition/${p._id}`, message: "Entity fehlt" });
            if (!p.alias) issues.push({ severity: "warning", path: `precondition/${p._id}`, message: "Alias fehlt" });
        }
        // Steps
        for (const s of this._data.steps) {
            if (!s.action) issues.push({ severity: "error", path: `step/${s._id}`, message: "Aktion fehlt" });
            if (s.action === "Wait" && (!s.waitSeconds || s.waitSeconds <= 0)) {
                issues.push({ severity: "warning", path: `step/${s._id}`, message: "Wartezeit ist 0" });
            }
            if ((s.action === "CreateRecord" || s.action === "UpdateRecord") && !s.entity && !s.alias) {
                issues.push({ severity: "error", path: `step/${s._id}`, message: "Entity oder Alias fehlt" });
            }
        }
        // Assertions
        if (this._data.assertions.length === 0) {
            issues.push({ severity: "warning", path: "assertions", message: "Keine Assertions definiert" });
        }
        for (const a of this._data.assertions) {
            if (!a.field && a.type === "FieldEquals") {
                issues.push({ severity: "error", path: `assertion/${a._id}`, message: "Feld fehlt" });
            }
            if (!a.operator) issues.push({ severity: "error", path: `assertion/${a._id}`, message: "Operator fehlt" });
        }
        return issues;
    },

    getIssuesForItem(id) {
        return this.validate().filter(i => i.path.includes(id));
    },

    // Available aliases up to a certain point
    getAvailableAliases(beforeStepId) {
        const aliases = [];
        for (const p of this._data.preconditions) {
            if (p.alias) aliases.push({ alias: p.alias, entity: p.entity, source: "precondition" });
        }
        if (beforeStepId) {
            for (const s of this._data.steps) {
                if (s._id === beforeStepId) break;
                if (s.alias) aliases.push({ alias: s.alias, entity: s.entity, source: "step" });
            }
        } else {
            for (const s of this._data.steps) {
                if (s.alias) aliases.push({ alias: s.alias, entity: s.entity, source: "step" });
            }
        }
        return aliases;
    },

    // Precondition CRUD
    get preconditions() { return this._data.preconditions; },
    addPrecondition(template) {
        const p = { _id: this._uid(), entity: template.entity || "account", alias: template.alias || "", fields: { ...(template.fields || {}) }, sourceSystem: template.sourceSystem || null, waitForAsync: template.waitForAsync != null ? template.waitForAsync : null };
        this._data.preconditions.push(p);
        this._notify("addPrecondition");
        return p;
    },
    removePrecondition(id) {
        this._data.preconditions = this._data.preconditions.filter(p => p._id !== id);
        this._notify("removePrecondition");
    },
    updatePrecondition(id, changes) {
        const p = this._data.preconditions.find(x => x._id === id);
        if (p) { Object.assign(p, changes); this._notify("updatePrecondition"); }
    },
    reorderPreconditions(fromIdx, toIdx) {
        const arr = this._data.preconditions;
        const [item] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, item);
        this._notify("reorderPreconditions");
    },

    // Step CRUD
    get steps() { return this._data.steps; },
    addStep(template) {
        const s = { _id: this._uid(), action: template.action || "UpdateRecord", entity: template.entity || "", alias: template.alias || "", fields: { ...(template.fields || {}) }, parameters: { ...(template.parameters || {}) }, waitSeconds: template.waitSeconds || 0, apiName: template.apiName || "", target: template.target || "" };
        this._data.steps.push(s);
        this._notify("addStep");
        return s;
    },
    removeStep(id) {
        this._data.steps = this._data.steps.filter(s => s._id !== id);
        this._notify("removeStep");
    },
    updateStep(id, changes) {
        const s = this._data.steps.find(x => x._id === id);
        if (s) { Object.assign(s, changes); this._notify("updateStep"); }
    },
    reorderSteps(fromIdx, toIdx) {
        const arr = this._data.steps;
        const [item] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, item);
        this._notify("reorderSteps");
    },

    reorderAssertions(fromIdx, toIdx) {
        const arr = this._data.assertions;
        const [item] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, item);
        this._notify("reorderAssertions");
    },

    // Insert at position
    insertPreconditionAt(index, template) {
        const p = this.addPrecondition(template);
        const arr = this._data.preconditions;
        arr.splice(arr.length - 1, 1); // Remove from end (addPrecondition pushed it)
        arr.splice(index, 0, p);
        this._notify("insertPrecondition");
        return p;
    },
    insertStepAt(index, template) {
        const s = this.addStep(template);
        const arr = this._data.steps;
        arr.splice(arr.length - 1, 1);
        arr.splice(index, 0, s);
        this._notify("insertStep");
        return s;
    },
    insertAssertionAt(index, template) {
        const a = this.addAssertion(template);
        const arr = this._data.assertions;
        arr.splice(arr.length - 1, 1);
        arr.splice(index, 0, a);
        this._notify("insertAssertion");
        return a;
    },

    // Assertion CRUD
    get assertions() { return this._data.assertions; },
    addAssertion(template) {
        const a = { _id: this._uid(), type: template.type || "FieldEquals", target: template.target || "contact", targetAlias: template.targetAlias || "", field: template.field || "", operator: template.operator || "Equals", expected: template.expected !== undefined ? template.expected : "", filter: template.filter ? { ...template.filter } : null, description: template.description || "" };
        this._data.assertions.push(a);
        this._notify("addAssertion");
        return a;
    },
    removeAssertion(id) {
        this._data.assertions = this._data.assertions.filter(a => a._id !== id);
        this._notify("removeAssertion");
    },
    updateAssertion(id, changes) {
        const a = this._data.assertions.find(x => x._id === id);
        if (a) { Object.assign(a, changes); this._notify("updateAssertion"); }
    },

    // Auto-generate alias from entity
    generateAlias(entity) {
        const lower = entity.toLowerCase();
        const govEntity = CONFIG.governance.sourceEntity.toLowerCase();
        const base = lower === govEntity || lower.includes("contactsource") ? "" :
                     lower.replace(CONFIG.prefix + "_", "");
        const existing = [...this._data.preconditions, ...this._data.steps].map(x => x.alias);
        let name = base || "rec";
        let counter = 1;
        while (existing.includes(name + counter)) counter++;
        return name + counter;
    },

    generateContactSourceAlias(sourceSystem) {
        const ssMap = { 1: "dynamics", 4: "pisa", 5: "platform", 6: "linkedin", 7: "mnet" };
        const base = ssMap[sourceSystem] || "cs";
        const existing = [...this._data.preconditions, ...this._data.steps].map(x => x.alias);
        let counter = 1;
        while (existing.includes(base + counter)) counter++;
        return base + counter;
    }
};

/* ====== Visual Editor: CardRenderer ====== */

const CardRenderer = {
    // Determine entity badge CSS class
    _badgeClass(entity) {
        if (!entity) return "other";
        const e = entity.toLowerCase();
        if (e === "account") return "account";
        if (e === "contact") return "contact";
        if (e.includes("contactsource")) return "contactsource";
        return "other";
    },

    _entityLabel(entity) {
        if (!entity) return "Record";
        const e = entity.toLowerCase();
        if (e === "account") return "Account";
        if (e === "contact") return "Contact";
        if (e.includes("contactsource")) return "ContactSource";
        // Strip common prefixes for display
        return entity.replace(/^\w+_/, "");
    },

    // Render field rows for a card
    _renderFieldRows(item, entityName, onUpdate) {
        const fields = item.fields || {};
        const entries = Object.entries(fields);
        const isCS = entityName && entityName.toLowerCase().includes("contactsource");

        // Build datalist of available fields for this entity
        const availFields = FieldRegistry.getFieldsForEntity(entityName || "");
        const dlId = "dl-fields-" + item._id;

        let html = "";
        html += `<datalist id="${dlId}">`;
        for (const f of availFields) {
            if (!fields[f.logicalName]) html += `<option value="${escapeHtml(f.logicalName)}" label="${escapeHtml(f.displayName || f.logicalName)}">`;
        }
        html += `</datalist>`;

        for (const [fieldName, fieldValue] of entries) {
            const isAuto = FieldRegistry.isAutoDateField(fieldName) ||
                           fieldName === "contactid@odata.bind" ||
                           fieldName === CONFIG.governance.externalIdField;
            const label = FieldRegistry.getFieldLabel(entityName, fieldName);
            html += `<div class="ve-field-row${isAuto ? ' auto-field' : ''}" data-field="${escapeHtml(fieldName)}">`;
            html += `<div class="ve-field-name"><input type="text" value="${escapeHtml(fieldName)}" ${isAuto ? 'readonly' : `list="${dlId}" data-rename-field="${escapeHtml(fieldName)}"`} title="${escapeHtml(label)}"></div>`;

        html += `<button class="ve-field-add" data-add-field="${escapeHtml(item._id)}" title="Add field">+ Field</button>`;

    // Render a precondition card (Account/Contact)
    renderPreconditionCard(item) {
        const issues = EditorModel.getIssuesForItem(item._id);

        let html = `<div class="ve-card ${cls}" data-card-id="${item._id}" data-phase="precondition" draggable="true">`;
        html += `<div class="ve-card-header">`;
        html += `<span class="ve-drag-handle" title="Drag to reorder">\u2261</span>`;
        // Entity is ALWAYS editable - badge shown as visual hint, input always present
        html += `<span class="ve-entity-badge ${this._badgeClass(entity)}" style="cursor:default;pointer-events:none">${escapeHtml(this._entityLabel(entity) || "?")}</span>`;
        html += `<datalist id="dl-entity-${item._id}">${knownEntities.map(e => `<option value="${e}">`).join("")}</datalist>`;
        html += `<input class="ve-entity-input" value="${escapeHtml(entity)}" list="dl-entity-${item._id}" data-entity-for="${item._id}" placeholder="Entity name" title="Entity name editable (z.B. accounts, leads, contacts)" style="width:100px;font-size:10px;padding:2px 4px;border:1px solid var(--border-color);border-radius:3px;background:var(--bg-tertiary);color:var(--text-primary)">`;
        html += `<input class="ve-alias-input" value="${escapeHtml(item.alias)}" placeholder="Alias" data-alias-for="${item._id}" title="Alias for referencing">`;
        html += `<span class="ve-card-title"></span>`;
        html += `<button class="ve-card-delete" data-delete="${item._id}" data-phase="precondition" title="Remove">x</button>`;
        html += `</div>`;
        html += `<div class="ve-card-body">`;

        // ContactSource: specialized body with SourceSystem + waitForAsync + fields
        // Other entities: generic field rows
        // Entity change via input triggers dynamic re-render
        if (isCS) {
            html += this._renderContactSourceBody(item);
        } else {
            html += this._renderFieldRows(item, entity);
        }

        html += `</div></div>`;
        return html;
    },

    // ContactSource-specific card body
    _renderContactSourceBody(item) {
        let html = "";
        // Source System dropdown
        const ssOptions = FieldRegistry.getSourceSystemOptions();
        html += `<div class="ve-field-row"><div class="ve-field-name"><span style="font-size:11px;color:var(--text-secondary)">Quellsystem</span></div>`;
        html += `<div class="ve-field-value"><select data-ss-for="${item._id}">`;

        // FG-relevant fields

    // Render a step card
    renderStepCard(item) {
        const issues = EditorModel.getIssuesForItem(item._id);
        const cls = issues.some(i => i.severity === "error") ? "error" : issues.some(i => i.severity === "warning") ? "warning" : "valid";
        const action = item.action || "UpdateRecord";

        let html = `<div class="ve-card ${cls}" data-card-id="${item._id}" data-phase="step" draggable="true">`;
        html += `<div class="ve-card-header">`;
        html += `<span class="ve-drag-handle" title="Drag to reorder">\u2261</span>`;

        // Action type badge
        const actionColors = { CreateRecord: "accent-green", UpdateRecord: "accent-yellow", Wait: "text-muted", ExecuteAction: "accent-purple", DeleteRecord: "accent-red", CreateContactSource: "accent-purple" };
        const actionLabels = { CreateRecord: "Create", UpdateRecord: "Update", Wait: "Wait", ExecuteAction: "API", DeleteRecord: "Delete", CreateContactSource: "Create CS" };
        html += `<span style="font-size:10px;font-weight:600;color:var(--${actionColors[action] || 'text-secondary'})">${actionLabels[action] || action}</span>`;

        if (action !== "Wait" && action !== "ExecuteAction") {
            html += `<span class="ve-entity-badge ${this._badgeClass(item.entity)}">${escapeHtml(this._entityLabel(item.entity))}</span>`;
        }

        }

        html += `<button class="ve-card-delete" data-delete="${item._id}" data-phase="step" title="Remove">x</button>`;
        html += `</div>`;
        html += `<div class="ve-card-body">`;

            html += `<input type="range" min="1" max="120" value="${secs}" data-wait-range="${item._id}">`;

        } else if (action === "ExecuteAction") {
            // Dynamic Custom API dropdown from metadata + cache
            const cachedApis = MetaCache.customApis || _sharedIttMeta.customapis || [];
            // Use governance API as first suggestion, then all from cache
            const defaultApis = [
                { uniquename: CONFIG.governance.governanceApi, displayname: "Governance API" }
            ];
            const seen = new Set(defaultApis.map(a => a.uniquename));
            const allApis = [...defaultApis];
            for (const a of cachedApis) {

            html += `<div class="ve-field-value">`;

            html += `<datalist id="dl-apis-${item._id}">`;

            const aliases = EditorModel.getAvailableAliases(item._id);
            html += `<div class="ve-field-row"><div class="ve-field-name"><span style="font-size:11px;color:var(--text-secondary)">Alias</span></div>`;
            html += `<div class="ve-field-value"><select data-del-alias="${item._id}">`;
            html += `<option value="">-- Alias w\u00e4hlen --</option>`;
            for (const al of aliases) {

        html += `</div></div>`;

    // Render an assertion card
    renderAssertionCard(item) {
        const issues = EditorModel.getIssuesForItem(item._id);
        const cls = issues.some(i => i.severity === "error") ? "error" : issues.some(i => i.severity === "warning") ? "warning" : "valid";

        const operatorOptions = [
            { value: "Equals", label: "Gleich" },
            { value: "NotEquals", label: "Ungleich" },
            { value: "Contains", label: "Enth\u00e4lt" },
            { value: "NotNull", label: "Nicht leer" },
            { value: "IsNull", label: "Leer" },
            { value: "IsNotNull", label: "Nicht null" },
            { value: "GreaterThan", label: "Gr\u00f6\u00dfer als" },
            { value: "LessThan", label: "Kleiner als" },
            { value: "DateSetRecently", label: "Date k\u00fcrzlich gesetzt" },
            { value: "Exists", label: "Existiert" },
            { value: "NotExists", label: "Existiert nicht" }
        ];

        const targetOptions = [
            { value: "Contact", label: "Contact" },
            { value: "ContactSource", label: "ContactSource" },
            { value: "Query", label: "Query" },
            { value: "CdhLogging", label: "CDH Logging" }

        html += `<span class="ve-drag-handle" title="Drag to reorder">\u2261</span>`;
        html += `<span style="font-size:10px;font-weight:600;color:var(--accent-blue)">Assert</span>`;
        html += `<span class="ve-card-title" style="font-size:11px;color:var(--text-muted)">${escapeHtml(item.description || "")}</span>`;
        html += `<button class="ve-card-delete" data-delete="${item._id}" data-phase="assertion" title="Remove">x</button>`;
        html += `</div>`;
        html += `<div class="ve-card-body">`;

        // Target dropdown

        html += `<div class="ve-field-value"><select data-assert-target="${item._id}">`;

            html += `<option value="${t.value}"${item.target === t.value ? ' selected' : ''}>${t.label}</option>`;
        }
        html += `</select></div></div>`;

        // Target alias (for contactsource targets)
        const targetLower = (item.target || "").toLowerCase();
        if (targetLower === "contactsource") {
            const aliases = EditorModel.getAvailableAliases();
            html += `<div class="ve-field-row"><div class="ve-field-name"><span style="font-size:11px;color:var(--text-secondary)">Alias</span></div>`;
            html += `<div class="ve-field-value"><select data-assert-alias="${item._id}">`;
            html += `<option value="">--</option>`;
            for (const al of aliases.filter(a => a.entity && a.entity.toLowerCase().includes("contactsource"))) {
                html += `<option value="${escapeHtml(al.alias)}"${item.targetAlias === al.alias ? ' selected' : ''}>${escapeHtml(al.alias)}</option>`;
            }
            html += `</select></div></div>`;
        }

        // Query-specific: Entity and Filter
        if (targetLower === "query") {
            const queryEntities = ["contacts", CONFIG.governance.sourceEntitySet, CONFIG.governance.loggingEntitySet, "accounts", "leads"];
            html += `<div class="ve-field-row"><div class="ve-field-name"><span style="font-size:11px;color:var(--text-secondary)">Entity</span></div>`;
            html += `<div class="ve-field-value"><datalist id="dl-qe-${item._id}">${queryEntities.map(e => `<option value="${e}">`).join("")}</datalist>`;
            html += `<input type="text" value="${escapeHtml(item.entity || '')}" list="dl-qe-${item._id}" data-assert-entity="${item._id}" class="ve-value-input" placeholder="e.g. contacts, accounts"></div></div>`;
            // Filter key-value pairs
            const filter = item.filter || {};
            const filterEntries = Object.entries(filter);
            if (filterEntries.length > 0 || true) {
                html += `<div style="padding:4px 8px"><span style="font-size:10px;font-weight:600;color:var(--text-muted)">Filter (WHERE)</span></div>`;
                for (const [k, v] of filterEntries) {
                    html += `<div class="ve-field-row" style="gap:4px">`;
                    html += `<div style="flex:1"><input type="text" value="${escapeHtml(k)}" data-filter-key-input="${item._id}" data-filter-old-key="${escapeHtml(k)}" class="ve-value-input" placeholder="Feldname" style="font-size:11px"></div>`;
                    html += `<div style="flex:1"><input type="text" value="${escapeHtml(String(v))}" data-filter-value-input="${item._id}" data-filter-for-key="${escapeHtml(k)}" class="ve-value-input" placeholder="Wert (z.B. {contact1.id})" style="font-size:11px"></div>`;
                    html += `<button data-remove-filter="${item._id}" data-filter-rm-key="${escapeHtml(k)}" style="background:none;border:none;color:var(--accent-red);cursor:pointer;font-size:12px" title="Filter entfernen">x</button>`;
                    html += `</div>`;
                }
                html += `<div style="padding:2px 8px"><button data-add-filter="${item._id}" style="font-size:10px;padding:2px 8px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:3px;color:var(--text-secondary);cursor:pointer">+ Filter</button></div>`;
            }
        }

        // CdhLogging-specific: implicit contact filter
        if (targetLower === "cdhlogging") {
            html += `<div style="padding:4px 8px"><span style="font-size:10px;color:var(--text-muted)">Filtert automatisch auf Contact aus Preconditions</span></div>`;
        }

        // Field
        html += `<div class="ve-field-row"><div class="ve-field-name"><span style="font-size:11px;color:var(--text-secondary)">Feld</span></div>`;
        html += `<div class="ve-field-value"><input type="text" value="${escapeHtml(item.field || '')}" data-assert-field="${item._id}" class="ve-value-input" placeholder="Feldname"></div></div>`;

        // Operator
        html += `<div class="ve-field-row"><div class="ve-field-name"><span style="font-size:11px;color:var(--text-secondary)">Operator</span></div>`;
        html += `<div class="ve-field-value"><select data-assert-op="${item._id}">`;
        for (const op of operatorOptions) {
            html += `<option value="${op.value}"${item.operator === op.value ? ' selected' : ''}>${op.label}</option>`;
        }
        html += `</select></div></div>`;

        // Expected value (not shown for IsNull/IsNotNull/Exists/NotExists)
        const needsValue = !["IsNull", "IsNotNull", "Exists", "NotExists"].includes(item.operator);
        if (needsValue) {
            html += `<div class="ve-field-row"><div class="ve-field-name"><span style="font-size:11px;color:var(--text-secondary)">Erwartet</span></div>`;
            html += `<div class="ve-field-value"><input type="text" value="${escapeHtml(String(item.expected ?? ''))}" data-assert-expected="${item._id}" class="ve-value-input" placeholder="Expected value"></div></div>`;
        }

        // Live text preview
        const previewText = this._assertionPreviewText(item);
        html += `<div class="ve-assert-preview">${escapeHtml(previewText)}</div>`;

        html += `</div></div>`;
        return html;
    },

    _assertionPreviewText(a) {
        const targetLabel = a.target === "contactsource" && a.targetAlias ? `ContactSource:${a.targetAlias}` : (a.target || "?");
        const fieldLabel = a.field || "?";
        const opLabels = { Equals: "soll gleich", NotEquals: "soll ungleich", Contains: "soll enthalten", NotNull: "soll nicht leer sein", IsNull: "soll leer sein", IsNotNull: "soll nicht null sein", GreaterThan: "soll gr\u00f6\u00dfer sein als", LessThan: "soll kleiner sein als", DateSetRecently: "soll k\u00fcrzlich gesetzt sein", Exists: "soll existieren", NotExists: "soll nicht existieren" };
        const opText = opLabels[a.operator] || a.operator;
        const needsVal = !["IsNull", "IsNotNull", "Exists", "NotExists", "DateSetRecently"].includes(a.operator);
        if (needsVal && a.expected !== "" && a.expected != null) {
            return `${targetLabel}.${fieldLabel} ${opText} '${a.expected}'`;
        }
        return `${targetLabel}.${fieldLabel} ${opText}`;
    }
};

/* ====== Visual Editor: DragDropManager ====== */

const DragDropManager = {
    _draggedId: null,
    _draggedPhase: null,
    _bound: false,

    init(container) {
        if (this._bound) return; // Events already bound - no stacking
        this._bound = true;
        container.addEventListener("dragstart", (e) => {
            const card = e.target.closest(".ve-card[draggable]");
            if (!card) return;
            this._draggedId = card.dataset.cardId;
            this._draggedPhase = card.dataset.phase;
            card.classList.add("dragging");
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/plain", this._draggedId);
        });

        container.addEventListener("dragend", (e) => {
            const card = e.target.closest(".ve-card");
            if (card) card.classList.remove("dragging");
            // Remove all drop indicators
            container.querySelectorAll(".ve-drop-indicator").forEach(el => el.remove());
            this._draggedId = null;
            this._draggedPhase = null;
        });

        container.addEventListener("dragover", (e) => {
            if (!this._draggedId) return;
            const column = e.target.closest(".ve-column-body");
            if (!column) return;
            // Only allow drop within same phase
            const colPhase = column.closest(".ve-column")?.dataset.phase;
            if (colPhase !== this._draggedPhase) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";

            // Show drop indicator
            column.querySelectorAll(".ve-drop-indicator").forEach(el => el.remove());
            const cards = [...column.querySelectorAll(".ve-card:not(.dragging)")];
            let insertBefore = null;
            for (const c of cards) {
                const rect = c.getBoundingClientRect();
                if (e.clientY < rect.top + rect.height / 2) { insertBefore = c; break; }
            }
            const indicator = document.createElement("div");
            indicator.className = "ve-drop-indicator";
            if (insertBefore) column.insertBefore(indicator, insertBefore);
            else column.appendChild(indicator);
        });

        container.addEventListener("drop", (e) => {
            if (!this._draggedId) return;
            e.preventDefault();
            const column = e.target.closest(".ve-column-body");
            if (!column) return;
            const colPhase = column.closest(".ve-column")?.dataset.phase;
            if (colPhase !== this._draggedPhase) return;

            const cards = [...column.querySelectorAll(".ve-card:not(.dragging)")];
            let dropIdx = cards.length;
            for (let i = 0; i < cards.length; i++) {
                const rect = cards[i].getBoundingClientRect();
                if (e.clientY < rect.top + rect.height / 2) { dropIdx = i; break; }
            }

            // Find current index of dragged item
            const list = this._draggedPhase === "precondition" ? EditorModel.preconditions :
                         this._draggedPhase === "step" ? EditorModel.steps :
                         this._draggedPhase === "assertion" ? EditorModel.assertions : null;
            if (!list) return;
            const fromIdx = list.findIndex(x => x._id === this._draggedId);
            if (fromIdx < 0) return;

            // Adjust drop index if dragging down
            const adjustedIdx = dropIdx > fromIdx ? dropIdx - 1 : dropIdx;
            if (adjustedIdx !== fromIdx) {
                if (this._draggedPhase === "precondition") EditorModel.reorderPreconditions(fromIdx, adjustedIdx);
                else if (this._draggedPhase === "step") EditorModel.reorderSteps(fromIdx, adjustedIdx);
                else if (this._draggedPhase === "assertion") EditorModel.reorderAssertions(fromIdx, adjustedIdx);
            }
        });
    }
};

/* ====== Visual Editor: AliasAutocomplete ====== */

const AliasAutocomplete = {
    _popup: null,
    _activeInput: null,
    _items: [],
    _selectedIdx: -1,
    _bound: false,

    init(container) {
        if (this._bound) return; // Events already bound - no stacking
        this._bound = true;
        container.addEventListener("input", (e) => {
            if (!e.target.classList.contains("ve-value-input")) return;
            const val = e.target.value;
            const cursorPos = e.target.selectionStart;
            // Check if user just typed { or is inside a {pattern}
            const before = val.substring(0, cursorPos);
            const openBrace = before.lastIndexOf("{");
            const closeBrace = before.lastIndexOf("}");
            if (openBrace > closeBrace) {
                const partial = before.substring(openBrace + 1);
                this._show(e.target, partial, openBrace);
            } else {
                this._hide();
            }
        });

        container.addEventListener("keydown", (e) => {
            if (!this._popup || !e.target.classList.contains("ve-value-input")) return;
            if (e.key === "ArrowDown") { e.preventDefault(); this._selectedIdx = Math.min(this._selectedIdx + 1, this._items.length - 1); this._highlightItem(); }
            else if (e.key === "ArrowUp") { e.preventDefault(); this._selectedIdx = Math.max(this._selectedIdx - 1, 0); this._highlightItem(); }
            else if (e.key === "Enter" && this._selectedIdx >= 0) { e.preventDefault(); this._selectItem(this._selectedIdx); }
            else if (e.key === "Escape") { this._hide(); }
        });

        // Close on outside click
        document.addEventListener("click", (e) => {
            if (this._popup && !this._popup.contains(e.target)) this._hide();
        });
    },

    _show(input, partial, bracePos) {
        this._activeInput = input;
        this._items = this._getCompletions(partial.toLowerCase());
        if (this._items.length === 0) { this._hide(); return; }

        if (!this._popup) {
            this._popup = document.createElement("div");
            this._popup.className = "ve-autocomplete";
            document.body.appendChild(this._popup);
        }

        // Position popup
        const rect = input.getBoundingClientRect();
        this._popup.style.left = rect.left + "px";
        this._popup.style.top = (rect.bottom + 2) + "px";
        this._popup.style.display = "block";

        // Render items
        let html = "";
        let lastCat = "";
        for (let i = 0; i < this._items.length; i++) {
            const it = this._items[i];
            if (it.category !== lastCat) {
                html += `<div class="ve-autocomplete-category">${escapeHtml(it.category)}</div>`;
                lastCat = it.category;
            }
            html += `<button class="ve-autocomplete-item" data-ac-idx="${i}">${escapeHtml(it.text)}</button>`;
        }
        this._popup.innerHTML = html;
        this._selectedIdx = -1;

        this._popup.querySelectorAll(".ve-autocomplete-item").forEach(btn => {
            btn.addEventListener("mousedown", (e) => {
                e.preventDefault();
                this._selectItem(parseInt(btn.dataset.acIdx));
            });
        });
    },

    _hide() {
        if (this._popup) this._popup.style.display = "none";
        this._activeInput = null;
        this._selectedIdx = -1;
    },

    _highlightItem() {
        if (!this._popup) return;
        this._popup.querySelectorAll(".ve-autocomplete-item").forEach((el, i) => {
            el.classList.toggle("selected", i === this._selectedIdx);
        });
    },

    _selectItem(idx) {
        const item = this._items[idx];
        if (!item || !this._activeInput) return;
        const input = this._activeInput;
        const val = input.value;
        const cursorPos = input.selectionStart;
        const before = val.substring(0, cursorPos);
        const openBrace = before.lastIndexOf("{");

        // Replace from { to cursor with the full placeholder
        const newVal = val.substring(0, openBrace) + "{" + item.text + "}" + val.substring(cursorPos);
        input.value = newVal;
        const newCursorPos = openBrace + item.text.length + 2;
        input.selectionStart = input.selectionEnd = newCursorPos;
        input.dispatchEvent(new Event("input", { bubbles: true }));
        this._hide();
    },

    _getCompletions(partial) {
        const result = [];
        // Aliases
        const aliases = EditorModel.getAvailableAliases();
        for (const al of aliases) {
            const fields = FieldRegistry.getFieldsForEntity(al.entity);
            // alias.id
            const idText = al.alias + ".id";
            if (idText.toLowerCase().includes(partial)) {
                result.push({ text: idText, category: "Aliase" });
            }
            // alias.field
            for (const f of fields.slice(0, 15)) {
                const ft = al.alias + "." + f.logicalName;
                if (ft.toLowerCase().includes(partial)) {
                    result.push({ text: ft, category: "Aliase" });
                }
            }
        }
        // System placeholders
        const sysPlaceholders = ["TIMESTAMP", "TIMESTAMP_PLUS_1H", "TIMESTAMP_MINUS_1H", "GUID", "CONTACT_ID", "ACCOUNT_ID", "CURRENT_USER", "ENV_URL"];
        for (const sp of sysPlaceholders) {
            if (sp.toLowerCase().includes(partial)) result.push({ text: sp, category: "System" });
        }
        // Generated
        const genTypes = ["firstname", "lastname", "email", "phone", "mobile", "company", "text", "guid", "number", "city"];
        for (const g of genTypes) {
            const gt = "GENERATED:" + g;
            if (gt.toLowerCase().includes(partial)) result.push({ text: gt, category: "Generiert" });
        }
        return result.slice(0, 20);
    }
};

/* ====== Visual Editor: EditorValidator ====== */

const EditorValidator = {
    renderValidationBar() {
        const issues = EditorModel.validate();
        const errors = issues.filter(i => i.severity === "error").length;
        const warnings = issues.filter(i => i.severity === "warning").length;

        if (errors === 0 && warnings === 0) {
            return `<div class="ve-validation-bar"><span class="ve-val-ok">${LANG.editor_ready}</span><span></span></div>`;
        }
        let parts = [];
        if (errors > 0) parts.push(`<span class="ve-val-err">${errors} Error(s)</span>`);
        if (warnings > 0) parts.push(`<span class="ve-val-warn">${warnings} Warning${warnings > 1 ? "en" : ""}</span>`);
        return `<div class="ve-validation-bar"><span>${parts.join(", ")}</span><span></span></div>`;
    }
};
