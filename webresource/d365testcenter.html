    try {
        const runs = await API.getMany("jbe_testruns",
            "$select=jbe_teststatus,jbe_passed,jbe_failed,jbe_total,jbe_startedon,jbe_completedon,jbe_testcasefilter" +
            "&$orderby=jbe_startedon desc&$top=100");

        State.testRuns = runs;
        State.runDateRange = "all";
        renderRunsTimeline(runs);
        renderRunsCards(runs);

        $("#runs-search").addEventListener("input", () => filterRuns());
    } catch (err) {
        $("#runs-table").innerHTML = `<div class="empty-state" style="color:var(--accent-red)">${escapeHtml(err.message)}</div>`;
    }
}

window._setRunDateRange = function(chip) {
    document.querySelectorAll(".toolbar .filter-chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    State.runDateRange = chip.dataset.range;
    filterRuns();
};

function filterRuns() {
    const search = ($("#runs-search")?.value || "").toLowerCase().trim();
    const range = State.runDateRange || "all";

    let filtered = State.testRuns;
    if (search) {
        filtered = filtered.filter(r =>
            (r.jbe_testcasefilter || "").toLowerCase().includes(search) ||
            (r.jbe_testid || "").toLowerCase().includes(search));
    }

    if (range !== "all") {
        const now = new Date();
        let cutoff;
        if (range === "today") {
            cutoff = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        } else if (range === "7d") {
            cutoff = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        } else if (range === "30d") {
            cutoff = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
        }
        if (cutoff) {
            filtered = filtered.filter(r => r.jbe_startedon && new Date(r.jbe_startedon) >= cutoff);
        }
    }

    renderRunsTimeline(filtered);
    renderRunsCards(filtered);
}

function renderRunsTimeline(runs) {
    const container = $("#runs-timeline-chart");
    if (!container) return;
    const completed = runs.filter(r => r.jbe_teststatus === CONFIG.optionSets.statusCompleted && r.jbe_total > 0);
    if (completed.length < 2) {
        container.innerHTML = "";
        return;
    }
    const chartRuns = completed.slice(0, 20).reverse();
    const barData = chartRuns.map(r => ({
        label: formatDate(r.jbe_startedon).split(" ")[0],
        value: r.jbe_total > 0 ? Math.round((r.jbe_passed || 0) / r.jbe_total * 100) : 0,
        color: r.jbe_total > 0 && Math.round((r.jbe_passed || 0) / r.jbe_total * 100) >= 80 ? "var(--accent-green)" : "var(--accent-red)"
    }));
    container.innerHTML = `<div class="timeline-chart-container"><div class="card-title">Pass rate per test run</div>${Charts.bar(barData, Math.max(400, barData.length * 40), 120)}</div>`;
}

function renderRunsCards(runs) {
    const container = $("#runs-table");
    if (!container) return;
    if (runs.length === 0) {
        container.innerHTML = `<div class="empty-state">No test runs found.</div>`;
        return;
    }

    let html = "";
    for (const r of runs) {
        const dur = r.jbe_completedon && r.jbe_startedon
            ? formatDuration(new Date(r.jbe_completedon) - new Date(r.jbe_startedon))
            : "-";
        const passed = r.jbe_passed || 0;
        const failed = r.jbe_failed || 0;
        const total = r.jbe_total || 0;
        const rate = total > 0 ? Math.round(passed / total * 100) : 0;
        const passPercent = total > 0 ? (passed / total * 100).toFixed(1) : "0";
        const failPercent = total > 0 ? (failed / total * 100).toFixed(1) : "0";
        const filterText = escapeHtml(r.jbe_testcasefilter || "*");

        html += `<div class="run-card" onclick="location.hash='#run/${r.jbe_testrunid}'">
            <div class="run-card-header">
                <span class="run-card-date">${formatDate(r.jbe_startedon)}</span>
                ${statusBadge(r.jbe_teststatus)}
                <span class="run-card-filter" title="${filterText}">${filterText}</span>
                <span class="run-card-duration">${dur}</span>
            </div>
            <div class="run-card-bar">
                <div class="run-card-bar-pass" style="width:${passPercent}%"></div>
                <div class="run-card-bar-fail" style="width:${failPercent}%"></div>
            </div>
            <div class="run-card-stats">
                <span class="stat-pass">${passed} Passed</span>
                <span class="stat-fail">${failed} Failed</span>
                <span class="stat-total">${total} Gesamt</span>
                <span class="stat-rate">${rate}%</span>
            </div>
        </div>`;
    }
    html += `<div style="color:var(--text-muted);font-size:12px;margin-top:8px">${runs.length} test runs</div>`;
    container.innerHTML = html;
}

// ── CSV Export ──────────────────────────────────────────────────

window._exportRunsCsv = function() {
    const runs = State.testRuns;
    if (!runs || runs.length === 0) {
        alert("No test runs to export.");
        return;
    }
    const sep = ";";
    const header = ["Date", "Status", "Filter", "Passed", "Failed", "Gesamt", "Duration (s)", "Pass-Rate (%)"].join(sep);
    const rows = runs.map(r => {
        const durMs = r.jbe_completedon && r.jbe_startedon
            ? new Date(r.jbe_completedon) - new Date(r.jbe_startedon) : 0;
        const durSec = durMs > 0 ? (durMs / 1000).toFixed(1) : "";
        const total = r.jbe_total || 0;
        const passed = r.jbe_passed || 0;
        const rate = total > 0 ? Math.round(passed / total * 100) : 0;
        const statusMap = {};
        statusMap[CONFIG.optionSets.statusPlanned] = "Geplant";
        statusMap[CONFIG.optionSets.statusRunning] = "Running";
        statusMap[CONFIG.optionSets.statusCompleted] = "Abgeschlossen";
        statusMap[CONFIG.optionSets.statusError] = "Fehler";
        const statusText = statusMap[r.jbe_teststatus] || "?";
        return [
            r.jbe_startedon ? new Date(r.jbe_startedon).toLocaleString("de-DE") : "",
            statusText,
            '"' + (r.jbe_testcasefilter || "*").replace(/"/g, '""') + '"',
            passed,
            r.jbe_failed || 0,
            total,
            durSec,
            rate
        ].join(sep);
    });
    const csv = "\uFEFF" + header + "\n" + rows.join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const dateStr = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `TestCenter_History_${dateStr}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
};

async function renderUserStories() {

        // Alle User Stories extrahieren und gruppieren
        const storyMap = {};
        for (const c of cases) {
            const stories = (c.jbe_userstories || "").split(",").map(s => s.trim()).filter(Boolean);

                if (!storyMap[key]) storyMap[key] = { key, cases: [] };

function renderStoriesTable(storyMap) {
    const stories = Object.values(storyMap).sort((a, b) => a.key.localeCompare(b.key));
    if (!stories.length) {
        $("#stories-table").innerHTML = `<div class="empty-state">No user stories with assigned test cases found.<br><span style="color:var(--text-muted);font-size:12px">Test cases can be assigned to a story via the "User Stories" field in the editor.</span></div>`;
        return;
    }

    let html = `<table class="data-table"><thead><tr><th>User Story</th><th>Test Cases</th><th>Active</th><th>Coverage</th><th></th></tr></thead><tbody>`;
    for (const s of stories) {
        const total = s.cases.length;
        const active = s.cases.filter(c => c.jbe_enabled !== false).length;
        const pct = total > 0 ? Math.round(active / total * 100) : 0;
        const barColor = pct === 100 ? "var(--accent-green)" : pct >= 50 ? "var(--accent-yellow)" : "var(--accent-red)";
        html += `<tr>
            <td><a href="#stories/${escapeHtml(s.key)}" style="color:var(--accent-purple);text-decoration:none;font-weight:600">${escapeHtml(s.key)}</a></td>
            <td>${total} test cases</td>
            <td>${active} aktiv</td>
            <td>
                <div style="display:flex;align-items:center;gap:8px">
                    <div style="flex:1;height:6px;background:var(--bg-input);border-radius:3px;overflow:hidden">
                        <div style="width:${pct}%;height:100%;background:${barColor};border-radius:3px"></div>
                    </div>
                    <span style="font-size:12px;color:var(--text-secondary)">${pct}%</span>
                </div>
            </td>
            <td>
                <a href="#run/new" class="btn btn-sm btn-primary" onclick="event.preventDefault(); prefillStoryRun('${escapeHtml(s.key)}'); location.hash='#run/new';">Testen</a>
                <a href="#stories/${escapeHtml(s.key)}" class="btn btn-sm">Details</a>
            </td>
        </tr>`;
    }
    html += `</tbody></table><div style="color:var(--text-muted);font-size:12px;margin-top:8px">${stories.length} User Stories</div>`;
    $("#stories-table").innerHTML = html;
}

    render(`<div style="margin-bottom:16px"><a href="#stories" style="color:var(--accent-blue);text-decoration:none">&larr; Back to User Stories</a></div>

    </div>`);

    try {
        const cases = await API.getMany("jbe_testcases",

            "&$filter=contains(jbe_userstories,'" + storyKey + "')&$orderby=jbe_testid asc");

        const categoryNames = {};
        categoryNames[CONFIG.optionSets.catUpdateSource] = "Update Source";
        categoryNames[CONFIG.optionSets.catCreateSource] = "Create Source";
        categoryNames[CONFIG.optionSets.catPISA] = "PISA";
        categoryNames[CONFIG.optionSets.catMultiSource] = "Multi-Source";
        categoryNames[CONFIG.optionSets.catAdditionalFields] = "Additional Fields";
        categoryNames[CONFIG.optionSets.catBridge] = "Bridge";
        categoryNames[CONFIG.optionSets.catMerge] = "Merge";
        categoryNames[CONFIG.optionSets.catRecompute] = "Recompute";
        categoryNames[CONFIG.optionSets.catErrorInjection] = "Error Injection";

        if (cases.length > 0) {
            let html = `<table class="data-table"><thead><tr><th>ID</th><th>Titel</th><th>Kategorie</th><th>Status</th><th></th></tr></thead><tbody>`;
            for (const c of cases) {
                const status = c.jbe_enabled !== false ? `<span class="badge badge-active">Aktiv</span>` : `<span class="badge badge-disabled">Deaktiviert</span>`;
                html += `<tr>
                    <td><strong>${escapeHtml(c.jbe_testid) || "-"}</strong></td>
                    <td>${escapeHtml(c.jbe_title) || "-"}</td>
                    <td>${categoryNames[c.jbe_category] || "-"}</td>
                    <td>${status}</td>
                    <td><a href="#cases/${c.jbe_testcaseid}" class="btn btn-sm">${LANG.cases_edit}</a></td>
                </tr>`;
            }
            html += `</tbody></table>`;
            $("#story-cases").innerHTML = html;
        } else {
            $("#story-cases").innerHTML = `<div class="empty-state">No test cases for ${escapeHtml(storyKey)} found.</div>`;
        }

        // Test Resultse: die TestIDs dieser Story in den Results suchen
        const testIds = cases.map(c => c.jbe_testid).filter(Boolean);
        if (testIds.length > 0) {
            // Letzte Results pro TestID laden
            const results = await API.getMany("jbe_testrunresults",
                "$select=jbe_testid,jbe_outcome,jbe_durationms,jbe_errormessage,createdon" +
                "&$orderby=createdon desc&$top=100");

            // Filtern auf relevante TestIDs und neuestes pro Test
            const latestPerTest = {};
            for (const r of results) {
                if (testIds.includes(r.jbe_testid) && !latestPerTest[r.jbe_testid]) {
                    latestPerTest[r.jbe_testid] = r;
                }
            }

            const outcomeNames = {};
            outcomeNames[CONFIG.optionSets.outcomePassed] = "Passed";
            outcomeNames[CONFIG.optionSets.outcomeFailed] = "Failed";
            outcomeNames[CONFIG.optionSets.outcomeError] = "Error";
            outcomeNames[CONFIG.optionSets.outcomeSkipped] = "Skipped";
            let passed = 0, failed = 0, other = 0;

            let rhtml = `<table class="data-table"><thead><tr><th>Test</th><th>Last Result</th><th>Duration</th><th>Date</th></tr></thead><tbody>`;
            for (const tid of testIds) {
                const r = latestPerTest[tid];
                if (r) {
                    const oName = outcomeNames[r.jbe_outcome] || "?";
                    if (r.jbe_outcome === CONFIG.optionSets.outcomePassed) passed++;
                    else if (r.jbe_outcome === CONFIG.optionSets.outcomeFailed) failed++;
                    else other++;
                    rhtml += `<tr>
                        <td><strong>${tid}</strong></td>
                        <td>${outcomeBadge(oName)}</td>
                        <td>${formatDuration(r.jbe_durationms)}</td>
                        <td>${formatDate(r.createdon)}</td>
                    </tr>`;
                } else {
                    other++;
                    rhtml += `<tr>
                        <td><strong>${tid}</strong></td>
                        <td><span class="badge badge-skipped">Noch nie gelaufen</span></td>
                        <td>-</td><td>-</td>
                    </tr>`;
                }
            }
            rhtml += `</tbody></table>`;

            // Story-Level KPIs
            const total = testIds.length;
            const storyPct = total > 0 ? Math.round(passed / total * 100) : 0;
            const summary = `<div style="display:flex;gap:16px;margin-bottom:12px;font-size:13px">
                <span style="color:var(--accent-green)">Passed: ${passed}</span>
                <span style="color:var(--accent-red)">Failed: ${failed}</span>
                <span style="color:var(--text-muted)">Andere: ${other}</span>
                <span>Gesamt: ${total}</span>
                <span style="font-weight:600;color:${storyPct === 100 ? 'var(--accent-green)' : 'var(--accent-yellow)'}">Story-Abdeckung: ${storyPct}%</span>
            </div>`;
            $("#story-results").innerHTML = summary + rhtml;
        } else {
            $("#story-results").innerHTML = `<div class="empty-state">No test cases to evaluate.</div>`;
        }

    } catch (err) {
        $("#story-cases").innerHTML = `<span style="color:var(--accent-red)">${escapeHtml(err.message)}</span>`;
    }
}

const MetaCache = { entities: null, attributes: {}, optionSets: null, customApis: null };

function metaTypeBadge(type) {
    const map = { "StringType": ["String","string"], "MemoType": ["Memo","memo"], "IntegerType": ["Int","int"],
        "BigIntType": ["BigInt","int"], "DecimalType": ["Decimal","int"], "DoubleType": ["Double","int"],
        "MoneyType": ["Money","money"], "BooleanType": ["Bool","bool"],
        "DateTimeType": ["DateTime","datetime"], "LookupType": ["Lookup","lookup"],
        "PicklistType": ["OptionSet","optionset"], "StateType": ["State","optionset"],
        "StatusType": ["Status","optionset"], "EntityNameType": ["EntityName","string"],
        "UniqueidentifierType": ["GUID","string"], "ManagedPropertyType": ["Managed","other"],
        "CustomerType": ["Customer","lookup"], "OwnerType": ["Owner","lookup"],
        "PartyListType": ["PartyList","lookup"], "ImageType": ["Image","other"],
        "FileType": ["File","other"], "MultiSelectPicklistType": ["MultiSelect","optionset"],
        "VirtualType": ["Virtual","other"] };
    const [label, cls] = map[type] || [type || "?", "other"];
    return `<span class="meta-type-badge meta-type-${cls}">${label}</span>`;
}

function copyToClipboard(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
        if (btn) { btn.classList.add("copied"); btn.textContent = "Kopiert!"; setTimeout(() => { btn.classList.remove("copied"); btn.textContent = "Kopieren"; }, 1500); }
    });
}
window.copyToClipboard = copyToClipboard;

async function renderMetadata(tab, entityId) {
    const activeTab = tab || "entities";
    render(`<h2 style="margin-bottom:16px">${LANG.meta_explorer}</h2>
    <div class="meta-tabs">
        <button class="${activeTab==='entities'?'active':''}" onclick="location.hash='#metadata/entities'">${LANG.meta_tables}</button>

    </div>
    <div id="meta-content">${LANG.common_loading}</div>`);

    switch (activeTab) {
        case "entities": entityId ? await loadEntityAttributes(entityId) : await loadEntities(); break;
        case "optionsets": await loadOptionSets(); break;
        case "customapis": await loadCustomApis(); break;

async function loadEntities() {
    try {
        if (!MetaCache.entities) {
            const data = await API.fetch("/EntityDefinitions?$select=LogicalName,DisplayName,SchemaName,IsCustomEntity,IsCustomizable,EntitySetName");
            MetaCache.entities = (data?.value || []).sort((a, b) => (a.LogicalName || "").localeCompare(b.LogicalName || ""));
        }
        let entities = MetaCache.entities;

        // Filter UI
        let html = `<div class="toolbar" style="margin-bottom:16px">
            <input type="text" class="form-input search-input" id="meta-entity-search" placeholder="${LANG.meta_search}">
            <label class="checkbox-label"><input type="checkbox" id="meta-custom-only"> Nur Custom</label>
            <label class="checkbox-label"><input type="checkbox" id="meta-publisher-only" checked> Nur jbe_</label>
        </div>`;

        const renderTable = (list) => {
            let t = `<table class="data-table"><thead><tr><th>Schema Name</th><th>Display Name</th><th>Custom</th><th>EntitySet</th><th></th></tr></thead><tbody>`;
            for (const e of list.slice(0, 200)) {
                const displayName = e.DisplayName?.UserLocalizedLabel?.Label || e.DisplayName?.LocalizedLabels?.[0]?.Label || "-";
                const isCustom = e.IsCustomEntity ? `<span class="badge badge-active">${LANG.common_yes}</span>` : `<span class="badge badge-disabled">${LANG.common_no}</span>`;
                t += `<tr>
                    <td><button class="copy-btn" onclick="copyToClipboard('${e.LogicalName}', this)">${e.LogicalName}</button></td>
                    <td>${displayName}</td>
                    <td>${isCustom}</td>
                    <td style="font-size:11px;color:var(--text-muted)">${e.EntitySetName || "-"}</td>
                    <td><a href="#metadata/entities/${e.LogicalName}" class="btn btn-sm">${LANG.meta_attributes}</a></td>
                </tr>`;
            }
            t += `</tbody></table><div style="color:var(--text-muted);font-size:12px;margin-top:8px">${list.length} Tabellen${list.length > 200 ? " (erste 200 angezeigt)" : ""}</div>`;
            return t;
        };

        const applyFilter = () => {
            const search = ($("#meta-entity-search")?.value || "").toLowerCase();
            const customOnly = $("#meta-custom-only")?.checked;
            const publisherOnly = $("#meta-publisher-only")?.checked;
            let filtered = entities;
            if (search) filtered = filtered.filter(e => e.LogicalName.includes(search) || (e.DisplayName?.UserLocalizedLabel?.Label || "").toLowerCase().includes(search));
            if (customOnly) filtered = filtered.filter(e => e.IsCustomEntity);
            if (publisherOnly) filtered = filtered.filter(e => e.LogicalName.startsWith("jbe_"));
            $("#meta-table").innerHTML = renderTable(filtered);
        };

        html += `<div id="meta-table">${renderTable(entities.filter(e => e.LogicalName.startsWith("jbe_")))}</div>`;
        $("#meta-content").innerHTML = html;

async function loadEntityAttributes(entityName) {
    try {
        const cacheKey = entityName;
        if (!MetaCache.attributes[cacheKey]) {
            const data = await API.fetch(`/EntityDefinitions(LogicalName='${entityName}')/Attributes?$select=LogicalName,DisplayName,AttributeType,RequiredLevel,IsCustomAttribute,SchemaName,Description`);
            if (data?.value) data.value.sort((a, b) => (a.LogicalName || "").localeCompare(b.LogicalName || ""));
            MetaCache.attributes[cacheKey] = data?.value || [];

            // Load OptionSet values for Picklist attributes
            const picklists = MetaCache.attributes[cacheKey].filter(a => a.AttributeType === "Picklist" || a.AttributeType === "State" || a.AttributeType === "Status");
            for (const pl of picklists.slice(0, 30)) {
                try {
                    const optData = await API.fetch(`/EntityDefinitions(LogicalName='${entityName}')/Attributes(LogicalName='${pl.LogicalName}')/Microsoft.Dynamics.CRM.PicklistAttributeMetadata?$select=LogicalName&$expand=OptionSet($select=Options)`);
                    pl._options = optData?.OptionSet?.Options || [];
                } catch { pl._options = []; }
            }
        }

        const attrs = MetaCache.attributes[cacheKey];

        let html = `<div style="margin-bottom:16px"><a href="#metadata/entities" style="color:var(--accent-blue);text-decoration:none">&larr; Zur\u00fcck zu Tabellen</a></div>`;
        html += `<h3 style="margin-bottom:12px">${entityName} <button class="copy-btn" onclick="copyToClipboard('${entityName}', this)">Kopieren</button></h3>`;
        html += `<div class="toolbar" style="margin-bottom:12px">
            <input type="text" class="form-input search-input" id="meta-attr-search" placeholder="Attribut suchen...">
            <label class="checkbox-label"><input type="checkbox" id="meta-attr-custom" checked> Nur Custom</label>
        </div>`;

        const renderAttrs = (list) => {
            let t = `<table class="data-table"><thead><tr><th>Schema Name</th><th>Display Name</th><th>Type</th><th>Required</th><th></th></tr></thead><tbody>`;
            for (const a of list.slice(0, 300)) {
                const displayName = a.DisplayName?.UserLocalizedLabel?.Label || "-";
                const required = a.RequiredLevel?.Value === "ApplicationRequired" ? `<span class="badge badge-failed">Pflicht</span>` : a.RequiredLevel?.Value === "Recommended" ? `<span class="badge badge-running">Empfohlen</span>` : "";
                let optHtml = "";
                if (a._options && a._options.length > 0) {
                    optHtml = `<ul class="meta-optionset-list">` + a._options.map(o => `<li><code>${o.Value}</code> = ${o.Label?.UserLocalizedLabel?.Label || o.Label?.LocalizedLabels?.[0]?.Label || "?"}</li>`).join("") + `</ul>`;
                }
                t += `<tr>
                    <td><button class="copy-btn" onclick="copyToClipboard('${a.LogicalName}', this)">${a.LogicalName}</button>${optHtml}</td>
                    <td>${displayName}</td>
                    <td>${metaTypeBadge(a.AttributeType)}</td>
                    <td>${required}</td>
                    <td><button class="btn btn-sm" onclick="showAttrSnippet('${entityName}','${a.LogicalName}','${a.AttributeType}')">Snippet</button></td>
                </tr>`;
            }
            t += `</tbody></table><div style="color:var(--text-muted);font-size:12px;margin-top:8px">${list.length} Attribute</div>`;
            return t;
        };

        const applyFilter = () => {
            const search = ($("#meta-attr-search")?.value || "").toLowerCase();
            const customOnly = $("#meta-attr-custom")?.checked;
            let filtered = attrs;
            if (search) filtered = filtered.filter(a => a.LogicalName.includes(search) || (a.DisplayName?.UserLocalizedLabel?.Label || "").toLowerCase().includes(search));
            if (customOnly) filtered = filtered.filter(a => a.IsCustomAttribute);
            $("#meta-attr-table").innerHTML = renderAttrs(filtered);
        };

        html += `<div id="meta-attr-table">${renderAttrs(attrs.filter(a => a.IsCustomAttribute))}</div>`;
        html += `<div id="meta-attr-snippet"></div>`;
        $("#meta-content").innerHTML = html;

        $("#meta-attr-search").addEventListener("input", applyFilter);
        $("#meta-attr-custom").addEventListener("change", applyFilter);

    } catch (err) {
        $("#meta-content").innerHTML = `<div class="empty-state" style="color:var(--accent-red)">${escapeHtml(err.message)}</div>`;
    }
}

window.showAttrSnippet = function(entity, attr, type) {
    const stepSnippet = '{ "action": "CreateRecord", "entity": "' + entity + '", "alias": "rec1", "fields": { "' + attr + '": "" } }';
    const updateSnippet = '{ "action": "UpdateRecord", "alias": "rec1", "fields": { "' + attr + '": "" } }';
    const assertSnippet = '{ "target": "Record:rec1", "field": "' + attr + '", "operator": "Equals", "value": "" }';
    window._metaSnippets = { step: stepSnippet, update: updateSnippet, assert: assertSnippet };
    var html = '<div class="meta-detail">';
    html += '<div style="font-weight:600;margin-bottom:8px">' + entity + '.' + attr + ' (' + type + ')</div>';
    html += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">JSON-Snippets f\u00fcr Testf\u00e4lle:</div>';
    html += '<div style="margin-bottom:8px;font-size:12px;color:var(--text-muted)">Create-Step:</div>';
    html += '<div class="meta-snippet">' + escapeHtml(stepSnippet) + '<button class="copy-btn" onclick="copyToClipboard(window._metaSnippets.step, this)">Kopieren</button></div>';
    html += '<div style="margin-bottom:8px;margin-top:12px;font-size:12px;color:var(--text-muted)">Update-Step:</div>';
    html += '<div class="meta-snippet">' + escapeHtml(updateSnippet) + '<button class="copy-btn" onclick="copyToClipboard(window._metaSnippets.update, this)">Kopieren</button></div>';
    html += '<div style="margin-bottom:8px;margin-top:12px;font-size:12px;color:var(--text-muted)">Assertion:</div>';
    html += '<div class="meta-snippet">' + escapeHtml(assertSnippet) + '<button class="copy-btn" onclick="copyToClipboard(window._metaSnippets.assert, this)">Kopieren</button></div>';
    html += '</div>';
    $("#meta-attr-snippet").innerHTML = html;
};

async function loadOptionSets() {
    try {
        if (!MetaCache.optionSets) {
            const data = await API.fetch("/GlobalOptionSetDefinitions?$select=Name,DisplayName,OptionSetType&$orderby=Name asc");
            MetaCache.optionSets = data?.value || [];
        }
        let optionSets = MetaCache.optionSets;

        let html = `<div class="toolbar" style="margin-bottom:16px">
            <input type="text" class="form-input search-input" id="meta-os-search" placeholder="OptionSet suchen...">
            <label class="checkbox-label"><input type="checkbox" id="meta-os-publisher" checked> Nur jbe_</label>
        </div>`;

        const renderOS = (list) => {
            let t = `<table class="data-table"><thead><tr><th>Name</th><th>Display Name</th><th>Typ</th><th></th></tr></thead><tbody>`;
            for (const o of list.slice(0, 200)) {
                const displayName = o.DisplayName?.UserLocalizedLabel?.Label || "-";

                    <td><button class="copy-btn" onclick="copyToClipboard('${o.Name}', this)">${o.Name}</button></td>

window.loadOptionSetValues = async function(name) {
    try {
        const data = await API.fetch(`/GlobalOptionSetDefinitions(Name='${name}')?$select=Name,Options`);
        const options = data?.Options || [];
        let html = `<div class="meta-detail"><div style="font-weight:600;margin-bottom:8px">${name}</div>`;
        html += `<table class="data-table"><thead><tr><th>Wert</th><th>Label</th><th></th></tr></thead><tbody>`;
        for (const o of options) {
            const label = o.Label?.UserLocalizedLabel?.Label || o.Label?.LocalizedLabels?.[0]?.Label || "?";
            html += `<tr><td><button class="copy-btn" onclick="copyToClipboard('${o.Value}', this)">${o.Value}</button></td><td>${label}</td><td></td></tr>`;
        }
        html += `</tbody></table></div>`;
        $("#meta-os-values").innerHTML = html;
    } catch (err) {
        $("#meta-os-values").innerHTML = `<span style="color:var(--accent-red)">${escapeHtml(err.message)}</span>`;
    }
};

async function loadCustomApis() {
    try {
        if (!MetaCache.customApis) {
            const data = await API.getMany("customapis",
                "$select=uniquename,displayname,description,isfunction,bindingtype,allowedcustomprocessingsteptype" +
                "&$orderby=uniquename asc&$top=200");
            MetaCache.customApis = data;
        }
        let apis = MetaCache.customApis;

        let html = `<div class="toolbar" style="margin-bottom:16px">
            <input type="text" class="form-input search-input" id="meta-api-search" placeholder="Custom API suchen...">
            <label class="checkbox-label"><input type="checkbox" id="meta-api-publisher" checked> Nur jbe_</label>
        </div>`;

        const renderApis = (list) => {
            let t = `<table class="data-table"><thead><tr><th>Name</th><th>Display Name</th><th>Typ</th><th>Description</th><th></th></tr></thead><tbody>`;
            for (const a of list) {
                const type = a.isfunction ? `<span class="badge badge-active">Function</span>` : `<span class="badge badge-running">Action</span>`;
                t += `<tr>
                    <td><button class="copy-btn" onclick="copyToClipboard('${a.uniquename}', this)">${a.uniquename}</button></td>
                    <td>${a.displayname || "-"}</td>
                    <td>${type}</td>
                    <td style="font-size:12px;color:var(--text-secondary)">${(a.description || "").substring(0, 60)}</td>
                    <td><button class="btn btn-sm" onclick="showApiSnippet('${a.uniquename}')">Snippet</button></td>
                </tr>`;
            }
            t += `</tbody></table>`;
            return t;
        };

        const applyFilter = () => {
            const search = ($("#meta-api-search")?.value || "").toLowerCase();
            const publisherOnly = $("#meta-api-publisher")?.checked;
            let filtered = apis;
            if (search) filtered = filtered.filter(a => a.uniquename.toLowerCase().includes(search) || (a.displayname || "").toLowerCase().includes(search));
            if (publisherOnly) filtered = filtered.filter(a => a.uniquename.startsWith("jbe_"));
            $("#meta-api-table").innerHTML = renderApis(filtered);
        };

        html += `<div id="meta-api-table">${renderApis(apis.filter(a => a.uniquename.startsWith("jbe_")))}</div>`;
        html += `<div id="meta-api-snippet"></div>`;
        $("#meta-content").innerHTML = html;
        $("#meta-api-search").addEventListener("input", applyFilter);
        $("#meta-api-publisher").addEventListener("change", applyFilter);

    } catch (err) {
        $("#meta-content").innerHTML = `<div class="empty-state" style="color:var(--accent-red)">${escapeHtml(err.message)}</div>`;
    }
}

window.showApiSnippet = function(apiName) {
    const snippet = '{ "action": "ExecuteAction", "apiName": "' + apiName + '", "parameters": {} }';
    window._metaApiSnippet = snippet;
    var html = '<div class="meta-detail">';
    html += '<div style="font-weight:600;margin-bottom:8px">' + apiName + '</div>';
    html += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">Test Case-Step-Snippet:</div>';

    $("#meta-api-snippet").innerHTML = html;
};

// -- Flow Visualizer --

const FlowViz = {
    // Color scheme for node types
    colors: {
        create: { bg: "#1a3a5c", border: "#42a5f5", text: "#90caf9", label: "Create" },
        update: { bg: "#4a3a1a", border: "#ff9800", text: "#ffcc80", label: "Update" },
        wait:   { bg: "#2a2a3e", border: "#78909c", text: "#b0bec5", label: "Wait/Delay" },
        api:    { bg: "#3a1a4a", border: "#ab47bc", text: "#ce93d8", label: "Custom API" },
        assert_passed: { bg: "#1a3a1a", border: "#4caf50", text: "#a5d6a7", label: "Assert Passed" },
        assert_failed: { bg: "#3a1a1a", border: "#f44336", text: "#ef9a9a", label: "Assert Failed" },
        assert_pending: { bg: "#2a2a3e", border: "#78909c", text: "#b0bec5", label: "Assert (offen)" },
        precondition: { bg: "#1a2a3a", border: "#5c6bc0", text: "#9fa8da", label: "Precondition" }
    },

    // Parse a test case JSON definition into flow nodes
    parseDefinition(json, results) {
        const nodes = [];
        let def;
        try { def = typeof json === "string" ? JSON.parse(json) : json; } catch { return nodes; }

        // Phase 1: Preconditions
        const pre = def.preconditions || {};
        if (pre.createAccount !== false) {
            nodes.push({ id: "pre_account", phase: "precondition", type: "precondition",
                label: "Account erstellen", entity: "account",
                fields: pre.accountFields || {}, icon: "ACC" });
        }
        if (pre.createContact !== false) {
            nodes.push({ id: "pre_contact", phase: "precondition", type: "precondition",
                label: "Contact erstellen", entity: "contact",
                fields: pre.contactFields || {}, icon: "CON" });
        }
        const existingSources = pre.existingContactSources || pre.contactSources || [];
        for (let i = 0; i < existingSources.length; i++) {
            const src = existingSources[i];
            nodes.push({ id: `pre_cs_${i}`, phase: "precondition", type: "precondition",
                label: `ContactSource [${src.alias || i}]`, entity: "jbe_contactsource",
                fields: src, icon: "CS" });
        }

        // Phase 2: Steps
        const steps = def.steps || def.testSteps || [];
        for (let i = 0; i < steps.length; i++) {
            const step = steps[i];
            const action = step.action || step.type || "?";
            let type = "update";
            if (action.toLowerCase().includes("create")) type = "create";
            else if (action.toLowerCase().includes("wait") || action.toLowerCase().includes("delay")) type = "wait";
            else if (action.toLowerCase().includes("api") || action.toLowerCase().includes("governance")) type = "api";

            const fieldsToShow = step.fields || step.fieldUpdates || {};
            const alias = step.alias || step.contactSourceAlias || "";
            nodes.push({ id: `step_${i}`, phase: "step", type,
                label: action, entity: step.entity || "",
                alias: alias,
                fields: fieldsToShow,
                waitSeconds: step.waitSeconds || step.timeoutSeconds || null,
                icon: type === "create" ? "+" : type === "update" ? "U" : type === "wait" ? "W" : "API" });
        }

        // Phase 3: Assertions
        const assertions = def.assertions || def.expectedResults || [];
        for (let i = 0; i < assertions.length; i++) {
            const a = assertions[i];
            let assertType = "assert_pending";
            // If we have results, match them
            if (results && results[i]) {
                assertType = results[i].passed ? "assert_passed" : "assert_failed";
            }
            nodes.push({ id: `assert_${i}`, phase: "assertion", type: assertType,
                label: `${a.target || a.entity || "?"}.${a.field || "?"}`,
                entity: a.target || a.entity || "",
                operator: a.operator || "Equals",
                expected: a.value != null ? String(a.value) : a.expectedValue != null ? String(a.expectedValue) : "?",
                actual: results?.[i]?.actual != null ? String(results[i].actual) : null,
                icon: assertType === "assert_passed" ? "OK" : assertType === "assert_failed" ? "X" : "?" });
        }

        return nodes;
    },

    // Render SVG flow diagram
    renderSvg(nodes, containerId) {
        if (!nodes.length) {
            $(containerId).innerHTML = `<div class="empty-state">Keine Steps im Test Case found.</div>`;
            return;
        }

        const phases = {
            precondition: nodes.filter(n => n.phase === "precondition"),
            step: nodes.filter(n => n.phase === "step"),
            assertion: nodes.filter(n => n.phase === "assertion")
        };

        const nodeW = 180, nodeH = 72, gapX = 32, gapY = 16, phaseGap = 60;
        const headerH = 30;

        // Calculate columns per phase
        const maxRows = Math.max(phases.precondition.length, phases.step.length, phases.assertion.length, 1);
        const phaseCount = (phases.precondition.length > 0 ? 1 : 0) + (phases.step.length > 0 ? 1 : 0) + (phases.assertion.length > 0 ? 1 : 0);
        const totalW = phaseCount * (nodeW + phaseGap) + phaseGap;
        const totalH = headerH + maxRows * (nodeH + gapY) + 40;

        let svg = `<svg class="flow-svg" width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg">`;

        // Background
        svg += `<rect width="${totalW}" height="${totalH}" fill="var(--bg-primary)" rx="8"/>`;

        let colX = phaseGap / 2;
        const phaseOrder = ["precondition", "step", "assertion"];
        const phaseLabels = { precondition: "VORBEDINGUNGEN", step: "TESTSCHRITTE", assertion: "ASSERTIONS" };
        const phaseColors = { precondition: "#5c6bc0", step: "#42a5f5", assertion: "#66bb6a" };
        const nodePositions = {};

        for (const phaseName of phaseOrder) {
            const phaseNodes = phases[phaseName];
            if (phaseNodes.length === 0) continue;

            // Phase header
            svg += `<text x="${colX + nodeW/2}" y="${headerH - 8}" text-anchor="middle" fill="${phaseColors[phaseName]}" font-size="11" font-weight="600" letter-spacing="0.8">${phaseLabels[phaseName]}</text>`;

            // Nodes
            for (let i = 0; i < phaseNodes.length; i++) {
                const n = phaseNodes[i];
                const x = colX;
                const y = headerH + i * (nodeH + gapY);
                const c = this.colors[n.type] || this.colors.precondition;
                nodePositions[n.id] = { x, y, cx: x + nodeW/2, cy: y + nodeH/2 };

                // Node rectangle
                svg += `<g class="flow-node" data-node-id="${n.id}" onclick="FlowViz.showDetail('${n.id}')">`;
                svg += `<rect x="${x}" y="${y}" width="${nodeW}" height="${nodeH}" rx="6" fill="${c.bg}" stroke="${c.border}" stroke-width="1.5"/>`;

                // Icon circle
                svg += `<circle cx="${x + 20}" cy="${y + 22}" r="12" fill="${c.border}" opacity="0.25"/>`;
                svg += `<text x="${x + 20}" y="${y + 26}" text-anchor="middle" fill="${c.text}" font-size="10" font-weight="700">${n.icon}</text>`;

                // Label
                const labelText = n.label.length > 22 ? n.label.substring(0, 20) + ".." : n.label;
                svg += `<text x="${x + 38}" y="${y + 26}" fill="${c.text}" font-size="12" font-weight="600">${this.escSvg(labelText)}</text>`;

                // Subtitle (entity/alias or expected value)
                let subtitle = "";
                if (n.phase === "assertion") {
                    subtitle = `${n.operator} ${(n.expected || "").substring(0, 18)}`;
                } else if (n.alias) {
                    subtitle = `[${n.alias}]`;
                } else if (n.entity) {
                    subtitle = n.entity.replace("jbe_", "").replace("jbe_", "");
                }
                if (n.waitSeconds) subtitle = `Timeout: ${n.waitSeconds}s`;
                svg += `<text x="${x + 20}" y="${y + 48}" fill="${c.text}" font-size="10" opacity="0.7">${this.escSvg(subtitle.substring(0, 28))}</text>`;

                // Field count badge
                const fieldCount = n.fields ? Object.keys(n.fields).length : 0;
                if (fieldCount > 0 && n.phase !== "assertion") {
                    svg += `<rect x="${x + nodeW - 32}" y="${y + 6}" width="24" height="16" rx="8" fill="${c.border}" opacity="0.3"/>`;
                    svg += `<text x="${x + nodeW - 20}" y="${y + 18}" text-anchor="middle" fill="${c.text}" font-size="9">${fieldCount}F</text>`;
                }

                // Result badge for assertions
                if (n.phase === "assertion" && n.type !== "assert_pending") {
                    const rColor = n.type === "assert_passed" ? "#4caf50" : "#f44336";
                    const rText = n.type === "assert_passed" ? "PASS" : "FAIL";
                    svg += `<rect x="${x + nodeW - 40}" y="${y + nodeH - 22}" width="34" height="16" rx="3" fill="${rColor}" opacity="0.8"/>`;
                    svg += `<text x="${x + nodeW - 23}" y="${y + nodeH - 10}" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">${rText}</text>`;
                }

                svg += `</g>`;
            }

            colX += nodeW + phaseGap;
        }

        // Arrows between phases
        for (const phaseName of phaseOrder) {
            const phaseNodes = phases[phaseName];
            // Vertical arrows within phase
            for (let i = 0; i < phaseNodes.length - 1; i++) {
                const from = nodePositions[phaseNodes[i].id];
                const to = nodePositions[phaseNodes[i + 1].id];
                if (from && to) {
                    const y1 = from.y + nodeH;
                    const y2 = to.y;
                    svg += `<line x1="${from.cx}" y1="${y1}" x2="${to.cx}" y2="${y2}" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="4,4"/>`;
                    // Arrow head
                    svg += `<polygon points="${to.cx-4},${y2-6} ${to.cx+4},${y2-6} ${to.cx},${y2}" fill="var(--border)"/>`;
                }
            }
        }

        // Horizontal arrows between last precondition and first step, last step and first assertion
        const connectPhases = [["precondition", "step"], ["step", "assertion"]];
        for (const [from, to] of connectPhases) {
            const fromNodes = phases[from];
            const toNodes = phases[to];
            if (fromNodes.length > 0 && toNodes.length > 0) {
                const lastFrom = nodePositions[fromNodes[fromNodes.length - 1].id];
                const firstTo = nodePositions[toNodes[0].id];
                if (lastFrom && firstTo) {
                    const x1 = lastFrom.x + nodeW;
                    const y1 = lastFrom.cy;
                    const x2 = firstTo.x;
                    const y2 = firstTo.cy;
                    // Curved arrow
                    const midX = (x1 + x2) / 2;
                    svg += `<path d="M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}" fill="none" stroke="var(--accent-blue)" stroke-width="2" opacity="0.5"/>`;
                    svg += `<polygon points="${x2-6},${y2-4} ${x2-6},${y2+4} ${x2},${y2}" fill="var(--accent-blue)" opacity="0.5"/>`;
                }
            }
        }

        svg += `</svg>`;

        // Legend
        let legend = `<div class="flow-legend">`;
        for (const [key, c] of Object.entries(this.colors)) {
            if (key.startsWith("assert_")) continue; // Show only main types in legend
            legend += `<span class="flow-legend-item"><span class="flow-legend-swatch" style="background:${c.border}"></span>${c.label}</span>`;
        }
        legend += `<span class="flow-legend-item"><span class="flow-legend-swatch" style="background:#4caf50"></span>Passed</span>`;
        legend += `<span class="flow-legend-item"><span class="flow-legend-swatch" style="background:#f44336"></span>Failed</span>`;
        legend += `</div>`;

        $(containerId).innerHTML = legend + `<div class="flow-container">${svg}</div><div id="flow-detail-panel"></div>`;

        // Store nodes for detail view
        this._currentNodes = {};
        for (const n of nodes) this._currentNodes[n.id] = n;
    },

    showDetail(nodeId) {
        const n = this._currentNodes?.[nodeId];
        if (!n) return;
        const panel = $("#flow-detail-panel");
        if (!panel) return;

        const c = this.colors[n.type] || this.colors.precondition;
        let html = `<div class="flow-detail-panel" style="border-left: 3px solid ${c.border}">`;
        html += `<div class="detail-title" style="color:${c.text}">${n.label}</div>`;
        html += `<dl class="detail-fields">`;

        if (n.entity) html += `<dt>Entity</dt><dd>${n.entity}</dd>`;
        if (n.alias) html += `<dt>Alias</dt><dd>${n.alias}</dd>`;
        if (n.operator) html += `<dt>Operator</dt><dd>${n.operator}</dd>`;
        if (n.expected != null) html += `<dt>Erwartet</dt><dd>${escapeHtml(n.expected)}</dd>`;
        if (n.actual != null) html += `<dt>Actual</dt><dd style="color:${n.type === 'assert_failed' ? 'var(--accent-red)' : 'var(--accent-green)'}">${escapeHtml(n.actual)}</dd>`;
        if (n.waitSeconds) html += `<dt>Timeout</dt><dd>${n.waitSeconds}s</dd>`;

        // Fields
        if (n.fields && typeof n.fields === "object") {
            const entries = Object.entries(n.fields).filter(([k]) => !["alias","sourceSystem"].includes(k));
            if (entries.length > 0) {
                html += `<dt style="grid-column:1/-1;margin-top:8px;color:var(--text-primary);font-weight:600">Felder</dt><dd></dd>`;
                for (const [key, val] of entries) {
                    const displayVal = typeof val === "object" ? JSON.stringify(val) : String(val);
                    html += `<dt>${key}</dt><dd>${escapeHtml(displayVal)}</dd>`;
                }
            }
        }

        html += `</dl></div>`;
        panel.innerHTML = html;
    },

    escSvg(s) {
        return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
};

// Make FlowViz accessible from onclick
window.FlowViz = FlowViz;

// ── Utilities ───────────────────────────────────────────────────

function escapeHtml(s) {
    if (s == null) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

    } catch {
        JBELog.info("App", "Demo-Modus: Dataverse API nicht erreichbar, lade Demo-Daten");
        await activateDemoMode();
    }

    await loadUserInfo();
    const versionEl = document.getElementById("app-version");
    if (versionEl) versionEl.textContent = "v" + CONFIG.version;

    // Live-Modus: Pack-Selector als Tag-Filter mit Quick-Run
    if (!_demoModeActive) {
        const packSel = document.getElementById("pack-selector");
        if (packSel) {
            try {
                // Alle Tags aus Testfaellen aggregieren
                const cases = await API.getMany("jbe_testcases",
                    "$filter=jbe_enabled eq true&$select=jbe_tags&$top=500");
                const tagCounts = {};
                let totalCount = 0;
                for (const c of cases) {
                    totalCount++;
                    if (c.jbe_tags) {
                        for (const tag of c.jbe_tags.split(",").map(t => t.trim()).filter(Boolean)) {
                            tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                        }
                    }
                }
                // Sortiert nach Haeufigkeit
                const sortedTags = Object.entries(tagCounts).sort((a,b) => b[1] - a[1]);

                packSel.innerHTML = `<option value="">All (${totalCount})</option>`;
                for (const [tag, count] of sortedTags) {
                    packSel.innerHTML += `<option value="${tag}">${tag} (${count})</option>`;
                }

                // Quick-Run Button neben dem Selector
                const runBtn = document.createElement("button");
                runBtn.className = "btn btn-sm btn-primary";
                runBtn.style.cssText = "margin-left:6px;padding:4px 10px;font-size:11px";
                runBtn.textContent = "Run";
                runBtn.title = "Run filtered tests";
                runBtn.onclick = () => {
                    const tag = packSel.value;
                    if (tag) {
                        // Starte Testlauf mit Tag-Filter
                        location.hash = `#run/new?tag=${encodeURIComponent(tag)}`;
                    } else {
                        location.hash = "#run/new";
                    }
                };
                packSel.parentNode.insertBefore(runBtn, packSel.nextSibling);

                // Filter-Event: filtere die Testfaelle-Liste wenn sichtbar
                packSel.addEventListener("change", () => {
                    State.activeTagFilter = packSel.value;
                    if (location.hash.startsWith("#cases")) {
                        renderTestCases();
                    }
                });
                State.activeTagFilter = "";
            } catch {
                packSel.innerHTML = `<option value="">Live Mode</option>`;
            }
        }
    }

    JBELog.info("App", `Bereit. Version ${CONFIG.version} (${CONFIG.buildDate}). User: ${State.currentUserId || "Demo"}`);

    // CH-02: Warning bei Tab-Closen während Test Run
    window.addEventListener("beforeunload", e => {
        if (TestRunner._running) { e.preventDefault(); e.returnValue = ""; }
    });

    initRouter();
})();

})();
</script>
</body>
</html>
