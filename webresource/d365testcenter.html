/* ====== Visual Editor: VisualEditor ====== */

const VisualEditor = {
    _container: null,
    _currentMode: "visual", // visual, json, flow
    _previewTab: "flow",    // flow, json
    _eventsBound: false,    // guard: events only bound once

    render(containerId) {
        this._container = document.getElementById(containerId) || document.querySelector(containerId);
        if (!this._container) return;

        this._renderLayout();
        if (!this._eventsBound) {
            this._bindEvents();
            this._eventsBound = true;
        }
        DragDropManager.init(this._container);
        AliasAutocomplete.init(this._container);

        // Listen for EditorModel changes (only once)
        if (!this._modelListenerBound) {
            EditorModel.onChange(() => this._onModelChange());
            this._modelListenerBound = true;
        }
    },

    _renderLayout() {
        let html = "";

        // 3+1 column layout
        html += `<div class="ve-layout" id="ve-columns">`;

        // Column 1: Preconditions
        html += `<div class="ve-column" data-phase="precondition">`;
        html += `<div class="ve-column-header"><span>Preconditions</span><span class="ve-count" id="ve-pre-count">${EditorModel.preconditions.length}</span></div>`;
        html += `<div class="ve-column-body" id="ve-pre-body">`;
        EditorModel.preconditions.forEach((p, i) => {
            html += `<div class="ve-insert-zone" data-insert-phase="precondition" data-insert-idx="${i}" title="Insert here"><span class="ve-insert-btn">+</span></div>`;
            html += CardRenderer.renderPreconditionCard(p);
        });
        html += `</div>`;
        html += `<div style="padding:8px"><button class="ve-add-btn" data-add-phase="precondition">+ Add</button></div>`;
        html += `</div>`;

        // Column 2: Steps
        html += `<div class="ve-column" data-phase="step">`;
        html += `<div class="ve-column-header"><span>Test Steps</span><span class="ve-count" id="ve-step-count">${EditorModel.steps.length}</span></div>`;
        html += `<div class="ve-column-body" id="ve-step-body">`;
        EditorModel.steps.forEach((s, i) => {
            html += `<div class="ve-insert-zone" data-insert-phase="step" data-insert-idx="${i}" title="Insert here"><span class="ve-insert-btn">+</span></div>`;
            html += CardRenderer.renderStepCard(s);
        });
        html += `</div>`;
        html += `<div style="padding:8px"><button class="ve-add-btn" data-add-phase="step">+ Add</button></div>`;
        html += `</div>`;

        // Column 3: Assertions
        html += `<div class="ve-column" data-phase="assertion">`;
        html += `<div class="ve-column-header"><span>Assertions</span><span class="ve-count" id="ve-assert-count">${EditorModel.assertions.length}</span></div>`;
        html += `<div class="ve-column-body" id="ve-assert-body">`;
        EditorModel.assertions.forEach((a, i) => {
            html += `<div class="ve-insert-zone" data-insert-phase="assertion" data-insert-idx="${i}" title="Insert here"><span class="ve-insert-btn">+</span></div>`;
            html += CardRenderer.renderAssertionCard(a);
        });
        html += `</div>`;
        html += `<div style="padding:8px"><button class="ve-add-btn" data-add-phase="assertion">+ Add</button></div>`;
        html += `</div>`;

        // Column 4: Preview
        html += `<div class="ve-preview" id="ve-preview">`;
        html += `<div class="ve-preview-header">`;
        html += `<button class="ve-preview-tab active" data-preview-tab="flow">${LANG.editor_flow}</button>`;
        html += `<button class="ve-preview-tab" data-preview-tab="json">${LANG.editor_json}</button>`;
        html += `</div>`;
        html += `<div class="ve-preview-body" id="ve-preview-body"></div>`;
        html += `</div>`;

        html += `</div>`; // end ve-layout

        // Validation bar
        html += EditorValidator.renderValidationBar();

        this._container.innerHTML = html;
        this._updatePreview();
    },

    _bindEvents() {
        const container = this._container;

        // Delete card
        container.addEventListener("click", (e) => {
            const delBtn = e.target.closest("[data-delete]");
            if (delBtn) {
                const id = delBtn.dataset.delete;
                const phase = delBtn.dataset.phase;
                if (phase === "precondition") EditorModel.removePrecondition(id);
                else if (phase === "step") EditorModel.removeStep(id);
                else if (phase === "assertion") EditorModel.removeAssertion(id);
                return;
            }

            // Add field
            const addFieldBtn = e.target.closest("[data-add-field]");
            if (addFieldBtn) {
                const cardId = addFieldBtn.dataset.addField;
                const card = container.querySelector(`.ve-card[data-card-id="${cardId}"]`);
                const phase = card?.dataset.phase;
                if (phase === "precondition") {
                    const p = EditorModel.preconditions.find(x => x._id === cardId);
                    if (p) { p.fields[""] = ""; EditorModel._notify("updatePrecondition"); }
                } else if (phase === "step") {
                    const s = EditorModel.steps.find(x => x._id === cardId);
                    if (s) { s.fields[""] = ""; EditorModel._notify("updateStep"); }
                }
                return;
            }

            // Remove field
            const rmFieldBtn = e.target.closest("[data-remove-field]");
            if (rmFieldBtn) {
                const fieldName = rmFieldBtn.dataset.removeField;
                const card = rmFieldBtn.closest(".ve-card");
                const cardId = card?.dataset.cardId;
                const phase = card?.dataset.phase;
                if (phase === "precondition") {
                    const p = EditorModel.preconditions.find(x => x._id === cardId);
                    if (p && p.fields) { delete p.fields[fieldName]; EditorModel._notify("updatePrecondition"); }
                } else if (phase === "step") {
                    const s = EditorModel.steps.find(x => x._id === cardId);
                    if (s && s.fields) { delete s.fields[fieldName]; EditorModel._notify("updateStep"); }
                }
                return;
            }

            // Add filter to Query assertion
            const addFilterBtn = e.target.closest("[data-add-filter]");
            if (addFilterBtn) {
                const id = addFilterBtn.dataset.addFilter;
                const a = EditorModel.assertions.find(x => x._id === id);
                if (a) {
                    if (!a.filter) a.filter = {};
                    a.filter[""] = "";
                    EditorModel._notify("updateAssertion");
                }
                return;
            }

            // Remove filter from Query assertion
            const rmFilterBtn = e.target.closest("[data-remove-filter]");
            if (rmFilterBtn) {
                const id = rmFilterBtn.dataset.removeFilter;
                const key = rmFilterBtn.dataset.filterRmKey;
                const a = EditorModel.assertions.find(x => x._id === id);
                if (a && a.filter) {
                    delete a.filter[key];
                    EditorModel._notify("updateAssertion");
                }
                return;
            }

            // Insert at position (between cards)
            const insertZone = e.target.closest("[data-insert-phase]");
            if (insertZone) {
                const phase = insertZone.dataset.insertPhase;
                const idx = parseInt(insertZone.dataset.insertIdx);
                this._showAddMenu(insertZone, phase, idx);
                return;
            }

            // Add card at end (show menu)
            const addBtn = e.target.closest("[data-add-phase]");
            if (addBtn) {
                this._showAddMenu(addBtn, addBtn.dataset.addPhase, -1);
                return;
            }

            // Preview tab switch
            const previewTab = e.target.closest("[data-preview-tab]");
            if (previewTab) {
                this._previewTab = previewTab.dataset.previewTab;
                container.querySelectorAll(".ve-preview-tab").forEach(t => t.classList.remove("active"));
                previewTab.classList.add("active");
                this._updatePreview();
                return;
            }
        });

        // Value changes (debounced)
        let updateTimer = null;
        const scheduleUpdate = (fn) => {
            fn();
            clearTimeout(updateTimer);
            updateTimer = setTimeout(() => EditorModel._notify("fieldChange"), 300);
        };

        container.addEventListener("input", (e) => {
            // Entity name change (for "Beliebiger Datensatz")
            const entityInput = e.target.closest("[data-entity-for]");
            if (entityInput) {
                const id = entityInput.dataset.entityFor;
                const p = EditorModel.preconditions.find(x => x._id === id);
                if (p) { p.entity = entityInput.value; }
                clearTimeout(updateTimer);
                updateTimer = setTimeout(() => EditorModel._notify("entityChange"), 500);
                return;
            }

            // Field name rename (datalist-based)
            const renameInput = e.target.closest("[data-rename-field]");
            if (renameInput) {
                const oldName = renameInput.dataset.renameField;
                const newName = renameInput.value;
                if (oldName === newName) return;
                const card = renameInput.closest(".ve-card");
                const cardId = card?.dataset.cardId;
                const phase = card?.dataset.phase;
                const list = phase === "precondition" ? EditorModel.preconditions : EditorModel.steps;
                const item = list?.find(x => x._id === cardId);
                if (item && item.fields && newName) {
                    item.fields[newName] = item.fields[oldName] || "";
                    delete item.fields[oldName];
                    clearTimeout(updateTimer);
                    updateTimer = setTimeout(() => EditorModel._notify("fieldRename"), 300);
                }
                return;
            }

            // Alias change
            const aliasInput = e.target.closest("[data-alias-for]");
            if (aliasInput) {
                const id = aliasInput.dataset.aliasFor;
                const p = EditorModel.preconditions.find(x => x._id === id);
                if (p) { p.alias = aliasInput.value; }
                const s = EditorModel.steps.find(x => x._id === id);
                if (s) { s.alias = aliasInput.value; }
                clearTimeout(updateTimer);
                updateTimer = setTimeout(() => EditorModel._notify("aliasChange"), 500);
                return;
            }

            // Field value change
            const valueInput = e.target.closest("[data-field-key]");
            if (valueInput) {
                const fieldKey = valueInput.dataset.fieldKey;
                const card = valueInput.closest(".ve-card");
                const cardId = card?.dataset.cardId;
                const phase = card?.dataset.phase;
                const val = valueInput.value;
                if (phase === "precondition") {
                    const p = EditorModel.preconditions.find(x => x._id === cardId);
                    if (p && p.fields) { p.fields[fieldKey] = val; }
                } else if (phase === "step") {
                    const s = EditorModel.steps.find(x => x._id === cardId);
                    if (s && s.fields) { s.fields[fieldKey] = val; }
                }
                clearTimeout(updateTimer);
                updateTimer = setTimeout(() => EditorModel._notify("fieldChange"), 500);
                return;
            }

            // Wait seconds change
            const waitRange = e.target.closest("[data-wait-range]");
            if (waitRange) {
                const id = waitRange.dataset.waitRange;
                const s = EditorModel.steps.find(x => x._id === id);
                if (s) { s.waitSeconds = parseInt(waitRange.value); }
                const numInput = container.querySelector(`[data-wait-num="${id}"]`);
                if (numInput) numInput.value = waitRange.value;
                return;
            }
            const waitNum = e.target.closest("[data-wait-num]");
            if (waitNum) {
                const id = waitNum.dataset.waitNum;
                const s = EditorModel.steps.find(x => x._id === id);
                if (s) { s.waitSeconds = parseInt(waitNum.value) || 5; }
                const rangeInput = container.querySelector(`[data-wait-range="${id}"]`);
                if (rangeInput) rangeInput.value = waitNum.value;
                return;
            }

            // Query assertion: entity change
            const assertEntity = e.target.closest("[data-assert-entity]");
            if (assertEntity) {
                const id = assertEntity.dataset.assertEntity;
                const a = EditorModel.assertions.find(x => x._id === id);
                if (a) { a.entity = assertEntity.value; }
                clearTimeout(updateTimer);
                updateTimer = setTimeout(() => EditorModel._notify("assertChange"), 300);
                return;
            }

            // Query assertion: filter key rename
            const filterKeyInput = e.target.closest("[data-filter-key-input]");
            if (filterKeyInput) {
                const id = filterKeyInput.dataset.filterKeyInput;
                const oldKey = filterKeyInput.dataset.filterOldKey;
                const newKey = filterKeyInput.value;
                const a = EditorModel.assertions.find(x => x._id === id);
                if (a && a.filter && oldKey !== newKey) {
                    a.filter[newKey] = a.filter[oldKey] || "";
                    delete a.filter[oldKey];
                    clearTimeout(updateTimer);
                    updateTimer = setTimeout(() => EditorModel._notify("assertChange"), 500);
                }
                return;
            }

            // Query assertion: filter value change
            const filterValueInput = e.target.closest("[data-filter-value-input]");
            if (filterValueInput) {
                const id = filterValueInput.dataset.filterValueInput;
                const key = filterValueInput.dataset.filterForKey;
                const a = EditorModel.assertions.find(x => x._id === id);
                if (a && a.filter) { a.filter[key] = filterValueInput.value; }
                clearTimeout(updateTimer);
                updateTimer = setTimeout(() => EditorModel._notify("assertChange"), 300);
                return;
            }

            // Assertion field
            const assertField = e.target.closest("[data-assert-field]");
            if (assertField) {
                const id = assertField.dataset.assertField;
                const a = EditorModel.assertions.find(x => x._id === id);
                if (a) { a.field = assertField.value; }
                clearTimeout(updateTimer);
                updateTimer = setTimeout(() => EditorModel._notify("assertChange"), 300);
                return;
            }

            // Assertion expected
            const assertExpected = e.target.closest("[data-assert-expected]");
            if (assertExpected) {
                const id = assertExpected.dataset.assertExpected;
                const a = EditorModel.assertions.find(x => x._id === id);
                if (a) { a.expected = assertExpected.value; }
                clearTimeout(updateTimer);
                updateTimer = setTimeout(() => EditorModel._notify("assertChange"), 300);
                return;
            }

            // ExecuteAction target
            const targetInput = e.target.closest("[data-target-for]");
            if (targetInput) {
                const id = targetInput.dataset.targetFor;
                const s = EditorModel.steps.find(x => x._id === id);
                if (s) { s.target = targetInput.value; }
                return;
            }

            // Parameter values
            const paramInput = e.target.closest("[data-param-for]");
            if (paramInput) {
                const id = paramInput.dataset.paramFor;
                const key = paramInput.dataset.paramKey;
                const s = EditorModel.steps.find(x => x._id === id);
                if (s && s.parameters) { s.parameters[key] = paramInput.value; }
                return;
            }

            // Custom API name
            const customApi = e.target.closest("[data-custom-api]");
            if (customApi) {
                const id = customApi.dataset.customApi;
                const s = EditorModel.steps.find(x => x._id === id);
                if (s) { s.apiName = customApi.value; }
                return;
            }
        });

        // Select changes
        container.addEventListener("change", (e) => {
            // Source system
            const ssSel = e.target.closest("[data-ss-for]");
            if (ssSel) {
                const id = ssSel.dataset.ssFor;
                const p = EditorModel.preconditions.find(x => x._id === id);
                if (p) {
                    p.sourceSystem = parseInt(ssSel.value);
                    p.alias = EditorModel.generateContactSourceAlias(p.sourceSystem);
                    EditorModel._notify("updatePrecondition");
                }
                return;
            }

            // waitForAsync
            const wfaCb = e.target.closest("[data-wfa-for]");
            if (wfaCb) {
                const id = wfaCb.dataset.wfaFor;
                const p = EditorModel.preconditions.find(x => x._id === id);
                if (p) { p.waitForAsync = wfaCb.checked; }
                return;
            }

            // Assertion target
            const assertTarget = e.target.closest("[data-assert-target]");
            if (assertTarget) {
                const id = assertTarget.dataset.assertTarget;
                const a = EditorModel.assertions.find(x => x._id === id);
                if (a) { a.target = assertTarget.value; EditorModel._notify("assertChange"); }
                return;
            }

            // Assertion alias
            const assertAlias = e.target.closest("[data-assert-alias]");
            if (assertAlias) {
                const id = assertAlias.dataset.assertAlias;
                const a = EditorModel.assertions.find(x => x._id === id);
                if (a) { a.targetAlias = assertAlias.value; EditorModel._notify("assertChange"); }
                return;
            }

            // Assertion operator
            const assertOp = e.target.closest("[data-assert-op]");
            if (assertOp) {
                const id = assertOp.dataset.assertOp;
                const a = EditorModel.assertions.find(x => x._id === id);
                if (a) { a.operator = assertOp.value; EditorModel._notify("assertChange"); }
                return;
            }

            // API name input (datalist-based)
            const apiInput = e.target.closest("[data-api-input]");
            if (apiInput) {
                const id = apiInput.dataset.apiInput;
                const s = EditorModel.steps.find(x => x._id === id);
                if (s) { s.apiName = apiInput.value; }
                clearTimeout(updateTimer);
                updateTimer = setTimeout(() => EditorModel._notify("updateStep"), 500);
                return;
            }

            // Delete alias select
            const delAlias = e.target.closest("[data-del-alias]");
            if (delAlias) {
                const id = delAlias.dataset.delAlias;
                const s = EditorModel.steps.find(x => x._id === id);
                if (s) { s.alias = delAlias.value; }
                return;
            }
        });
    },

    _showAddMenu(anchor, phase, insertIdx) {
        // Remove existing menu
        document.querySelectorAll(".ve-add-menu").forEach(m => m.remove());

        const menu = document.createElement("div");
        menu.className = "ve-add-menu";

        let items = [];
        if (phase === "precondition") {
            items = [
                { label: "Account", desc: "Account as precondition", data: { entity: "accounts", alias: "account1", fields: { name: "{GENERATED:company}" } } },
                { label: "Contact", desc: "Contact as precondition", data: { entity: "contacts", alias: "contact1", fields: { firstname: "{GENERATED:firstname}", lastname: "{GENERATED:lastname}" } } },
                { label: "Lead", desc: "Lead as precondition", data: { entity: "leads", alias: "lead1", fields: { subject: "Test Lead {TIMESTAMP}", lastname: "{GENERATED:lastname}" } } },
                { label: "Custom Record", desc: "Any entity, name freely choosable", data: { entity: "", alias: "", fields: {} } }
            ];
        } else if (phase === "step") {
            items = [
                { label: "Update Record", desc: "Update an existing record", data: { action: "UpdateRecord", entity: "" } },
                { label: "Create Record", desc: "Create a new record", data: { action: "CreateRecord", entity: "" } },
                { label: "Wait", desc: "Wait (seconds)", data: { action: "Wait", waitSeconds: 10 } },
                { label: "Execute Action", desc: "Call a Custom API", data: { action: "ExecuteAction", apiName: "" } },
                { label: "Delete Record", desc: "Delete a record", data: { action: "DeleteRecord" } }
            ];
        } else if (phase === "assertion") {
            items = [
                { label: "Field Equals", desc: "Check a field value", data: { type: "FieldEquals", target: "Contact", operator: "Equals" } },
                { label: "Field Not Null", desc: "Field must be set", data: { type: "FieldEquals", target: "Contact", operator: "IsNotNull" } },
                { label: "Date Recently", desc: "Timestamp check", data: { type: "FieldEquals", target: "Contact", operator: "DateSetRecently" } },
                { label: "Record Exists", desc: "Record must exist", data: { type: "Exists", target: "Query", operator: "Exists" } },
                { label: "Record Not Exists", desc: "Record must not exist", data: { type: "NotExists", target: "Query", operator: "NotExists" } }
            ];
        }

        for (const item of items) {
            const btn = document.createElement("button");
            btn.className = "ve-add-menu-item";
            btn.innerHTML = `${escapeHtml(item.label)}<span class="ve-menu-desc">${escapeHtml(item.desc)}</span>`;
            btn.addEventListener("click", () => {
                menu.remove();
                if (phase === "precondition") {
                    const data = { ...item.data };
                    if (data.entity && data.entity.includes("contactsource") && !data.alias) {
                        data.alias = EditorModel.generateContactSourceAlias(data.sourceSystem || 4);
                    } else if (!data.alias) {
                        data.alias = EditorModel.generateAlias(data.entity);
                    }
                    if (insertIdx >= 0) EditorModel.insertPreconditionAt(insertIdx, data);
                    else EditorModel.addPrecondition(data);
                } else if (phase === "step") {
                    if (insertIdx >= 0) EditorModel.insertStepAt(insertIdx, item.data);
                    else EditorModel.addStep(item.data);
                } else if (phase === "assertion") {
                    if (insertIdx >= 0) EditorModel.insertAssertionAt(insertIdx, item.data);
                    else EditorModel.addAssertion(item.data);
                }
            });
            menu.appendChild(btn);
        }

        // Position menu
        const rect = anchor.getBoundingClientRect();
        menu.style.left = rect.left + "px";
        menu.style.top = (rect.bottom + 4) + "px";
        document.body.appendChild(menu);

        // Close on outside click
        const closeHandler = (e) => {
            if (!menu.contains(e.target) && e.target !== anchor) {
                menu.remove();
                document.removeEventListener("click", closeHandler);
            }
        };
        setTimeout(() => document.addEventListener("click", closeHandler), 0);
    },

    _onModelChange() {
        this._renderLayout();
        // Events are bound ONCE in render() via delegation - no re-binding needed
        DragDropManager.init(this._container);
    },

    _updatePreview() {
        const body = document.getElementById("ve-preview-body");
        if (!body) return;

        if (this._previewTab === "flow") {
            try {
                const json = EditorModel.toJSON();
                const flowData = FlowViz.parseDefinition(json);
                body.innerHTML = `<div class="flow-container" id="ve-flow-svg"></div>`;
                FlowViz.renderSvg(flowData, "#ve-flow-svg");
            } catch (e) {
                body.innerHTML = `<div style="padding:12px;color:var(--text-muted);font-size:12px">Flow-Vorschau nicht verf\u00fcgbar: ${escapeHtml(e.message)}</div>`;
            }
        } else {
            const jsonStr = EditorModel.toJSONString();
            body.innerHTML = `<div class="ve-json-preview">${escapeHtml(jsonStr)}</div>`;
        }
    },

    destroy() {
        if (this._container) this._container.innerHTML = "";
        this._container = null;
    }
};

// ── RecordTracker ───────────────────────────────────────────────

// ── ConcurrencyPool: Slot-basierte parallele Ausfuehrung ───────

const ConcurrencyPool = {
    async run(tasks, concurrency) {
        const results = new Array(tasks.length);
        let nextIndex = 0;
        const active = new Set();

        const dequeue = async () => {
            while (nextIndex < tasks.length) {
                const i = nextIndex++;
                const p = (async () => {
                    try { results[i] = await tasks[i](); }
                    catch (err) { results[i] = { _error: err }; }
                })().finally(() => active.delete(p));
                active.add(p);
                if (active.size >= concurrency) await Promise.race(active);
            }
        };
        await dequeue();
        await Promise.all(active);
        return results;
    }
};

// ── ProgressTracker: Thread-sichere Zaehler (debounced) ────────

const ProgressTracker = {
    _passed: 0,
    _failed: 0,
    _logLines: [],
    _runId: null,
    _total: 0,
    _updateTimer: null,
    _dirty: false,

    init(runId, total) {
        this._passed = 0;
        this._failed = 0;
        this._total = total;
        this._logLines = [];
        this._runId = runId;
        this._dirty = false;
        this._updateTimer = setInterval(() => this._flush(), 2000);
    },

    recordResult(testId, title, isPassed, durationMs, errorMessage) {
        if (isPassed) this._passed++; else this._failed++;
        const status = isPassed ? "BESTANDEN" : "FEHLGESCHLAGEN";
        const durStr = (durationMs / 1000).toFixed(1);
        let line = "[" + new Date().toLocaleTimeString("de-DE") + "] " +
            testId + " " + title + " ... " + status + " (" + durStr + "s)";
        if (errorMessage) line += " - " + errorMessage;
        this._logLines.push(line);
        this._dirty = true;
    },

    addLogLine(text) {
        this._logLines.push("[" + new Date().toLocaleTimeString("de-DE") + "] " + text);
        this._dirty = true;
    },

    get passed() { return this._passed; },
    get failed() { return this._failed; },
    get logText() { return this._logLines.join("\n"); },

    async _flush() {
        if (!this._dirty || !this._runId) return;
        this._dirty = false;
        try {
            await API.update("jbe_testruns", this._runId, {
                jbe_passed: this._passed,
                jbe_failed: this._failed,
                jbe_fulllog: this._logLines.join("\n")
            });
        } catch { /* best effort */ }
    },

    async finalize() {
        if (this._updateTimer) clearInterval(this._updateTimer);
        this._updateTimer = null;
        await this._flush();
    }
};

// ── TestExecutionContext: Isolierter Kontext pro Test ───────────

function createTestExecutionContext(baseContext) {
    return {
        context: { ...baseContext },
        aliasMap: {},
        stepLog: [],
        assertionResults: [],
        tracker: {
            _created: [],
            reset() { this._created = []; },
            track(entity, id, alias, entitySingular) {
                this._created.push({ entity, id, alias, entitySingular: entitySingular || entity });
            },
            getTrackedRecords() { return [...this._created]; },
            async cleanup(stepLog) {
                const reversed = [...this._created].reverse();
                for (const rec of reversed) {
                    const t0 = performance.now();
                    try {
                        await API.del(rec.entity, rec.id);
                        if (stepLog) stepLog.push({
                            phase: "Cleanup", action: "DeleteRecord", entity: rec.entitySingular,
                            alias: rec.alias, recordId: rec.id, duration: Math.round(performance.now() - t0),
                            status: "Success"
                        });
                    } catch (err) {
                        if (stepLog) stepLog.push({
                            phase: "Cleanup", action: "DeleteRecord", entity: rec.entitySingular,
                            alias: rec.alias, recordId: rec.id, duration: Math.round(performance.now() - t0),
                            status: "Failed", error: err.message
                        });
                    }
                }
                this._created = [];
            }
        }
    };
}

// ── RecordTracker (Legacy, fuer Einzeltest-Ausfuehrung) ────────

const RecordTracker = {
    _created: [],

    reset() { this._created = []; },

    track(entity, id, alias, entitySingular) {
        this._created.push({ entity, id, alias, entitySingular: entitySingular || entity });
    },

    getTrackedRecords() { return [...this._created]; },

    async cleanup(stepLog) {
        const reversed = [...this._created].reverse();
        for (const rec of reversed) {
            const t0 = performance.now();
            try {
                await API.del(rec.entity, rec.id);
                if (stepLog) stepLog.push({
                    phase: "Cleanup", action: "DeleteRecord", entity: rec.entitySingular,
                    alias: rec.alias, recordId: rec.id, duration: Math.round(performance.now() - t0),
                    status: "Success"
                });
            } catch (err) {
                if (stepLog) stepLog.push({
                    phase: "Cleanup", action: "DeleteRecord", entity: rec.entitySingular,
                    alias: rec.alias, recordId: rec.id, duration: Math.round(performance.now() - t0),
                    status: "Failed", error: err.message
                });
            }
        }
        this._created = [];
    }
};

// ── StepExecutor ────────────────────────────────────────────────

const StepExecutor = {
    async runTestCase(definition, context, keepRecords, executionCtx) {
        const aliasMap = executionCtx?.aliasMap || {};
        const stepLog = executionCtx?.stepLog || [];
        const assertionResults = executionCtx?.assertionResults || [];
        const tracker = executionCtx?.tracker || RecordTracker;
        const t0 = performance.now();
        let outcome = CONFIG.optionSets.outcomePassed;
        let errorMessage = "";

        tracker.reset();

        try {
            // Phase 1: Preconditions
            const preconds = this._normalizePreconditions(definition.preconditions);
            for (const pre of preconds) {
                const result = await this._executeStep(pre, aliasMap, context, "Precondition", tracker);
                stepLog.push(result);
                if (result.status === "Failed") {
                    outcome = CONFIG.optionSets.outcomeFailed;
                    errorMessage = `Precondition fehlgeschlagen: ${result.error}`;
                    break;
                }
            }

            // AliasMap nach Preconditions loggen
            if (Object.keys(aliasMap).length > 0) {
                JBELog.info("StepExecutor", `  AliasMap:`, Object.fromEntries(
                    Object.entries(aliasMap).map(([k, v]) => [k, `${v.entity} ${v.id?.substring(0,8)}...`])
                ));
            }

            // Phase 2: Steps
            if (outcome === CONFIG.optionSets.outcomePassed && definition.steps) {
                for (const step of definition.steps) {
                    const result = await this._executeStep(step, aliasMap, context, "Step", tracker);
                    stepLog.push(result);
                    if (result.status === "Failed") {
                        outcome = CONFIG.optionSets.outcomeFailed;
                        errorMessage = `Step fehlgeschlagen: ${step.action} ${step.entity || ""} - ${result.error}`;
                        break;
                    }
                }
            }

            // Phase 3: Assertions
            if (outcome === CONFIG.optionSets.outcomePassed && definition.assertions) {
                for (const assertion of definition.assertions) {
                    const result = await this._executeAssertion(assertion, aliasMap, context);
                    stepLog.push(result);
                    assertionResults.push({
                        field: result.assertionField || "",
                        operator: result.assertionOperator || "Equals",
                        expected: result.expectedValue || "",
                        actual: result.actualValue || "",
                        passed: result.status === "Success"
                    });
                    if (result.status === "Failed" && outcome === CONFIG.optionSets.outcomePassed) {
                        outcome = CONFIG.optionSets.outcomeFailed;
                        errorMessage = `Assertion failed: ${result.assertionField} ${result.assertionOperator} expected "${result.expectedValue}", actual "${result.actualValue}"`;
                    }
                }
            }
        } catch (err) {
            outcome = CONFIG.optionSets.outcomeError;
            errorMessage = `Unerwarteter Error: ${err.message}`;
            stepLog.push({ phase: "Step", action: "Error", status: "Failed", error: err.message,
                duration: Math.round(performance.now() - t0) });
        }

        // Phase 4: Cleanup (nur wenn explizit keepRecords=false)
        if (!keepRecords) {
            const tracked = tracker.getTrackedRecords();
            if (tracked.length > 0) {
                JBELog.info("StepExecutor", `  [Cleanup] ${tracked.length} Records cleanup...`);
            }
            await tracker.cleanup(stepLog);
        } else {
            const tracked = tracker.getTrackedRecords();
            if (tracked.length > 0) {
                JBELog.info("StepExecutor", `  [KeepRecords] ${tracked.length} Records beibehalten`);
                tracked.forEach(r => JBELog.info("StepExecutor", `    ${r.entity} ${r.id} (${r.alias || "-"})`));
            }
        }

        return {
            outcome,
            duration_ms: Math.round(performance.now() - t0),
            error_message: errorMessage,
            assertion_results: assertionResults,
            steps: stepLog,
            trackedRecords: tracker.getTrackedRecords()
        };
    },

    _normalizePreconditions(preconditions) {
        if (!preconditions) return [];
        // New format: Array of {entity, alias, fields, waitForAsync}
        if (Array.isArray(preconditions)) return preconditions.map(p => ({
            action: "CreateRecord", entity: p.entity, alias: p.alias, fields: p.fields || {},
            // ContactSource-Creates: automatisch waitForAsync, damit die FG zwischen
            // jedem Create abschließt und die Timestamp-Reihenfolge deterministisch ist.
            // Entspricht dem Verhalten des WinForms-TestTools.
            waitForAsync: p.waitForAsync !== undefined ? p.waitForAsync
                : this._isContactSourceEntity(p.entity)
        }));
        // Old format: {createAccount, createContact, existingContactSources}
        const result = [];
        if (preconditions.createAccount !== false) {
            result.push({ action: "CreateRecord", entity: "accounts", alias: "account1",
                fields: preconditions.accountFields || { name: "{GENERATED:company}" }});
        }
        if (preconditions.createContact !== false) {
            const cFields = preconditions.contactFields || { firstname: "{GENERATED:firstname}", lastname: "{GENERATED:lastname}" };
            if (preconditions.createAccount !== false && !cFields["parentcustomerid_account@odata.bind"]) {
                cFields["parentcustomerid_account@odata.bind"] = "/accounts({account1.id})";
            }
            result.push({ action: "CreateRecord", entity: "contacts", alias: "contact1", fields: cFields });
        }
        if (preconditions.existingContactSources) {
            for (const cs of preconditions.existingContactSources) {
                const fields = { ...(cs.fields || {}), [CONFIG.governance.sourceSystemField]: cs.sourceSystem };
                if (!fields[CONFIG.governance.contactLookup + "@odata.bind"]) {
                    fields[CONFIG.governance.contactLookup + "@odata.bind"] = "/contacts({contact1.id})";
                }
                result.push({ action: "CreateRecord", entity: CONFIG.governance.sourceEntitySet,
                    alias: cs.alias || `cs_${result.length}`, fields,
                    waitForAsync: cs.waitForAsync !== false }); // Default: true fuer ContactSources
            }
        }
        return result;
    },

    async _executeStep(step, aliasMap, context, phase, tracker) {
        if (!tracker) tracker = RecordTracker;
        const action = step.action || step.type || "Unknown";
        const t0 = performance.now();
        JBELog.info("StepExecutor", `  [${phase}] ${action} ${step.entity || ""} ${step.alias ? "("+step.alias+")" : ""}`);
        const resolvedFields = PlaceholderResolver.resolve(step.fields || {}, aliasMap, context);
        const resolvedParams = PlaceholderResolver.resolve(step.parameters || {}, aliasMap, context);
        if (Object.keys(resolvedFields).length > 0) {
            JBELog.info("StepExecutor", `    Fields (resolved):`, resolvedFields);
        }
        if (Object.keys(resolvedParams).length > 0) {
            JBELog.info("StepExecutor", `    Parameters (resolved):`, resolvedParams);
        }
        const logEntry = {
            phase, action, entity: step.entity || "", alias: step.alias || "",
            recordId: "", inputData: resolvedFields, outputData: null, duration: 0,
            status: "Success", error: ""
        };

        try {
            switch (action) {
                case "CreateRecord": {
                    if (this._isContactSourceEntity(step.entity)) this._autoSetDateFields(resolvedFields);
                    const resp = await API.create(step.entity, resolvedFields);
                    const pk = this._findPrimaryKey(resp, step.entity);
                    logEntry.recordId = pk;
                    logEntry.outputData = resp;
                    if (step.alias) {
                        aliasMap[step.alias] = { id: pk, entity: step.entity, fields: resp };
                        // Backward compat: account1 -> ACCOUNT_ID, contact1 -> CONTACT_ID
                        if (step.entity === "accounts" && !context.accountId) context.accountId = pk;
                        if (step.entity === "contacts" && !context.contactId) context.contactId = pk;
                    }
                    tracker.track(step.entity, pk, step.alias, step.entity);
                    break;
                }
                case "UpdateRecord": {
                    const target = aliasMap[step.alias];
                    if (!target) throw new Error(`Alias "${step.alias}" not found`);
                    if (this._isContactSourceEntity(target.entity)) this._autoSetDateFields(resolvedFields);
                    await API.update(target.entity, target.id, resolvedFields);
                    logEntry.entity = target.entity;
                    logEntry.recordId = target.id;
                    // Refresh alias fields
                    Object.assign(target.fields, resolvedFields);
                    break;
                }
                case "DeleteRecord": {
                    const target = aliasMap[step.alias];
                    if (!target) throw new Error(`Alias "${step.alias}" not found`);
                    await API.del(target.entity, target.id);
                    logEntry.entity = target.entity;
                    logEntry.recordId = target.id;
                    break;
                }
                case "Wait": {
                    const ms = (step.waitSeconds || 5) * 1000;
                    logEntry.inputData = { waitSeconds: step.waitSeconds || 5 };
                    await new Promise(r => setTimeout(r, ms));
                    break;
                }
                case "ExecuteAction":
                case "CallGovernanceApiContact": {
                    const apiName = step.apiName || CONFIG.governance.governanceApi;
                    logEntry.inputData = resolvedParams;
                    logEntry.entity = apiName;
                    const resp = await API.executeAction(apiName, resolvedParams);
                    logEntry.outputData = resp;
                    break;
                }
                case "CreateContactSource":
                case "UpdateContactSource": {
                    // Legacy actions mapped to generic CRUD
                    this._autoSetDateFields(resolvedFields);
                    if (action === "CreateContactSource") {
                        const csEntity = CONFIG.governance.sourceEntitySet;
                        const resp = await API.create(csEntity, resolvedFields);
                        const pk = this._findPrimaryKey(resp, csEntity);
                        logEntry.recordId = pk;
                        logEntry.outputData = resp;
                        logEntry.entity = csEntity;
                        if (step.alias) aliasMap[step.alias] = { id: pk, entity: csEntity, fields: resp };
                        tracker.track(csEntity, pk, step.alias);
                    } else {
                        const target = aliasMap[step.alias];
                        if (!target) throw new Error(`Alias "${step.alias}" not found`);
                        await API.update(target.entity, target.id, resolvedFields);
                        logEntry.entity = target.entity;
                        logEntry.recordId = target.id;
                    }
                    break;
                }
                default:
                    logEntry.status = "Skipped";
                    logEntry.error = `Unknown action: ${action}`;
            }

            // Handle waitForAsync: Smart Governance Polling statt fixem Timer
            // Auto-waitForAsync fuer alle ContactSource-Creates (Preconditions UND Steps),
            // damit die FG zwischen jedem Create abschliesst. Kann mit waitForAsync:false deaktiviert werden.
            const shouldWaitForAsync = step.waitForAsync !== undefined ? step.waitForAsync
                : (action === "CreateRecord" || action === "CreateContactSource") && this._isContactSourceEntity(step.entity || CONFIG.governance.sourceEntitySet);
            if (shouldWaitForAsync) {
                const timeoutMs = step.maxDurationMs || 120000;
                const pollingMs = step.pollingIntervalMs || 2000;
                const contactId = context.contactId;
                const contactSourceId = logEntry.recordId || (aliasMap[step.alias]?.id);
                const actionTimestamp = new Date();
                actionTimestamp.setSeconds(actionTimestamp.getSeconds() - 2); // 2s Clock-Skew-Toleranz

                logEntry.inputData = { ...logEntry.inputData, waitForAsync: true, timeoutMs, pollingMs };

                if (contactId && this._isContactSourceEntity(step.entity || aliasMap[step.alias]?.entity)) {
                    // Smart Governance Polling on logging entity
                    JBELog.info("StepExecutor", `    Governance polling: waiting for governance log for contact ${contactId.substring(0,8)}... (timeout ${timeoutMs/1000}s, alle ${pollingMs/1000}s)`);
                    const result = await this._waitForGovernance(contactId, contactSourceId, actionTimestamp, timeoutMs, pollingMs);
                    if (result.found) {
                        JBELog.info("StepExecutor", `    Governance abgeschlossen nach ${result.polls} Polls, ${(result.duration/1000).toFixed(1)}s`);
                        JBELog.info("StepExecutor", `    CDH-Log: ${result.logName}`);
                        if (result.contactUpdated !== undefined) {
                            JBELog.info("StepExecutor", `    ContactUpdated=${result.contactUpdated}`);
                        }
                        logEntry.outputData = { ...logEntry.outputData, governanceLog: result };
                    } else {
                        JBELog.warn("StepExecutor", `    Governance-Timeout nach ${timeoutMs/1000}s (${result.polls} Polls)`);
                        logEntry.outputData = { ...logEntry.outputData, governanceTimeout: true, polls: result.polls };
                    }
                } else {
                    // Fallback: fixer Timer für nicht-ContactSource-Entities
                    JBELog.info("StepExecutor", `    waitForAsync: warte ${timeoutMs/1000}s...`);
                    await new Promise(r => setTimeout(r, timeoutMs));
                }
            }
        } catch (err) {
            logEntry.status = "Failed";
            logEntry.error = err.message;
            JBELog.warn("StepExecutor", `    FEHLER: ${action} ${step.entity || ""} - ${err.message}`);
        }

        logEntry.duration = Math.round(performance.now() - t0);
        if (logEntry.status === "Success" && logEntry.recordId) {
            JBELog.info("StepExecutor", `    OK (${logEntry.duration}ms) -> ${logEntry.recordId}`);
        }
        return logEntry;
    },

    _isContactSourceEntity(entity) {
        if (!entity) return false;
        const lower = entity.toLowerCase();
        const govEntity = CONFIG.governance.sourceEntity.toLowerCase();
        return lower === govEntity || lower === CONFIG.governance.sourceEntitySet.toLowerCase()
            || lower.includes("contactsource") || lower.includes("contact_source");
    },

    /**
     * Auto-set _modifiedondate fields for ContactSource governance fields.
     * Mirrors WinForms AutoSetDateFieldsForUpdate: when a value field is present
     * but its corresponding date field is not, set the date field to now (UTC ISO).
     * This is required for the CDH Field Governance plugin to detect changes.
     */
    _autoSetDateFields(fields) {
        const DATE_MAPPING = CONFIG.governance.autoDateFields;
        const now = new Date().toISOString();
        let added = 0;
        for (const [valueField, dateField] of Object.entries(DATE_MAPPING)) {
            if (fields.hasOwnProperty(valueField) && !fields.hasOwnProperty(dateField)) {
                fields[dateField] = now;
                added++;
            }
        }
        if (added > 0) {
            JBELog.info("StepExecutor", `    AutoSetDateFields: ${added} _modifiedondate Feld(er) automatisch gesetzt`);
        }
        return fields;
    },

    async _waitForGovernance(contactId, contactSourceId, afterTimestamp, timeoutMs, pollingMs) {
        const startTime = performance.now();
        let polls = 0;
        const isoAfter = afterTimestamp.toISOString();

        // Initial Delay (1.5s) damit der async System-Job starten kann
        await new Promise(r => setTimeout(r, Math.min(pollingMs, 1500)));

        while ((performance.now() - startTime) < timeoutMs) {
            polls++;
            try {
                // Query governance logging entity: filter by contactId and timestamp
                const gov = CONFIG.governance;
                let filter = `${gov.contactLookupOdata} eq '${contactId}' and createdon ge ${isoAfter}`;
                // Only query real fields (ContactUpdated etc. are in the diagnostics text)
                const select = `${gov.loggingPk},${gov.loggingName},${gov.loggingDiagnostics},createdon,${gov.sourceIdLookup}`;
                const url = `/${gov.loggingEntitySet}?$filter=${encodeURIComponent(filter)}&$select=${select}&$orderby=createdon desc&$top=10`;
                const resp = await API.fetch(url);
                let logs = resp?.value || [];

                // Filter nach ContactSourceId (wie WinForms-Tool)
                if (contactSourceId && logs.length > 0) {
                    const filtered = logs.filter(l =>
                        l[gov.sourceIdLookup] === contactSourceId
                    );
                    if (filtered.length > 0) logs = filtered;
                }

                if (logs.length > 0) {
                    const log = logs[0];
                    // ContactUpdated und PisaTriggered aus Diagnostics-Text parsen
                    const diag = log[gov.loggingDiagnostics] || "";
                    const contactUpdated = /ContactUpdated[=:]\s*(True|true)/i.test(diag) ? true :
                                           /ContactUpdated[=:]\s*(False|false)/i.test(diag) ? false : null;
                    const pisaTriggered = /PisaTriggered[=:]\s*(True|true)/i.test(diag) ? true :
                                          /PisaTriggered[=:]\s*(False|false)/i.test(diag) ? false : null;
                    return {
                        found: true,
                        polls,
                        duration: Math.round(performance.now() - startTime),
                        logId: log[gov.loggingPk],
                        logName: log[gov.loggingName] || "(no name)",
                        contactUpdated,
                        pisaTriggered,
                        diagnostics: diag.substring(0, 500),
                        createdOn: log.createdon
                    };
                }
            } catch (err) {
                JBELog.warn("StepExecutor", `    Governance poll ${polls} Error: ${err.message}`);
            }
            await new Promise(r => setTimeout(r, pollingMs));
        }
        return { found: false, polls, duration: Math.round(performance.now() - startTime) };
    },

    async _executeAssertion(assertion, aliasMap, context) {
        const t0 = performance.now();
        const target = assertion.target || "Query";
        const field = assertion.field || "";
        const operator = assertion.operator || "Equals";
        const expected = PlaceholderResolver.resolve(
            assertion.value ?? assertion.expectedValue ?? "", aliasMap, context);
        let actual = null;
        JBELog.info("StepExecutor", `  [Assertion] ${target}.${field} ${operator} "${expected}"`);

        const logEntry = {
            phase: "Assertion", action: "Assert", entity: "", alias: "",
            recordId: "", inputData: { target, field, operator, expected },
            outputData: null, duration: 0, status: "Success", error: "",
            assertionField: `${target}.${field}`, assertionOperator: operator,
            expectedValue: String(expected), actualValue: ""
        };

        try {
            let record = null;
            // Lookup-Felder: OData Navigation Properties brauchen _fieldname_value Syntax
            const LOOKUP_FIELDS = {
                "parentcustomerid": "_parentcustomerid_value",
                "ownerid": "_ownerid_value",
                "transactioncurrencyid": "_transactioncurrencyid_value"
            };
            // Add governance lookup fields dynamically
            for (const lf of CONFIG.governance.lookupFields) {
                LOOKUP_FIELDS[lf] = `_${lf}_value`;
            }
            const selectField = LOOKUP_FIELDS[field] || field;

            if (target === "Contact" || target === "contact") {
                record = await API.getOne("contacts", context.contactId, selectField);
                // Lookup-Wert unter dem Original-Feldnamen verfuegbar machen
                if (selectField !== field && record) record[field] = record[selectField];
                logEntry.entity = "contacts";
                logEntry.recordId = context.contactId;
            } else if (target.startsWith("Record:")) {
                const alias = target.substring(7);
                const ref = aliasMap[alias];
                if (!ref) throw new Error(`Alias "${alias}" not found`);
                record = await API.getOne(ref.entity, ref.id, field);
                logEntry.entity = ref.entity;
                logEntry.recordId = ref.id;
                logEntry.alias = alias;
            } else if (target.startsWith("ContactSource:")) {
                const alias = target.substring(14);
                const ref = aliasMap[alias];
                if (!ref) throw new Error(`Alias "${alias}" not found`);
                record = await API.getOne(ref.entity, ref.id, field);
                logEntry.entity = ref.entity;
                logEntry.recordId = ref.id;
                logEntry.alias = alias;
            } else if (target === "Query" || target === "CdhLogging" || target === "AuditLog") {
                const entity = assertion.entity || CONFIG.governance.loggingEntitySet;
                let filterObj = assertion.filter ? PlaceholderResolver.resolve(assertion.filter, aliasMap, context) : {};
                // Bei CdhLogging/AuditLog automatisch Contact-Filter setzen wenn kein Filter definiert
                if ((target === "CdhLogging" || target === "AuditLog") && Object.keys(filterObj).length === 0 && context.contactId) {
                    filterObj = { [CONFIG.governance.contactLookupOdata]: context.contactId };
                }
                const filterParts = Object.entries(filterObj).map(([k, v]) => {
                    // Numbers and booleans without quotes, strings/GUIDs with quotes
                    const needsQuotes = typeof v === "string" && isNaN(v);
                    return needsQuotes ? `${k} eq '${v}'` : `${k} eq ${v}`;
                }).join(" and ");
                let query = `$top=1&$orderby=createdon desc`;
                // CdhLogging: immer Diagnostics-Text laden (ContactUpdated/PisaTriggered stehen dort)
                if (target === "CdhLogging") {
                    query += `&$select=${CONFIG.governance.loggingPk},${CONFIG.governance.loggingName},${CONFIG.governance.loggingDiagnostics},createdon`;
                } else if (field) {
                    query += `&$select=${field}`;
                }
                if (filterParts) query += `&$filter=${filterParts}`;
                const results = await API.getMany(entity, query);
                record = results?.[0] || null;
                // CdhLogging: virtuelle Felder aus Diagnostics-Text parsen
                if (target === "CdhLogging" && record) {
                    const diag = record[CONFIG.governance.loggingDiagnostics] || "";
                    record.ContactUpdated = /ContactUpdated[=:]\s*(True|true)/i.test(diag) ? "true" :
                                            /ContactUpdated[=:]\s*(False|false)/i.test(diag) ? "false" : null;
                    record.PisaTriggered = /PisaTriggered[=:]\s*(True|true)/i.test(diag) ? "true" :
                                           /PisaTriggered[=:]\s*(False|false)/i.test(diag) ? "false" : null;
                    // UpdatedFields extrahieren
                    const ufMatch = diag.match(/Updated Fields?[=:]\s*([^\n\r]+)/i);
                    record.UpdatedFields = ufMatch ? ufMatch[1].trim() : null;
                }
                logEntry.entity = entity;
            } else {
                // Fallback: treat target as alias
                const ref = aliasMap[target];
                if (ref) {
                    record = await API.getOne(ref.entity, ref.id, field);
                    logEntry.entity = ref.entity;
                    logEntry.recordId = ref.id;
                }
            }

            // Bei Exists/NotExists: prüfe ob Record existiert (nicht Feldwert)
            if (operator === "Exists" || operator === "NotExists") {
                actual = record ? "exists" : null;
                logEntry.actualValue = record ? "Record gefunden" : "Kein Record";
            } else if (operator === "ContactUpdated" || operator === "PisaTriggered") {
                // Virtuelle Felder aus CdhLogging-Diagnostics (kein echtes Dataverse-Feld)
                actual = record ? record[operator] : null;
                logEntry.actualValue = String(actual ?? "null");
            } else {
                actual = record ? record[field] : null;
                logEntry.actualValue = String(actual ?? "null");
            }
            logEntry.outputData = record;
            const displayField = field || operator; // Virtuelle Felder wie ContactUpdated haben kein field
            JBELog.info("StepExecutor", `    Quelle: ${logEntry.entity} ${logEntry.recordId ? "("+logEntry.recordId.substring(0,8)+"...)" : ""}`);
            JBELog.info("StepExecutor", `    ${operator === "Exists" || operator === "NotExists" ? "Record: " + (record ? "gefunden" : "not found") : 'Feld "' + displayField + '" = "' + (actual ?? "null") + '"'}`);

            const passed = this._evaluate(actual, operator, expected);
            logEntry.status = passed ? "Success" : "Failed";
            if (!passed) {
                logEntry.error = `${displayField}: erwartet ${operator} "${expected}", actual "${actual}"`;
            }
        } catch (err) {
            logEntry.status = "Failed";
            logEntry.error = err.message;
            logEntry.actualValue = "ERROR";
        }

        logEntry.duration = Math.round(performance.now() - t0);
        const assertSymbol = logEntry.status === "Success" ? "OK" : "FAIL";
        JBELog.info("StepExecutor", `    [${assertSymbol}] ${logEntry.assertionField} ${operator} "${expected}" (actual: "${logEntry.actualValue}")`);
        return logEntry;
    },

    _evaluate(actual, operator, expected) {
        switch (operator) {
            case "Equals":             return String(actual ?? "") === String(expected);
            case "NotEquals":          return String(actual ?? "") !== String(expected);
            case "Contains":           return String(actual ?? "").includes(String(expected));
            case "IsNull":             return actual == null || actual === "";
            case "IsNotNull":          return actual != null && actual !== "";
            case "GreaterThan":        return Number(actual) > Number(expected);
            case "LessThan":           return Number(actual) < Number(expected);
            case "GreaterThanOrEqual": return Number(actual) >= Number(expected);
            case "LessThanOrEqual":    return Number(actual) <= Number(expected);
            case "StartsWith":         return String(actual ?? "").startsWith(String(expected));
            case "EndsWith":           return String(actual ?? "").endsWith(String(expected));
            case "Exists":             return actual != null && actual !== "" && actual !== "ERROR";
            case "NotExists":          return actual == null || actual === "";
            case "ContactUpdated":     return String(actual ?? "").toLowerCase() === String(expected).toLowerCase();
            case "DateSetRecently": {
                // Prüft ob ein Datetime-Feld innerhalb der letzten N Minuten gesetzt wurde (Default: 5)
                if (actual == null || actual === "") return false;
                const maxAgeMinutes = expected ? Number(expected) : 5;
                const dateValue = new Date(actual);
                const ageMs = Date.now() - dateValue.getTime();
                return ageMs >= 0 && ageMs <= maxAgeMinutes * 60 * 1000;
            }
            default:                   return String(actual ?? "") === String(expected);
        }
    },

    _findPrimaryKey(record, entity) {
        if (!record) return "";
        // Try standard pattern: entityid (singular, without trailing 's' or 'es')
        const singular = entity.replace(/ies$/, "y").replace(/ses$/, "s").replace(/s$/, "");
        const pkField = singular + "id";
        if (record[pkField]) return record[pkField];
        // Fallback: first field ending with 'id' that contains a GUID
        for (const [k, v] of Object.entries(record)) {
            if (k.endsWith("id") && typeof v === "string" && v.length > 30) return v;
        }
        return "";
    }
};

// ── StepLogger ──────────────────────────────────────────────────

const StepLogger = {
    _phaseMap: { Precondition: 105710000, Step: 105710001, Assertion: 105710002, Cleanup: 105710003 },
    _statusMap: { Success: 105710000, Failed: 105710001, Skipped: 105710002 },

    async save(testrunresultId, steps, envUrl) {
        for (let i = 0; i < steps.length; i++) {
            const s = steps[i];
            const body = {
                "jbe_TestRunResultId@odata.bind": `/jbe_testrunresults(${testrunresultId})`,
                jbe_stepnumber: i + 1,
                jbe_phase: this._phaseMap[s.phase] || 105710001,
                jbe_action: s.action || "",
                jbe_entity: s.entity || "",
                jbe_alias: s.alias || "",
                jbe_recordid: s.recordId || "",
                jbe_durationms: s.duration || 0,
                jbe_stepstatus: this._statusMap[s.status] || 105710001
            };
            if (s.recordId && s.entity && envUrl) {
                const singular = s.entity.replace(/ies$/, "y").replace(/ses$/, "s").replace(/s$/, "");
                body.jbe_recordurl = `${envUrl}/main.aspx?etn=${singular}&id=${s.recordId}&pagetype=entityrecord`;
            }
            if (s.inputData) body.jbe_inputdata = typeof s.inputData === "string" ? s.inputData : JSON.stringify(s.inputData, null, 2);
            if (s.outputData) body.jbe_outputdata = typeof s.outputData === "string" ? s.outputData : JSON.stringify(s.outputData, null, 2);
            if (s.error) body.jbe_errormessage = s.error;
            if (s.assertionField) body.jbe_assertionfield = s.assertionField;
            if (s.assertionOperator) body.jbe_assertionoperator = s.assertionOperator;
            if (s.expectedValue !== undefined) body.jbe_expectedvalue = String(s.expectedValue);
            if (s.actualValue !== undefined) body.jbe_actualvalue = String(s.actualValue);

            try {
                await API.create("jbe_teststeps", body);
            } catch (err) {
                console.warn("StepLogger: Error saving step " + (i + 1) + ": " + err.message);
            }
        }
    }
};

// ── TestRunner ──────────────────────────────────────────────────

const TestRunner = {
    _running: false,

    async execute(runId, concurrency) {
        if (this._running) { JBELog.warn("TestRunner", "Already running, call ignored"); return; }
        this._running = true;
        const conc = concurrency || 1;
        // CH-03: Prevent pack switch during test run
        const packSel = document.querySelector("select");
        if (packSel) packSel.disabled = true;
        JBELog.info("TestRunner", `=== Test run started (Concurrency: ${conc}) ===`, { runId });

        try {
            // 1. Run-Record laden
            const run = await API.getOne("jbe_testruns", runId,
                "jbe_testcasefilter,jbe_keeprecords");
            const filter = run.jbe_testcasefilter || "*";
            // keepRecords ist jetzt Default true (Retain by Default)
            const keepRecords = run.jbe_keeprecords !== false;
            JBELog.info("TestRunner", `Filter: "${filter}", keepRecords: ${keepRecords}, concurrency: ${conc}`);

            // 2. Testfälle laden und filtern
            const allCases = await API.getMany("jbe_testcases",
                "$select=jbe_testcaseid,jbe_testid,jbe_title,jbe_category,jbe_tags,jbe_userstories,jbe_enabled,jbe_definitionjson&$orderby=jbe_testid asc&$top=500");
            const matchingCases = this._filterCases(allCases, filter);
            JBELog.info("TestRunner", `${allCases.length} test cases loaded, ${matchingCases.length} after filter`);

            // 3. Run auf "Running" setzen
            await API.update("jbe_testruns", runId, {
                jbe_teststatus: CONFIG.optionSets.statusRunning,
                jbe_total: matchingCases.length,
                jbe_passed: 0,
                jbe_failed: 0,
                jbe_startedon: new Date().toISOString()
            });

            // 4. Base Context (jeder Test bekommt eine Kopie)
            const envUrl = typeof window !== "undefined" ? window.location.origin : "";
            const baseContext = {
                contactId: null, accountId: null,
                currentUserId: State.currentUserId || "",
                envUrl: envUrl.includes("crm4.dynamics.com") ? envUrl : ""
            };

            // 5. ProgressTracker initialisieren
            ProgressTracker.init(runId, matchingCases.length);
            ProgressTracker.addLogLine("Test run started, Filter: " + filter + ", Concurrency: " + conc);

            // 6. Tasks erstellen und parallel ausfuehren
            const tasks = matchingCases.map(tc => () => this._executeOneTest(tc, baseContext, keepRecords, runId));
            await ConcurrencyPool.run(tasks, conc);

            // 7. Run abschliessen
            await ProgressTracker.finalize();
            const summary = matchingCases.length + " tests executed. " +
                ProgressTracker.passed + " bestanden, " + ProgressTracker.failed + " fehlgeschlagen.";
            ProgressTracker.addLogLine("Test run completed: " + ProgressTracker.passed + " Passed, " + ProgressTracker.failed + " Failed");
            JBELog.info("TestRunner", `=== Test run completed: ${ProgressTracker.passed} Passed, ${ProgressTracker.failed} Failed (${matchingCases.length} Tests) ===`);

            await API.update("jbe_testruns", runId, {
                jbe_teststatus: CONFIG.optionSets.statusCompleted,
                jbe_passed: ProgressTracker.passed,
                jbe_failed: ProgressTracker.failed,
                jbe_completedon: new Date().toISOString(),
                jbe_testsummary: summary,
                jbe_fulllog: ProgressTracker.logText
            });

        } catch (err) {
            // Engine-Level error
            JBELog.error("TestRunner", "Engine-Error: " + err.message, err);
            try { await ProgressTracker.finalize(); } catch { /* best effort */ }
            try {
                await API.update("jbe_testruns", runId, {
                    jbe_teststatus: CONFIG.optionSets.statusError,
                    jbe_completedon: new Date().toISOString(),
                    jbe_fulllog: "FEHLER: " + err.message
                });
            } catch { /* best effort */ }
        } finally {
            this._running = false;
            // CH-03: Pack-Wechsel wieder erlauben
            const packSel = document.querySelector("select");
            if (packSel) packSel.disabled = false;
        }
    },

    // Einzelner Test innerhalb des ConcurrencyPool
    async _executeOneTest(tc, baseContext, keepRecords, runId) {
        // Isolierter Kontext pro Test
        const execCtx = createTestExecutionContext(baseContext);

        let definition = null;
        try {
            const defJson = tc.jbe_definitionjson;
            definition = typeof defJson === "string" ? JSON.parse(defJson) : defJson;
        } catch (err) {
            const resultBody = { jbe_testid: tc.jbe_testid, jbe_outcome: CONFIG.optionSets.outcomeFailed, jbe_durationms: 0,
                jbe_errormessage: "Invalid JSON definition: " + err.message };
            if (_demoModeActive) resultBody["_jbe_testrunid_value"] = runId;
            else resultBody["jbe_TestRunId@odata.bind"] = `/jbe_testruns(${runId})`;
            await API.create("jbe_testrunresults", resultBody);
            ProgressTracker.recordResult(tc.jbe_testid, tc.jbe_title, false, 0, "JSON-Error: " + err.message);
            return;
        }

        if (!definition) {
            const resultBody = { jbe_testid: tc.jbe_testid, jbe_outcome: CONFIG.optionSets.outcomePassed, jbe_durationms: 0 };
            if (_demoModeActive) resultBody["_jbe_testrunid_value"] = runId;
            else resultBody["jbe_TestRunId@odata.bind"] = `/jbe_testruns(${runId})`;
            await API.create("jbe_testrunresults", resultBody);
            ProgressTracker.recordResult(tc.jbe_testid, tc.jbe_title, true, 0);
            return;
        }

        // Test ausfuehren
        JBELog.info("TestRunner", `Starte ${tc.jbe_testid}...`);
        const result = await StepExecutor.runTestCase(definition, execCtx.context, keepRecords, execCtx);
        const dur = result.duration_ms;
        const isPassed = result.outcome === CONFIG.optionSets.outcomePassed;

        JBELog.info("TestRunner", `${tc.jbe_testid}: ${isPassed ? "BESTANDEN" : "FEHLGESCHLAGEN"} (${(dur/1000).toFixed(1)}s)${result.error_message ? " - " + result.error_message : ""}`);

        // Ergebnis in ProgressTracker
        ProgressTracker.recordResult(tc.jbe_testid, tc.jbe_title, isPassed, dur, result.error_message);

        // Ergebnis in Dataverse speichern (mit tracked Records fuer spaeteres Cleanup)
        const trackedJson = JSON.stringify(result.trackedRecords || []);
        const resultBody = {
            jbe_testid: tc.jbe_testid,
            jbe_outcome: result.outcome,
            jbe_durationms: dur,
            jbe_errormessage: result.error_message || "",
            jbe_assertionresults: JSON.stringify(result.assertion_results),
            jbe_trackedrecords: trackedJson
        };
        if (_demoModeActive) resultBody["_jbe_testrunid_value"] = runId;
        else resultBody["jbe_TestRunId@odata.bind"] = `/jbe_testruns(${runId})`;

        const savedResult = await API.create("jbe_testrunresults", resultBody);

        // Step-Log speichern
        if (result.steps && result.steps.length > 0) {
            const resultId = savedResult?.jbe_testrunresultid || this._findId(savedResult, "jbe_testrunresult");
            if (resultId) {
                await StepLogger.save(resultId, result.steps, execCtx.context.envUrl);
            }
        }
    },

    async _updateRunProgress(runId, passed, failed, logLines) {
        try {
            await API.update("jbe_testruns", runId, {
                jbe_passed: passed,
                jbe_failed: failed,
                jbe_fulllog: logLines.join("\n")
            });
        } catch { /* best effort, polling will catch up */ }
    },

    _filterCases(cases, filter) {
        let result = cases.filter(tc => tc.jbe_enabled !== false);
        if (filter === "*") return result;

        if (filter.startsWith("category:")) {
            const catName = filter.substring(9).toLowerCase().replace(/\s/g, "");
            const catMap = { updatesource: CONFIG.optionSets.catUpdateSource, createsource: CONFIG.optionSets.catCreateSource, pisa: CONFIG.optionSets.catPISA, multisource: CONFIG.optionSets.catMultiSource, additionalfields: CONFIG.optionSets.catAdditionalFields, bridge: CONFIG.optionSets.catBridge, merge: CONFIG.optionSets.catMerge, recompute: CONFIG.optionSets.catRecompute, config: CONFIG.optionSets.catRecompute, errorhandling: CONFIG.optionSets.catErrorInjection, error: CONFIG.optionSets.catErrorInjection, errorinjection: CONFIG.optionSets.catErrorInjection };
            const catVal = catMap[catName];
            if (catVal != null) result = result.filter(tc => tc.jbe_category === catVal);
        } else if (filter.startsWith("tag:")) {
            const tag = filter.substring(4).toLowerCase();
            result = result.filter(tc => (tc.jbe_tags || "").toLowerCase().includes(tag));
        } else if (filter.startsWith("story:")) {
            const story = filter.substring(6).toUpperCase();
            result = result.filter(tc => (tc.jbe_userstories || "").toUpperCase().includes(story));
        } else {
            const ids = filter.split(",").map(s => s.trim().toUpperCase());
            result = result.filter(tc => ids.includes((tc.jbe_testid || "").toUpperCase()));
        }
        return result;
    },

    _findId(record, entityLogical) {
        if (!record) return null;
        const pk = entityLogical.replace(/s$/, "") + "id";
        if (record[pk]) return record[pk];
        for (const [k, v] of Object.entries(record)) {
            if (k.endsWith("id") && typeof v === "string" && v.length > 30) return v;
        }
        return null;
    }
};
