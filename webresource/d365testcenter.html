// ── Router ──────────────────────────────────────────────────────

function initRouter() {
    window.addEventListener("hashchange", handleRoute);
    handleRoute();
}

function handleRoute() {
    const hash = (location.hash || "#dashboard").substring(1);
    const parts = hash.split("/");
    const view = parts[0];
    const param = parts[1] || null;
    const param2 = parts[2] || null;

    // Nav active state
    document.querySelectorAll("#app-nav a").forEach(a => {
        a.classList.toggle("active", a.dataset.view === view ||
            (view === "run" && a.dataset.view === "run"));
    });

    State.currentView = view;
    stopPolling();
    // Reset visual editor template state on navigation
    window._veTemplateChosen = false;
    window._veChosenTemplate = null;

    switch (view) {
        case "dashboard": renderDashboard(); break;
        case "cases":
            if (param) renderTestCaseEditor(param);
            else renderTestCases();
            break;
        case "run":
            if (param === "new") renderNewRun();
            else if (param) renderRunDetail(param);
            else renderNewRun();
            break;
        case "runs": renderRunHistory(); break;
        case "stories":
            if (param) renderStoryDetail(param);
            else renderUserStories();
            break;
        case "history":
            if (param) renderTestHistory(param);
            break;
        case "metadata": renderMetadata(param, param2); break;
        case "help": renderHelp(param); break;
        default: renderDashboard();
    }
}

// ── Chart Renderer (SVG) ────────────────────────────────────────

const Charts = {
    pie(data, size = 160) {
        if (!data.length) return "";
        const total = data.reduce((s, d) => s + d.value, 0);
        if (total === 0) return "";
        const cx = size / 2, cy = size / 2, r = size / 2 - 10;
        let startAngle = -Math.PI / 2;
        let paths = "";
        let legend = "";

        for (const d of data) {
            const pct = d.value / total;
            const angle = pct * 2 * Math.PI;
            const endAngle = startAngle + angle;
            const x1 = cx + r * Math.cos(startAngle);
            const y1 = cy + r * Math.sin(startAngle);
            const x2 = cx + r * Math.cos(endAngle);
            const y2 = cy + r * Math.sin(endAngle);
            const large = angle > Math.PI ? 1 : 0;
            if (pct > 0.001) {
                paths += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z" fill="${d.color}" opacity="0.85"/>`;
            }
            legend += `<span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:12px"><span style="width:10px;height:10px;background:${d.color};border-radius:2px;display:inline-block"></span>${d.label}: ${d.value} (${(pct*100).toFixed(0)}%)</span>`;
            startAngle = endAngle;
        }

        return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg><div style="margin-top:8px">${legend}</div>`;
    },

    bar(data, width = 400, height = 120) {
        if (!data.length) return "";
        const max = Math.max(...data.map(d => d.value), 1);
        const barW = Math.min(30, (width - 40) / data.length - 4);
        let bars = "";
        let labels = "";
        const x0 = 40, y0 = height - 20;

        for (let i = 0; i < data.length; i++) {
            const x = x0 + i * (barW + 4);
            const h = (data[i].value / max) * (height - 40);
            bars += `<rect x="${x}" y="${y0 - h}" width="${barW}" height="${h}" fill="${data[i].color || 'var(--accent-blue)'}" rx="2" opacity="0.85"/>`;
            labels += `<text x="${x + barW/2}" y="${y0 + 14}" text-anchor="middle" fill="var(--text-muted)" font-size="10">${data[i].label}</text>`;
        }

        return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">${bars}${labels}</svg>`;
    },

    timeline(data, width = 600) {
        if (!data.length) return "";
        const max = Math.max(...data.map(d => d.duration), 1);
        const barH = 24, gap = 4;
        const height = data.length * (barH + gap) + 20;
        let bars = "";

        for (let i = 0; i < data.length; i++) {
            const y = i * (barH + gap) + 10;
            const w = Math.max(4, (data[i].duration / max) * (width - 120));
            const color = data[i].passed ? "var(--accent-green)" : "var(--accent-red)";
            bars += `<rect x="80" y="${y}" width="${w}" height="${barH}" fill="${color}" rx="3" opacity="0.7"/>`;
            bars += `<text x="75" y="${y + barH/2 + 4}" text-anchor="end" fill="var(--text-secondary)" font-size="11">${data[i].label}</text>`;
            bars += `<text x="${82 + w}" y="${y + barH/2 + 4}" fill="var(--text-muted)" font-size="10">${(data[i].duration/1000).toFixed(1)}s</text>`;
        }

        return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">${bars}</svg>`;
    }
};

// ── Helpers ─────────────────────────────────────────────────────

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }
function el(tag, attrs, ...children) {
    const e = document.createElement(tag);
    if (attrs) Object.entries(attrs).forEach(([k,v]) => {
        if (k === "className") e.className = v;
        else if (k === "innerHTML") e.innerHTML = v;
        else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
        else e.setAttribute(k, v);
    });
    children.forEach(c => { if (c) e.append(typeof c === "string" ? c : c); });
    return e;
}

function render(html) { $("#app-content").innerHTML = html; }

function formatDuration(ms) {
    if (!ms) return "-";
    if (ms < 1000) return ms + "ms";
    if (ms < 60000) return (ms / 1000).toFixed(1) + "s";
    return Math.floor(ms / 60000) + "m " + ((ms % 60000) / 1000).toFixed(0) + "s";
}

function formatDate(d) {
    if (!d) return "-";
    const dt = new Date(d);
    return dt.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" }) + " " +
           dt.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
}

function outcomeBadge(outcome) {
    const cls = {
        "Passed": "badge-passed", "Failed": "badge-failed",
        "Error": "badge-error", "Skipped": "badge-skipped",
        "NotImplemented": "badge-skipped"
    }[outcome] || "badge-skipped";
    return `<span class="badge ${cls}">${outcome || "?"}</span>`;
}

function statusBadge(status) {
    const map = {};
    map[CONFIG.optionSets.statusPlanned] = [LANG.common_planned,"badge-skipped"];
    map[CONFIG.optionSets.statusRunning] = [LANG.run_running,"badge-running"];
    map[CONFIG.optionSets.statusCompleted] = [LANG.common_completed,"badge-passed"];
    map[CONFIG.optionSets.statusError] = [LANG.common_error,"badge-failed"];
    const [label, cls] = map[status] || ["?","badge-skipped"];
    return `<span class="badge ${cls}">${label}</span>`;
}

function stopPolling() {
    if (State.pollingTimer) { clearInterval(State.pollingTimer); State.pollingTimer = null; }
}

async function renderDashboard() {
    render(`<div class="kpi-grid" id="kpi-grid">
        <div class="kpi-tile kpi-blue"><div class="kpi-value">...</div><div class="kpi-label">${LANG.dash_testcases}</div></div>

        <div class="kpi-tile kpi-red"><div class="kpi-value">...</div><div class="kpi-label">${LANG.dash_open_failures}</div></div>
    </div>
    <div class="grid-2">
        <div class="card"><div class="card-title">${LANG.dash_last_runs}</div><div id="recent-runs">${LANG.common_loading}</div></div>
        <div class="card"><div class="card-title">${LANG.dash_distribution}</div><div id="result-chart" class="chart-container">${LANG.common_loading}</div></div>

    <div class="grid-3" style="margin-top:16px">
        <div class="card sparkline-card"><div class="card-title">Trend</div><div id="insight-trend">${LANG.common_loading}</div></div>
        <div class="card"><div class="card-title">Regressions</div><div id="insight-regressions">${LANG.common_loading}</div></div>
        <div class="card"><div class="card-title">Flaky Tests</div><div id="insight-flaky">${LANG.common_loading}</div></div>
    </div>`);

    try {
        // KPIs
        const totalCases = await API.count("jbe_testcases", "jbe_enabled eq true");
        const runs = await API.getMany("jbe_testruns",
            "$select=jbe_teststatus,jbe_passed,jbe_failed,jbe_total,jbe_startedon,jbe_testsummary" +
            "&$orderby=jbe_startedon desc&$top=20");

        const totalRuns = runs.length;
        let totalPassed = 0, totalTotal = 0, openFailures = 0;
        for (const r of runs.slice(0, 7)) {
            totalPassed += r.jbe_passed || 0;
            totalTotal += r.jbe_total || 0;
            openFailures += r.jbe_failed || 0;
        }
        const passRate = totalTotal > 0 ? Math.round(totalPassed / totalTotal * 100) : 0;

        const tiles = $$(".kpi-tile .kpi-value");
        if (tiles[0]) tiles[0].textContent = totalCases;
        if (tiles[1]) tiles[1].textContent = passRate + "%";
        if (tiles[2]) tiles[2].textContent = totalRuns;
        if (tiles[3]) tiles[3].textContent = openFailures;

        // Recent runs table
        if (runs.length > 0) {
            let html = `<table class="data-table"><thead><tr><th>${LANG.dash_date}</th><th>${LANG.dash_status}</th><th>${LANG.dash_passed}</th><th>${LANG.dash_failed}</th><th>${LANG.dash_total}</th><th></th></tr></thead><tbody>`;
            for (const r of runs.slice(0, 8)) {
                const id = r.jbe_testrunid;
                html += `<tr>
                    <td>${formatDate(r.jbe_startedon)}</td>
                    <td>${statusBadge(r.jbe_teststatus)}</td>
                    <td style="color:var(--accent-green)">${r.jbe_passed || 0}</td>
                    <td style="color:${(r.jbe_failed||0) > 0 ? 'var(--accent-red)' : 'var(--text-muted)'}">${r.jbe_failed || 0}</td>
                    <td>${r.jbe_total || 0}</td>
                    <td><a href="#run/${id}" class="btn btn-sm">Details</a></td>
                </tr>`;
            }
            html += `</tbody></table>`;
            $("#recent-runs").innerHTML = html;
        } else {
            $("#recent-runs").innerHTML = `<div class="empty-state"><div class="empty-icon">&#x1f9ea;</div>No test runs yet.<br><a href="#run/new" class="btn btn-primary" style="margin-top:12px">Start first test run</a></div>`;
        }

        // Pie chart
        const lastRun = runs[0];
        if (lastRun) {
            $("#result-chart").innerHTML = Charts.pie([
                { label: "Passed", value: lastRun.jbe_passed || 0, color: "var(--accent-green)" },
                { label: "Failed", value: lastRun.jbe_failed || 0, color: "var(--accent-red)" },
                { label: "Skipped", value: Math.max(0, (lastRun.jbe_total||0) - (lastRun.jbe_passed||0) - (lastRun.jbe_failed||0)), color: "var(--text-muted)" }
            ]);
        }

        // Failed tests
        const results = await API.getMany("jbe_testrunresults",
            "$select=jbe_testid,jbe_outcome,jbe_errormessage,createdon" +
            "&$filter=jbe_outcome eq " + CONFIG.optionSets.outcomeFailed + "&$orderby=createdon desc&$top=10");

        if (results.length > 0) {
            let fhtml = `<table class="data-table"><thead><tr><th>Test</th><th>${LANG.dash_date}</th><th>${LANG.common_error}</th><th></th></tr></thead><tbody>`;
            for (const r of results) {
                fhtml += `<tr>
                    <td><strong>${escapeHtml(r.jbe_testid) || "?"}</strong></td>
                    <td>${formatDate(r.createdon)}</td>
                    <td style="color:var(--accent-red);font-size:12px">${escapeHtml((r.jbe_errormessage || "").substring(0, 80))}</td>
                    <td><a href="#history/${escapeHtml(r.jbe_testid)}" class="btn btn-sm">History</a></td>
                </tr>`;
            }
            fhtml += `</tbody></table>`;
            $("#failed-tests").innerHTML = fhtml;
        } else {
            $("#failed-tests").innerHTML = `<div style="padding:20px;text-align:center;color:var(--accent-green)">${LANG.dash_no_failed}</div>`;
        }

        // ── Insight: Trend-Sparkline ──────────────────────────
        if (runs.length >= 2) {
            const sparkRuns = runs.slice(0, 10).reverse();
            const rates = sparkRuns.map(r => r.jbe_total > 0 ? Math.round((r.jbe_passed || 0) / r.jbe_total * 100) : 0);
            const maxR = 100, minR = 0;
            const svgW = 120, svgH = 40, padY = 4;
            const points = rates.map((v, i) => {
                const x = rates.length > 1 ? (i / (rates.length - 1)) * svgW : svgW / 2;
                const y = padY + (1 - (v - minR) / (maxR - minR || 1)) * (svgH - 2 * padY);
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(" ");
            const trending = rates.length >= 2 && rates[rates.length - 1] >= rates[rates.length - 2];
            const strokeColor = trending ? "var(--accent-green)" : "var(--accent-red)";
            const last3 = rates.slice(-3).map(v => v + "%").join(" / ");
            $("#insight-trend").innerHTML = `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}"><polyline points="${points}" fill="none" stroke="${strokeColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><div class="sparkline-rates">${last3}</div>`;
        } else {
            $("#insight-trend").innerHTML = `<div style="color:var(--text-muted);font-size:13px">Too few runs for trend</div>`;
        }

        // ── Insight: Regressionen ─────────────────────────────
        try {
            const completedRuns = runs.filter(r => r.jbe_teststatus === CONFIG.optionSets.statusCompleted);
            if (completedRuns.length >= 2) {
                const lastRunId = completedRuns[0].jbe_testrunid;
                const prevRunId = completedRuns[1].jbe_testrunid;
                const [lastResults, prevResults] = await Promise.all([
                    API.getMany("jbe_testrunresults", `$select=jbe_testid,jbe_outcome&$filter=_jbe_testrunid_value eq '${lastRunId}'`),
                    API.getMany("jbe_testrunresults", `$select=jbe_testid,jbe_outcome&$filter=_jbe_testrunid_value eq '${prevRunId}'`)
                ]);
                const prevPassed = new Set(prevResults.filter(r => r.jbe_outcome === CONFIG.optionSets.outcomePassed).map(r => r.jbe_testid));
                const regressions = lastResults.filter(r => r.jbe_outcome === CONFIG.optionSets.outcomeFailed && prevPassed.has(r.jbe_testid));
                if (regressions.length > 0) {
                    $("#insight-regressions").innerHTML = regressions.map(r =>
                        `<a href="#history/${escapeHtml(r.jbe_testid)}" class="insight-link">${escapeHtml(r.jbe_testid)}</a>`
                    ).join("");
                } else {
                    $("#insight-regressions").innerHTML = `<div style="color:var(--accent-green);font-size:13px">Keine Regressionen</div>`;
                }

                // ── Insight: Flaky Tests ──────────────────────────
                const last5Runs = completedRuns.slice(0, 5);
                if (last5Runs.length >= 3) {
                    const allResults = await Promise.all(last5Runs.map(r =>
                        API.getMany("jbe_testrunresults", `$select=jbe_testid,jbe_outcome&$filter=_jbe_testrunid_value eq '${r.jbe_testrunid}'`)
                    ));
                    const testOutcomes = {};
                    for (const runResults of allResults) {
                        for (const r of runResults) {
                            if (!testOutcomes[r.jbe_testid]) testOutcomes[r.jbe_testid] = [];
                            testOutcomes[r.jbe_testid].push(r.jbe_outcome);
                        }
                    }
                    const flaky = [];
                    for (const [testId, outcomes] of Object.entries(testOutcomes)) {
                        if (outcomes.length < 2) continue;
                        let flips = 0;
                        for (let i = 1; i < outcomes.length; i++) {
                            if (outcomes[i] !== outcomes[i - 1]) flips++;
                        }
                        if (flips > 0) flaky.push({ testId, flips });
                    }
                    flaky.sort((a, b) => b.flips - a.flips);
                    if (flaky.length > 0) {
                        $("#insight-flaky").innerHTML = flaky.slice(0, 3).map(f =>
                            `<div class="flaky-item"><a href="#history/${escapeHtml(f.testId)}" class="insight-link" style="color:var(--accent-yellow)">${escapeHtml(f.testId)}</a><span class="flaky-count">${f.flips}x gewechselt</span></div>`
                        ).join("");
                    } else {
                        $("#insight-flaky").innerHTML = `<div style="color:var(--accent-green);font-size:13px">Keine flaky Tests</div>`;
                    }
                } else {
                    $("#insight-flaky").innerHTML = `<div style="color:var(--text-muted);font-size:13px">Too few runs</div>`;
                }
            } else {
                $("#insight-regressions").innerHTML = `<div style="color:var(--text-muted);font-size:13px">Too few runs</div>`;
                $("#insight-flaky").innerHTML = `<div style="color:var(--text-muted);font-size:13px">Too few runs</div>`;
            }
        } catch (insightErr) {
            console.warn("Insight-Daten konnten nicht geladen werden:", insightErr);
            if ($("#insight-regressions")) $("#insight-regressions").innerHTML = `<div style="color:var(--text-muted);font-size:12px">Not available</div>`;
            if ($("#insight-flaky")) $("#insight-flaky").innerHTML = `<div style="color:var(--text-muted);font-size:12px">Not available</div>`;
        }

    } catch (err) {
        render(`<div class="card"><div class="card-title">Verbindungsfehler</div>
            <p style="color:var(--accent-red)">${escapeHtml(err.message)}</p>
            <p style="color:var(--text-secondary);margin-top:8px">The Integration Test Center requires the entities jbe_testcase, jbe_testrun und jbe_testrunresult. If not yet created, the dashboard shows dummy data.</p>
            <button class="btn btn-primary" style="margin-top:12px" onclick="renderDashboardDemo()">Demo-Ansicht laden</button></div>`);
    }
}

function filterCases() {
    const search = ($("#case-search")?.value || "").toLowerCase();
    const cat = $("#case-category")?.value || "";
    const story = ($("#case-story")?.value || "").toUpperCase().trim();
    const activeOnly = $("#case-active-only")?.checked ?? true;

    let filtered = State.testCases;
    if (search) {
        filtered = filtered.filter(c =>
            (c.jbe_testid || "").toLowerCase().includes(search) ||
            (c.jbe_title || "").toLowerCase().includes(search) ||
            (c.jbe_tags || "").toLowerCase().includes(search) ||
            (c.jbe_userstories || "").toLowerCase().includes(search));
    }
    if (cat) filtered = filtered.filter(c => String(c.jbe_category) === cat);
    if (story) {
        filtered = filtered.filter(c => {
            const stories = (c.jbe_userstories || "").toUpperCase().split(",").map(s => s.trim());
            return stories.some(s => s.includes(story));
        });
    }
    if (activeOnly) filtered = filtered.filter(c => c.jbe_enabled !== false);

    // Tag-Filter aus dem Header-Dropdown
    if (State.activeTagFilter) {
        const tagLower = State.activeTagFilter.toLowerCase();
        filtered = filtered.filter(c =>
            (c.jbe_tags || "").toLowerCase().split(",").map(t => t.trim()).includes(tagLower));
    }

    renderCasesTable(filtered);
}

window.updateCaseSelection = function() {

window.toggleAllCases = function(checked) {
    document.querySelectorAll(".case-checkbox").forEach(cb => { cb.checked = checked; });

};

window.clearCaseSelection = function() {
    document.querySelectorAll(".case-checkbox").forEach(cb => { cb.checked = false; });

window.runSelectedCases = async function() {
    const checked = document.querySelectorAll(".case-checkbox:checked");
    if (!checked.length) return;
    const ids = Array.from(checked).map(cb => cb.dataset.testid).join(",");
    const concSel = document.getElementById("concurrency-select");
    const conc = concSel ? parseInt(concSel.value) || 3 : 3;
    await _startRunWithFilter(ids, true, conc);
};

window.runSingleCase = async function(testId) {
    await _startRunWithFilter(testId, true, 1);
};

async function _startRunWithFilter(filter, keepRecords, concurrency) {
    const conc = concurrency || LiveRunState.concurrency || 3;
    const keep = keepRecords !== false; // Default: true (Retain by Default)
    JBELog.info("TestRunner", `Creating test run: Filter="${filter}", keepRecords=${keep}, concurrency=${conc}`);
    try {
        const run = await API.create("jbe_testruns", {
            jbe_teststatus: CONFIG.optionSets.statusPlanned,
            jbe_testcasefilter: filter,
            jbe_keeprecords: keep
        });
        const runId = run.jbe_testrunid;
        LiveRunState.concurrency = conc;
        TestRunner.execute(runId, conc);
        location.hash = `#run/${runId}`;
    } catch (err) {
        JBELog.error("TestRunner", "Could not create test run: " + err.message);
        showError("Could not create test run", err.message);
    }
}

function showError(title, detail) {
    const parsed = _parseDataverseError(detail);
    const el = document.createElement("div");
    el.className = "itt-error-panel";
    el.innerHTML = `
        <div style="background:var(--bg-error, #2d1215);border:1px solid var(--accent-red);border-radius:8px;padding:16px;margin:16px 0">
            <div style="font-weight:600;color:var(--accent-red);margin-bottom:8px">${escapeHtml(title)}</div>
            <div style="color:var(--text-primary);font-size:13px;margin-bottom:8px">${escapeHtml(parsed.message)}</div>
            ${parsed.code ? `<div style="color:var(--text-muted);font-size:11px;font-family:var(--mono)">Fehlercode: ${escapeHtml(parsed.code)}</div>` : ""}
            <details style="margin-top:8px;color:var(--text-muted);font-size:11px">
                <summary style="cursor:pointer">Technische Details</summary>
                <pre style="white-space:pre-wrap;margin-top:4px;font-family:var(--mono);font-size:11px;max-height:200px;overflow-y:auto">${escapeHtml(detail)}</pre>
            </details>
            <button onclick="this.closest('.itt-error-panel').remove()" style="margin-top:8px;padding:4px 12px;background:transparent;border:1px solid var(--text-muted);color:var(--text-secondary);border-radius:4px;cursor:pointer;font-size:12px">Closen</button>
        </div>`;
    const target = document.getElementById("app-content") || document.querySelector("main") || document.body;
    target.prepend(el);
}

function _parseDataverseError(msg) {
    try {
        // Versuche JSON aus der Error message zu extrahieren
        const jsonMatch = msg.match(/\{[\s\S]*"error"[\s\S]*\}/);
        if (jsonMatch) {
            const parsed = JSON.parse(jsonMatch[0]);
            return {
                message: parsed.error?.message || msg,
                code: parsed.error?.code || ""
            };
        }
        // Fallback: "Create entity fehlgeschlagen (400): {...}"
        const msgMatch = msg.match(/fehlgeschlagen \(\d+\): (.*)/);
        if (msgMatch) {
            try {
                const inner = JSON.parse(msgMatch[1]);
                return { message: inner.error?.message || msgMatch[1], code: inner.error?.code || "" };
            } catch { return { message: msgMatch[1], code: "" }; }
        }
    } catch {}
    return { message: msg, code: "" };
}

function _switchEditorMode(newMode) {
    const oldMode = _editorMode;
    if (oldMode === newMode) return;

    // Sync data between modes
    if (oldMode === "visual") {
        // Visual -> JSON/Flow: Update JSON textarea from EditorModel
        const jsonStr = EditorModel.toJSONString();
        const jsonEditor = document.getElementById("tc-json");
        if (jsonEditor) jsonEditor.value = jsonStr;
    } else if (oldMode === "json") {
        // JSON -> Visual/Flow: Parse JSON textarea into EditorModel
        const jsonEditor = document.getElementById("tc-json");
        if (jsonEditor) {
            try {
                EditorModel.fromJSON(jsonEditor.value);
            } catch (e) {
                alert("JSON ung\u00fcltig, kann nicht zum visuellen Editor wechseln: " + e.message);
                return;
            }
        }
    }

    _editorMode = newMode;

    // Update mode bar
    document.querySelectorAll("#ve-mode-bar .ve-mode-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.mode === newMode);
    });

    // Show/hide tabs
    const tabVisual = document.getElementById("editor-tab-visual");
    const tabJson = document.getElementById("editor-tab-json");
    const tabFlow = document.getElementById("editor-tab-flow");
    if (tabVisual) tabVisual.style.display = newMode === "visual" ? "block" : "none";
    if (tabJson) tabJson.style.display = newMode === "json" ? "block" : "none";
    if (tabFlow) tabFlow.style.display = newMode === "flow" ? "block" : "none";

    // Re-render visual editor on switch back
    if (newMode === "visual") {
        VisualEditor.render("editor-tab-visual");
    }

    // Render flow
    if (newMode === "flow") {
        try {
            const json = EditorModel.toJSON();
            FlowViz.renderSvg(FlowViz.parseDefinition(json), "#flow-viz-container");
        } catch (e) {
            const fc = document.getElementById("flow-viz-container");
            if (fc) fc.innerHTML = `<div class="empty-state" style="color:var(--accent-red)">JSON ung\u00fcltig: ${escapeHtml(e.message)}<br><span style="color:var(--text-muted)">Bitte zuerst korrigieren.</span></div>`;
        }
    }
}

window.saveTestCase = async function(id) {
    // Get definition JSON based on current mode
    let definitionJson;
    if (_editorMode === "visual") {
        // Validate first
        const issues = EditorModel.validate();
        const errors = issues.filter(i => i.severity === "error");
        if (errors.length > 0) {
            alert("Validierungsfehler:\n" + errors.map(e => "- " + e.message).join("\n"));
            return;
        }
        definitionJson = JSON.stringify(EditorModel.toJSON(), null, 2);
    } else {
        definitionJson = $("#tc-json").value;
        try {
            JSON.parse(definitionJson);
        } catch (e) {
            alert("JSON ung\u00fcltig: " + e.message);
            return;
        }
    }

    const data = {
        jbe_testid: $("#tc-id").value,
        jbe_title: $("#tc-title").value,
        jbe_category: parseInt($("#tc-category").value) || null,
        jbe_tags: $("#tc-tags").value,
        jbe_userstories: $("#tc-userstories").value,
        jbe_enabled: $("#tc-enabled").checked,
        jbe_definitionjson: definitionJson
    };

    try {
        if (id) {
            await API.update("jbe_testcases", id, data);
        } else {
            await API.create("jbe_testcases", data);
        }
        location.hash = "#cases";
    } catch (err) {
        alert("Speichern fehlgeschlagen: " + err.message);
    }
};

    const keepRecords = $("#run-keep-records")?.checked || false;

    $("#btn-start").disabled = true;
    $("#btn-start").textContent = "Wird erstellt...";

    try {
        const run = await API.create("jbe_testruns", {
            jbe_teststatus: CONFIG.optionSets.statusPlanned,
            jbe_testcasefilter: filter,
            jbe_keeprecords: keepRecords
        });

        const runId = run.jbe_testrunid;

        // Execution Engine starten (fire-and-forget, Polling zeigt Fortschritt)
        TestRunner.execute(runId);

        location.hash = `#run/${runId}`;
    } catch (err) {
        showError("Could not create test run", err.message);
        $("#btn-start").disabled = false;

};

                <input id="live-search" placeholder="Search..." oninput="window._liveSearch(this.value)">
                <div class="filter-chips" id="live-chips"></div>
            </div>
            <div class="live-list-items" id="live-items"></div>
        </div>
        <div class="live-detail" id="live-detail">
            <div class="empty-state"><div class="empty-icon">&#128269;</div><div>Select a test</div></div>
        </div>
    </div>
    <div class="card" style="margin-top:16px"><div class="card-title">Log</div><div class="log-output" id="run-log" style="max-height:300px">Warte auf Log-Daten...</div></div>`);

    // Test Case-Liste initial laden (alle Tests des Test Runs aus dem Filter)
    try {
        const run = await API.getOne("jbe_testruns", runId, "jbe_testcasefilter,jbe_teststatus,jbe_startedon,jbe_total");
        const filter = run.jbe_testcasefilter || "*";
        LiveRunState.startTime = run.jbe_startedon ? new Date(run.jbe_startedon).getTime() : Date.now();

        // Alle Testfälle laden die im Filter enthalten sind
        const allCases = await API.getMany("jbe_testcases",
            "$select=jbe_testid,jbe_title,jbe_testcaseid&$filter=jbe_enabled eq true&$orderby=jbe_testid");
        const filterIds = filter !== "*" ? filter.split(",").map(s => s.trim()) : null;
        LiveRunState.testCaseList = filterIds
            ? allCases.filter(tc => filterIds.includes(tc.jbe_testid))
            : allCases;
    } catch { /* Filter-Parsing fehlgeschlagen, Polling holt die Daten */ }

    // Filter-Chips rendern
    _renderFilterChips();

    // Initiales Update + Polling starten
    await _updateLiveView(runId);

    window._liveSearch = (text) => { LiveRunState.searchText = text.toLowerCase(); _renderLiveList(runId); };
    window._liveFilterChip = (f) => { LiveRunState.filter = f; _renderFilterChips(); _renderLiveList(runId); };
    window._liveSelectTest = (testId, runId) => { LiveRunState.selectedTestId = testId; LiveRunState._detailHash = ""; _renderLiveList(runId); _renderLiveDetail(runId, testId); };
    window._rerunFailed = async (runId) => {
        const results = await API.getMany("jbe_testrunresults",
            `$select=jbe_testid,jbe_outcome&$filter=_jbe_testrunid_value eq '${runId}' and jbe_outcome eq ${CONFIG.optionSets.outcomeFailed}`);
        if (results.length === 0) return;
        const failedIds = results.map(r => r.jbe_testid).join(",");
        const newRun = await API.create("jbe_testruns", {
            jbe_teststatus: CONFIG.optionSets.statusPlanned,
            jbe_testcasefilter: failedIds, jbe_keeprecords: false });
        TestRunner.execute(newRun.jbe_testrunid);
        location.hash = `#run/${newRun.jbe_testrunid}`;
    };
}

function _renderFilterChips() {
    const el = document.getElementById("live-chips");
    if (!el) return;
    const chips = [
        { id: "all", label: "${LANG.run_all}" }, { id: "failed", label: "Failed" },
        { id: "passed", label: "Passed" }, { id: "running", label: "Running" }
    ];
    el.innerHTML = chips.map(c =>
        `<span class="filter-chip${LiveRunState.filter === c.id ? ' active' : ''}" onclick="_liveFilterChip('${c.id}')">${c.label}</span>`
    ).join("");
}

// Ergebnis-Cache für DOM-Diff
let _liveResultsCache = [];

async function _updateLiveView(runId) {
    try {
        const run = await API.getOne("jbe_testruns", runId,
            "jbe_teststatus,jbe_passed,jbe_failed,jbe_total,jbe_startedon,jbe_completedon,jbe_testsummary,jbe_fulllog,jbe_testcasefilter,jbe_keeprecords");
        const isActive = run.jbe_teststatus === CONFIG.optionSets.statusRunning || run.jbe_teststatus === CONFIG.optionSets.statusPlanned;
        const passed = run.jbe_passed || 0;
        const failed = run.jbe_failed || 0;
        const total = run.jbe_total || LiveRunState.testCaseList.length || 0;
        const done = passed + failed;
        const pct = total > 0 ? Math.round(done / total * 100) : 0;

        // Header
        const statusEl = document.getElementById("live-status-badge");
        if (statusEl) statusEl.innerHTML = statusBadge(run.jbe_teststatus);

        // Counters
        const cEl = document.getElementById("live-counters");
        if (cEl) cEl.innerHTML = `<span style="color:var(--accent-green)">${passed} Passed</span><span style="color:var(--accent-red)">${failed} Failed</span><span>${done}/${total}</span>`;

        // ETA
        const etaEl = document.getElementById("live-eta");
        if (etaEl && isActive && done > 0) {
            const elapsed = Date.now() - LiveRunState.startTime;
            const avgPerTest = elapsed / done;
            const remaining = (total - done) * avgPerTest;
            const mins = Math.ceil(remaining / 60000);
            etaEl.textContent = mins > 0 ? `~${mins}m verbleibend` : "Gleich fertig...";
        } else if (etaEl && !isActive) {
            const dur = run.jbe_completedon && run.jbe_startedon
                ? Math.round((new Date(run.jbe_completedon) - new Date(run.jbe_startedon)) / 1000)
                : 0;
            etaEl.textContent = dur > 0 ? `Duration: ${Math.floor(dur/60)}m ${dur%60}s` : "";
        }

        // Progress bar
        const bar = document.getElementById("live-bar");
        if (bar) {
            bar.style.width = `${pct}%`;
            const passPct = total > 0 ? Math.round(passed / total * 100) : 0;
            if (failed > 0) {
                bar.className = "live-progress-fill mixed";
                bar.style.setProperty("--pass-pct", `${passPct}%`);
            } else {
                bar.className = "live-progress-fill all-pass";
            }
        }

        // Actions
        const actEl = document.getElementById("live-actions");
        if (actEl) {
            if (isActive) {
                actEl.innerHTML = "";
            } else if (failed > 0) {
                actEl.innerHTML = `<button class="btn btn-sm" style="border:1px solid var(--accent-red);color:var(--accent-red)" onclick="_rerunFailed('${runId}')">${failed} Failede erneut starten</button>`;
            } else {
                actEl.innerHTML = `<span style="color:var(--accent-green);font-weight:600">Alle bestanden</span>`;
            }
        }

        // Load results
        try {
            _liveResultsCache = await API.getMany("jbe_testrunresults",
                `$select=jbe_testid,jbe_outcome,jbe_durationms,jbe_errormessage,jbe_assertionresults` +
                `&$filter=_jbe_testrunid_value eq '${runId}'&$orderby=jbe_testid asc`);
        } catch { /* Results entity might not exist yet */ }

        _renderLiveList(runId);

        // Update selected detail nur wenn sich das Ergebnis geaendert hat
        // (verhindert dass Toggle-States beim Polling zurueckgesetzt werden)
        if (LiveRunState.selectedTestId) {
            const selResult = _liveResultsCache.find(r => r.jbe_testid === LiveRunState.selectedTestId);
            const prevHash = LiveRunState._detailHash || "";
            const currHash = selResult ? `${selResult.jbe_outcome}_${selResult.jbe_durationms}` : "pending";
            if (currHash !== prevHash) {
                LiveRunState._detailHash = currHash;
                // Steps-Cache invalidieren bei Ergebnis-Aenderung
                if (selResult?.jbe_testrunresultid) delete _detailStepsCache[selResult.jbe_testrunresultid];
                _renderLiveDetail(runId, LiveRunState.selectedTestId);
            }
        }

        // Log
        const logEl = document.getElementById("run-log");
        if (logEl && run.jbe_fulllog) {
            logEl.innerHTML = run.jbe_fulllog
                .replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/\[([\d:\.]+)\]/g, '<span class="log-time">[$1]</span>')
                .replace(/(BESTANDEN|Passed|OK:)/g, '<span class="log-ok">$1</span>')
                .replace(/(FEHLGESCHLAGEN|Failed|FAIL:)/g, '<span class="log-fail">$1</span>')
                .replace(/(FEHLER|Error|Timeout)/g, '<span class="log-warn">$1</span>');
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Polling
        if (isActive && !State.pollingTimer) {
            State.pollingTimer = setInterval(() => _updateLiveView(runId), 3000);
        } else if (!isActive) {
            stopPolling();
        }
    } catch (err) {
        const logEl = document.getElementById("run-log");
        if (logEl) logEl.innerHTML = `<span class="log-fail">Error: ${escapeHtml(err.message)}</span>`;
    }
}

function _renderLiveList(runId) {
    const container = document.getElementById("live-items");
    if (!container) return;

    const resultMap = {};
    for (const r of _liveResultsCache) resultMap[r.jbe_testid] = r;

    // Alle Tests: aus testCaseList (vollständig) oder aus results (falls Liste leer)
    let allTests = LiveRunState.testCaseList.length > 0
        ? LiveRunState.testCaseList.map(tc => ({ id: tc.jbe_testid, result: resultMap[tc.jbe_testid] || null }))
        : _liveResultsCache.map(r => ({ id: r.jbe_testid, result: r }));

    // Filter anwenden
    if (LiveRunState.filter === "passed") allTests = allTests.filter(t => t.result?.jbe_outcome === CONFIG.optionSets.outcomePassed);
    else if (LiveRunState.filter === "failed") allTests = allTests.filter(t => t.result?.jbe_outcome === CONFIG.optionSets.outcomeFailed);
    else if (LiveRunState.filter === "running") allTests = allTests.filter(t => !t.result);

    // Suche
    if (LiveRunState.searchText) {
        allTests = allTests.filter(t => t.id.toLowerCase().includes(LiveRunState.searchText));
    }

    let html = "";
    for (const t of allTests) {
        const r = t.result;
        let dotClass, statusText, subText, subClass, durText;

        if (!r) {
            // Parallel: erste N nicht abgeschlossene Tests = "Running", Rest = "Pending"
            const conc = LiveRunState.concurrency || 1;
            const pendingTests = allTests.filter(x => !x.result);
            const runningCount = Math.min(conc, pendingTests.length);
            const runningSet = new Set(pendingTests.slice(0, runningCount).map(x => x.id));
            dotClass = runningSet.has(t.id) ? "running" : "pending";
            statusText = dotClass === "running" ? "Running..." : "";
            subText = dotClass === "running" ? "Governance polling..." : "";
            subClass = dotClass === "running" ? "running-hint" : "";
            durText = "";
        } else if (r.jbe_outcome === CONFIG.optionSets.outcomePassed) {
            dotClass = "passed";
            statusText = "";
            subText = "";
            subClass = "";
            durText = formatDuration(r.jbe_durationms);
        } else {
            dotClass = "failed";
            statusText = "";
            // Erste Fehlerzeile als Subtext
            const errMsg = _parseDataverseError(r.jbe_errormessage || "").message;
            subText = errMsg.length > 60 ? errMsg.substring(0, 57) + "..." : errMsg;
            subClass = "error-hint";
            durText = formatDuration(r.jbe_durationms);
        }

        const selected = LiveRunState.selectedTestId === t.id ? " selected" : "";
        html += `<div class="live-item${selected}" onclick="_liveSelectTest('${t.id}', '${runId}')">
            <div class="live-item-dot ${dotClass}"></div>
            <div class="live-item-body">
                <div class="live-item-top"><span class="live-item-id">${t.id}</span><span class="live-item-dur">${durText}</span></div>
                ${subText ? `<div class="live-item-sub ${subClass}">${escapeHtml(subText)}</div>` : ""}
            </div>
        </div>`;
    }

    container.innerHTML = html || `<div style="padding:20px;color:var(--text-muted);text-align:center;font-size:12px">No tests in diesem Filter</div>`;

    // Auto-Scroll zum laufenden Test
    const runningEl = container.querySelector(".live-item-dot.running");
    if (runningEl) runningEl.closest(".live-item")?.scrollIntoView({ block: "nearest", behavior: "smooth" });
}

// Hilfsfunktion: Governance-Decisions aus Diagnostics-Text parsen
function _parseGovernanceDecisions(diagnosticsText) {
    if (!diagnosticsText) return [];
    const decisions = [];
    const lines = diagnosticsText.split("\n");
    for (const line of lines) {
        if (!line.includes("Field=")) continue;
        const entry = {};
        const pairs = line.split("|").map(p => p.trim());
        for (const pair of pairs) {
            const eqIdx = pair.indexOf("=");
            if (eqIdx < 0) continue;
            const key = pair.substring(0, eqIdx).trim();
            let val = pair.substring(eqIdx + 1).trim();
            if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
            entry[key] = val;
        }
        if (entry.Field) decisions.push(entry);
    }
    return decisions;
}

// Hilfsfunktion: automatischer Ursachen-Hinweis fuer fehlgeschlagene Assertions
function _getFailureHint(assertion) {
    const actual = String(assertion.actual || "");
    if (actual.includes("_ORIG") || actual.includes("_PLAT_ORIG")) {
        return "Possible cause: Field Governance did not update the field";
    }
    if (actual === "null" || actual === "" || actual === "undefined") {
        return "Possible cause: Field was not set";
    }
    if (actual.includes("DYN_")) {
        return "Possible cause: DYNAMICS source won instead of expected source";
    }
    if (actual.includes("ERROR")) {
        return "Possible cause: API query failed";
    }
    return "";
}

// Hilfsfunktion: Step-Details expandieren/kollabieren
window._toggleStepExpand = function(stepEl) {
    const content = stepEl.nextElementSibling;
    if (!content || !content.classList.contains("step-expand-content")) return;

};

// Hilfsfunktion: Source-Chip mit Farbe
function _sourceChip(source) {
    const s = (source || "").toLowerCase();
    if (s.includes("pisa")) return `<span class="source-chip pisa">PISA</span>`;
    if (s.includes("dynamics") || s.includes("dyn")) return `<span class="source-chip dynamics">Dynamics</span>`;
    if (s.includes("platform") || s.includes("plat")) return `<span class="source-chip platform">Platform</span>`;
    return `<span class="source-chip" style="background:var(--bg-input);color:var(--text-secondary)">${escapeHtml(source)}</span>`;
}

async function _renderLiveDetail(runId, testId) {
    const container = document.getElementById("live-detail");
    if (!container) return;

    const result = _liveResultsCache.find(r => r.jbe_testid === testId);

    if (!result) {
        container.innerHTML = `<div class="live-detail-header"><h3>${escapeHtml(testId)}</h3><span class="badge badge-running">Ausstehend</span></div>
            <div style="padding:20px;color:var(--text-muted);font-size:13px">Wartet auf Execution...</div>`;
        return;
    }

    const isPassed = result.jbe_outcome === CONFIG.optionSets.outcomePassed;
    const badge = isPassed ? '<span class="badge badge-passed">Passed</span>' : '<span class="badge badge-failed">Failed</span>';
    const dur = formatDuration(result.jbe_durationms);

    // Assertions parsen
    let assertions = [];
    try { assertions = JSON.parse(result.jbe_assertionresults || "[]"); } catch {}

    // Steps laden (mit Cache)
    let steps = [];
    if (result.jbe_testrunresultid) {
        if (_detailStepsCache[result.jbe_testrunresultid]) {
            steps = _detailStepsCache[result.jbe_testrunresultid];
        } else {
            try {
                steps = await API.getMany("jbe_teststeps",
                    `$filter=_jbe_testrunresultid_value eq '${result.jbe_testrunresultid}'&$orderby=jbe_stepnumber asc` +
                    `&$select=jbe_teststepid,jbe_stepnumber,jbe_phase,jbe_action,jbe_entity,jbe_alias,jbe_durationms,jbe_stepstatus,jbe_errormessage,jbe_inputdata,jbe_outputdata,jbe_assertionfield,jbe_expectedvalue,jbe_actualvalue,jbe_recordid,jbe_recordurl`);
                _detailStepsCache[result.jbe_testrunresultid] = steps;
            } catch { /* Steps might not exist yet */ }
        }
    }

    // TestCase-Metadaten laden (mit Cache)
    let testCase = _detailTestCaseCache[testId];
    if (!testCase) {
        try {
            const cases = await API.getMany("jbe_testcases",
                `$filter=jbe_testid eq '${testId}'&$select=jbe_testid,jbe_title,jbe_category,jbe_tags,jbe_userstories,jbe_definitionjson&$top=1`);
            if (cases.length > 0) {
                testCase = cases[0];
                _detailTestCaseCache[testId] = testCase;
            }
        } catch {}
    }

    const phaseNames = { 105710000: "Precondition", 105710001: "Step", 105710002: "Assertion", 105710003: "Cleanup" };
    const phaseColors = { "Precondition": "#42a5f5", "Step": "#4caf50", "Assertion": "#ff9800", "Cleanup": "#6c6c88", "Governance": "#ab47bc" };

    // Pruefen ob Governance-Steps vorhanden
    let hasGovernance = false;
    for (const s of steps) {
        if (s.jbe_inputdata) {
            try {
                const inp = JSON.parse(s.jbe_inputdata);
                if (inp.waitForAsync) { hasGovernance = true; break; }
            } catch {}
        }
    }

    // Phase-Summary berechnen
    const phaseSummary = {};
    for (const s of steps) {
        const pName = phaseNames[s.jbe_phase] || "Sonstige";
        if (!phaseSummary[pName]) phaseSummary[pName] = { total: 0, ok: 0, dur: 0 };
        phaseSummary[pName].total++;
        if (s.jbe_stepstatus === 105710000) phaseSummary[pName].ok++;
        phaseSummary[pName].dur += (s.jbe_durationms || 0);
    }

    // Governance-Duration separat berechnen
    let govTotalPolls = 0;
    let govTotalDur = 0;
    for (const s of steps) {
        if (!s.jbe_inputdata) continue;
        try {
            const inp = JSON.parse(s.jbe_inputdata);
            if (!inp.waitForAsync) continue;
            const out = s.jbe_outputdata ? JSON.parse(s.jbe_outputdata) : {};
            if (out.governanceLog) {
                govTotalPolls += (out.governanceLog.polls || 0);
                govTotalDur += (out.governanceLog.duration || 0);
            } else if (out.polls) {
                govTotalPolls += (out.polls || 0);
            }
        } catch {}
    }

    // Kategorie-Name
    const catNames = {
        105710000: "UpdateSource", 105710001: "CreateSource", 105710002: "PISA",
        105710003: "MultiSource", 105710004: "AdditionalFields", 105710005: "Bridge",
        105710006: "Merge", 105710007: "Recompute", 105710008: "ErrorInjection"
    };

    // ────────────── HTML aufbauen ──────────────

    let html = `<div class="live-detail-header"><h3>${escapeHtml(testId)}</h3>${badge}<span style="color:var(--text-muted);font-size:12px;margin-left:auto">${dur}</span></div>`;

    // Tab-Leiste
    html += `<div class="detail-tabs">`;
    html += `<div class="detail-tab active" data-tab="overview" onclick="_detailSwitchTab('overview')">Overview</div>`;
    html += `<div class="detail-tab" data-tab="steps" onclick="_detailSwitchTab('steps')">Steps</div>`;
    html += `<div class="detail-tab" data-tab="assertions" onclick="_detailSwitchTab('assertions')">Assertions</div>`;
    if (hasGovernance) {
        html += `<div class="detail-tab" data-tab="governance" onclick="_detailSwitchTab('governance')">Governance</div>`;
    }
    html += `<div class="detail-tab" data-tab="raw" onclick="_detailSwitchTab('raw')">Raw Data</div>`;
    html += `</div>`;

    // ════════════════════════════════════════════
    // Tab 1: Overview
    // ════════════════════════════════════════════
    html += `<div class="detail-tab-content active" id="dtab-overview">`;

    // Bento-Grid
    html += `<div class="detail-bento">`;

    // Links: Ergebnis-Card
    html += `<div class="detail-result-card">`;
    html += `<div class="result-badge ${isPassed ? 'passed' : 'failed'}">${isPassed ? 'PASSED' : 'FAILED'}</div>`;
    html += `<div class="result-duration">${dur}</div>`;
    if (!isPassed && result.jbe_errormessage) {
        const shortErr = (result.jbe_errormessage || "").substring(0, 120);
        html += `<div class="result-error">${escapeHtml(shortErr)}</div>`;
    }
    html += `</div>`;

    // Rechts: Metadaten-Card
    html += `<div class="detail-meta-card">`;
    html += `<h4>${escapeHtml(testCase?.jbe_title || testId)}</h4>`;
    if (testCase?.jbe_category != null) {
        const catName = catNames[testCase.jbe_category] || String(testCase.jbe_category);
        html += `<div class="meta-row"><span class="meta-label">Kategorie</span><span class="tag-chip">${escapeHtml(catName)}</span></div>`;
    }
    if (testCase?.jbe_tags) {
        const tags = testCase.jbe_tags.split(",").filter(Boolean).map(t => `<span class="tag-chip">${escapeHtml(t.trim())}</span>`).join("");
        html += `<div class="meta-row"><span class="meta-label">Tags</span><span>${tags}</span></div>`;
    }
    if (testCase?.jbe_userstories) {
        const stories = testCase.jbe_userstories.split(",").filter(Boolean).map(s => {
            const key = s.trim();
            if (CONFIG.storyLinkPattern) {
                const url = CONFIG.storyLinkPattern.replace("{key}", encodeURIComponent(key));
                return `<a class="story-link" href="${url}" target="_blank">${escapeHtml(key)}</a>`;
            }
            return `<span class="story-link">${escapeHtml(key)}</span>`;
        }).join(" ");
        html += `<div class="meta-row"><span class="meta-label">Stories</span><span>${stories}</span></div>`;
    }
    html += `</div>`;
    html += `</div>`; // /detail-bento

    // Phase-Summary Tabelle
    if (steps.length > 0) {
        html += `<table class="phase-summary">`;
        const phaseOrder = ["Precondition", "Step", "Governance", "Assertion", "Cleanup"];
        for (const pName of phaseOrder) {
            if (pName === "Governance") {
                if (!hasGovernance) continue;
                html += `<tr onclick="_detailGoToSteps()">`;
                html += `<td class="phase-name">Governance</td>`;
                html += `<td class="phase-count">${govTotalPolls} Polls</td>`;
                html += `<td class="phase-dur">${(govTotalDur / 1000).toFixed(1)}s</td>`;
                html += `</tr>`;
                continue;
            }
            const ps = phaseSummary[pName];
            if (!ps) continue;
            const hasFail = ps.ok < ps.total;
            html += `<tr onclick="_detailGoToSteps()">`;
            html += `<td class="phase-name">${pName === "Precondition" ? "Preconditions" : pName === "Step" ? "Steps" : pName === "Assertion" ? "Assertions" : pName}</td>`;
            html += `<td class="phase-count${hasFail ? ' has-fail' : ''}">${ps.ok}/${ps.total} OK</td>`;
            html += `<td class="phase-dur">${(ps.dur / 1000).toFixed(1)}s</td>`;
            html += `</tr>`;
        }
        html += `</table>`;
    }

    // Aktions-Buttons
    html += `<div class="detail-actions">`;
    html += `<button class="btn btn-sm" onclick="_detailRerunTest('${escapeHtml(testId)}')" style="border:1px solid var(--accent-blue);color:var(--accent-blue)">Erneut starten</button>`;
    html += `<button class="btn btn-sm" onclick="_detailGoToRaw()" style="border:1px solid var(--text-muted);color:var(--text-secondary)">Definition anzeigen</button>`;
    if (result?.jbe_testrunresultid) {
        html += `<button class="btn btn-sm" onclick="_cleanupTestRecords('${result.jbe_testrunresultid}', this)" style="color:var(--text-muted);border:1px solid var(--border);font-size:11px" title="Delete test data from Dataverse">Delete test data</button>`;
    }
    html += `</div>`;
    html += `</div>`; // /dtab-overview

    // ════════════════════════════════════════════
    // Tab 2: Steps & Timeline
    // ════════════════════════════════════════════
    html += `<div class="detail-tab-content" id="dtab-steps">`;

    if (steps.length > 0) {
        // Timeline-Balken (SVG)
        const totalDur = steps.reduce((sum, s) => sum + (s.jbe_durationms || 1), 0);
        html += `<div class="timeline-bar" style="position:relative">`;
        html += `<svg width="100%" height="32" preserveAspectRatio="none" viewBox="0 0 1000 32">`;
        let xPos = 0;
        // Segmente nach Phase gruppieren
        const phaseSegments = [];
        let currentPhase = null;
        let segDur = 0;
        for (const s of steps) {
            const pName = phaseNames[s.jbe_phase] || "Sonstige";
            if (pName !== currentPhase) {
                if (currentPhase) phaseSegments.push({ phase: currentPhase, dur: segDur });
                currentPhase = pName;
                segDur = 0;
            }
            segDur += (s.jbe_durationms || 1);
        }
        if (currentPhase) phaseSegments.push({ phase: currentPhase, dur: segDur });

        for (const seg of phaseSegments) {
            const w = Math.max((seg.dur / totalDur) * 1000, 5);
            const color = phaseColors[seg.phase] || "#6c6c88";
            html += `<rect x="${xPos}" y="0" width="${w}" height="32" fill="${color}" opacity="0.8">`;
            html += `<title>${seg.phase}: ${(seg.dur / 1000).toFixed(1)}s</title></rect>`;
            xPos += w;
        }
        // Governance als Overlay
        if (hasGovernance && govTotalDur > 0) {
            // Finde die Position der Governance-Steps in der Timeline
            let govX = 0;
            let govW = 0;
            let runningDur = 0;
            for (const s of steps) {
                const sDur = s.jbe_durationms || 1;
                let isGov = false;
                try { const inp = JSON.parse(s.jbe_inputdata || "{}"); isGov = !!inp.waitForAsync; } catch {}
                if (isGov && govW === 0) govX = (runningDur / totalDur) * 1000;
                if (isGov) govW += (sDur / totalDur) * 1000;
                runningDur += sDur;
            }
            if (govW > 0) {
                html += `<rect x="${govX}" y="24" width="${govW}" height="8" fill="${phaseColors.Governance}" opacity="0.6">`;
                html += `<title>Governance: ${govTotalPolls} Polls, ${(govTotalDur / 1000).toFixed(1)}s</title></rect>`;
            }
        }
        html += `</svg></div>`;

        // Gruppierte Step-Liste
        const grouped = {};
        for (const s of steps) {
            const pName = phaseNames[s.jbe_phase] || "Sonstige";
            if (!grouped[pName]) grouped[pName] = [];
            grouped[pName].push(s);
        }

        const groupOrder = ["Precondition", "Step", "Assertion", "Cleanup"];
        for (const gName of groupOrder) {
            const gSteps = grouped[gName];
            if (!gSteps || gSteps.length === 0) continue;
            const gOk = gSteps.filter(s => s.jbe_stepstatus === 105710000).length;
            const gDur = gSteps.reduce((sum, s) => sum + (s.jbe_durationms || 0), 0);
            const allOk = gOk === gSteps.length;

            html += `<div class="step-group">`;
            html += `<div class="step-group-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">`;
            html += `<span>${gName === "Precondition" ? "Preconditions" : gName === "Step" ? "Steps" : gName === "Assertion" ? "Assertions" : gName} (${gSteps.length} Steps, ${(gDur / 1000).toFixed(1)}s)</span>`;
            html += `<span class="group-status ${allOk ? 'all-ok' : 'has-fail'}">${allOk ? 'alle OK' : gOk + '/' + gSteps.length + ' OK'}</span>`;
            html += `</div>`;
            html += `<div class="step-group-body">`;

            for (const s of gSteps) {
                const iconCls = s.jbe_stepstatus === 105710000 ? "ok" : s.jbe_stepstatus === 105710001 ? "fail" : "skip";
                const iconChar = iconCls === "ok" ? "&#10004;" : iconCls === "fail" ? "&#10008;" : "-";
                const durStr = s.jbe_durationms ? (s.jbe_durationms / 1000).toFixed(1) + "s" : "";
                const entityDisplay = s.jbe_entity ? s.jbe_entity.replace(/^\w+_/, "") : "";
                const aliasDisplay = s.jbe_alias ? " (" + escapeHtml(s.jbe_alias) + ")" : "";

                html += `<div class="step-row step-row-expandable" onclick="_toggleStepExpand(this)">`;
                html += `<span class="step-icon ${iconCls}">${iconChar}</span>`;
                html += `<span style="color:var(--text-muted);font-size:11px;width:24px">#${s.jbe_stepnumber || ""}</span>`;
                html += `<span class="step-action">${escapeHtml(s.jbe_action) || phaseNames[s.jbe_phase] || "?"}</span>`;
                html += `<span class="step-entity">${escapeHtml(entityDisplay)}${aliasDisplay}</span>`;
                if (s.jbe_recordurl && s.jbe_recordid) {
                    html += `<a href="${escapeHtml(s.jbe_recordurl)}" target="_blank" title="Open created/updated record in CRM" style="color:var(--accent-blue);font-size:11px;text-decoration:none;margin-left:4px" onclick="event.stopPropagation()">&#x1F517;</a>`;
                }
                if (s.jbe_teststepid) {
                    html += `<a href="/main.aspx?etn=jbe_teststep&id=${s.jbe_teststepid}&pagetype=entityrecord" target="_blank" title="Open step record in CRM" style="color:var(--text-muted);font-size:10px;text-decoration:none;margin-left:4px" onclick="event.stopPropagation()">step</a>`;
                }
                html += `<span class="step-dur">${durStr}</span>`;
                html += `</div>`;

                // Expandierbarer Inhalt (initial versteckt)
                html += `<div class="step-expand-content" style="display:none">`;
                if (s.jbe_inputdata) {
                    try {
                        const input = JSON.parse(s.jbe_inputdata);
                        const inputStr = JSON.stringify(input, null, 2);
                        html += `<div style="margin-bottom:4px;color:var(--text-muted)">Input:</div><pre>${escapeHtml(inputStr.substring(0, 500))}</pre>`;
                    } catch {}
                }
                if (s.jbe_outputdata) {
                    try {
                        const output = JSON.parse(s.jbe_outputdata);
                        const outStr = JSON.stringify(output, null, 2);
                        html += `<div style="margin-bottom:4px;color:var(--text-muted)">Output:</div><pre>${escapeHtml(outStr.substring(0, 500))}</pre>`;
                        // Governance-Info
                        if (output.governanceLog) {
                            const gl = output.governanceLog;
                            html += `<div style="margin-top:4px;color:var(--accent-purple)">Governance: ${gl.polls} Polls, ${(gl.duration / 1000).toFixed(1)}s, ${gl.found ? "Log gefunden" : "kein Log"}</div>`;
                            if (gl.logName) html += `<div style="color:var(--accent-purple)">CDH-Log: ${escapeHtml(gl.logName)}</div>`;
                        }
                        if (output.recordId) {
                            if (s.jbe_recordurl) {
                                html += `<div style="margin-top:4px"><a href="${escapeHtml(s.jbe_recordurl)}" target="_blank" style="color:var(--accent-blue);text-decoration:none">Open in CRM: ${escapeHtml(output.recordId)}</a></div>`;
                            } else {
                                html += `<div style="margin-top:4px;color:var(--text-muted)">Record-ID: ${escapeHtml(output.recordId)}</div>`;
                            }
                        }
                    } catch {}
                }
                if (s.jbe_errormessage) {
                    html += `<div style="margin-top:4px;color:var(--accent-red)">${escapeHtml(_parseDataverseError(s.jbe_errormessage).message)}</div>`;
                }
                html += `</div>`; // /step-expand-content
            }

            html += `</div></div>`; // /step-group-body, /step-group
        }
    } else {
        html += `<div style="color:var(--text-muted);font-size:13px;padding:12px">Keine Steps vorhanden.</div>`;
    }
    html += `</div>`; // /dtab-steps

    // ════════════════════════════════════════════
    // Tab 3: Assertions
    // ════════════════════════════════════════════
    html += `<div class="detail-tab-content" id="dtab-assertions">`;

    if (assertions.length > 0) {
        const passedCount = assertions.filter(a => a.passed).length;
        html += `<div style="margin-bottom:12px;font-size:13px;color:var(--text-secondary)">${passedCount}/${assertions.length} Assertions bestanden</div>`;

        for (const a of assertions) {
            const cls = a.passed ? "passed" : "failed";
            html += `<div class="assertion-card ${cls}">`;
            html += `<div class="assertion-card-header">`;
            html += `<span><span class="assert-badge ${a.passed ? 'pass' : 'fail'}">${a.passed ? 'PASS' : 'FAIL'}</span> ${escapeHtml(a.field)} <span style="color:var(--text-muted)">${escapeHtml(a.operator || "Equals")}</span></span>`;
            html += `<span style="color:var(--text-muted);font-size:11px">${a.duration ? (a.duration / 1000).toFixed(1) + "s" : ""}</span>`;
            html += `</div>`;
            html += `<div class="assertion-card-body">`;
            if (a.passed) {
                html += `<div class="assert-row"><span class="assert-label">Expected:</span><span class="assert-value">${escapeHtml(a.expected)}</span></div>`;
                html += `<div class="assert-row"><span class="assert-label">Actual:</span><span class="assert-value">${escapeHtml(a.actual)}</span></div>`;
            } else {
                html += `<div class="assert-row"><span class="assert-label">Expected:</span><span class="assert-value expected-fail">${escapeHtml(a.expected)}</span></div>`;
                html += `<div class="assert-row"><span class="assert-label">Actual:</span><span class="assert-value actual-fail">${escapeHtml(a.actual)}</span></div>`;
                const hint = _getFailureHint(a);
                if (hint) {
                    html += `<div class="assertion-hint">${escapeHtml(hint)}</div>`;
                }
            }
            html += `</div></div>`; // /assertion-card-body, /assertion-card
        }
    } else {
        html += `<div style="color:var(--text-muted);font-size:13px;padding:12px">Keine Assertions vorhanden.</div>`;
    }
    html += `</div>`; // /dtab-assertions

    // ════════════════════════════════════════════
    // Tab 4: Governance (nur wenn vorhanden)
    // ════════════════════════════════════════════
    if (hasGovernance) {
        html += `<div class="detail-tab-content" id="dtab-governance">`;

        let govCycleIdx = 0;
        for (const s of steps) {
            if (!s.jbe_inputdata) continue;
            let inp;
            try { inp = JSON.parse(s.jbe_inputdata); } catch { continue; }
            if (!inp.waitForAsync) continue;

            govCycleIdx++;
            const actionLabel = s.jbe_action || "Step";
            const aliasLabel = s.jbe_alias || "";

            let output = {};
            try { output = JSON.parse(s.jbe_outputdata || "{}"); } catch {}

            const gl = output.governanceLog || {};
            const polls = gl.polls || output.polls || 0;
            const govDur = gl.duration || 0;
            const found = gl.found || false;
            const logName = gl.logName || "";
            const diagnostics = gl.diagnostics || output.diagnostics || "";

            html += `<div class="governance-card">`;
            html += `<div class="governance-card-header">Governance-Zyklus #${govCycleIdx} (nach ${escapeHtml(actionLabel)} ${escapeHtml(aliasLabel)})</div>`;
            html += `<div class="governance-stats">`;
            html += `<span>Polls: <span class="governance-stat-value">${polls}</span></span>`;
            html += `<span>Duration: <span class="governance-stat-value">${(govDur / 1000).toFixed(1)}s</span></span>`;
            html += `<span>Result: <span class="governance-stat-value" style="color:${found ? 'var(--accent-green)' : 'var(--accent-red)'}">${found ? 'Log gefunden' : 'Timeout'}</span></span>`;
            html += `</div>`;
            if (logName) {
                html += `<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">CDH-Log: ${escapeHtml(logName)}</div>`;
            }

            // Decision-Tabelle
            const decisions = _parseGovernanceDecisions(diagnostics);
            if (decisions.length > 0) {
                html += `<table class="decision-table">`;
                html += `<thead><tr><th>Feld</th><th>Strategie</th><th>Gewinner</th><th>Wert</th><th>Aktualisiert</th></tr></thead><tbody>`;
                for (const d of decisions) {
                    html += `<tr>`;
                    html += `<td>${escapeHtml(d.Field)}</td>`;
                    html += `<td style="font-size:10px">${escapeHtml(d.Strategy || "")}</td>`;
                    html += `<td>${_sourceChip(d.WinnerSource || "")}</td>`;
                    html += `<td style="font-family:var(--mono);font-size:10px">${escapeHtml(d.Winner || "")}</td>`;
                    html += `<td>${d.Updated === "True" ? '<span style="color:var(--accent-green)">${LANG.common_yes}</span>' : '<span style="color:var(--text-muted)">${LANG.common_no}</span>'}</td>`;
                    html += `</tr>`;
                }
                html += `</tbody></table>`;
            }

            // Diagnostics aufklappbar
            if (diagnostics) {
                html += `<details style="margin-top:8px"><summary style="cursor:pointer;font-size:11px;color:var(--text-muted)">Diagnostics anzeigen</summary>`;
                html += `<pre style="font-family:var(--mono);font-size:10px;white-space:pre-wrap;max-height:200px;overflow-y:auto;margin-top:4px;color:var(--text-secondary)">${escapeHtml(diagnostics)}</pre>`;
                html += `</details>`;
            }

            html += `</div>`; // /governance-card
        }

        html += `</div>`; // /dtab-governance
    }

    // ════════════════════════════════════════════
    // Tab 5: Raw Data
    // ════════════════════════════════════════════
    html += `<div class="detail-tab-content" id="dtab-raw">`;

    // Test-Definition JSON
    html += `<div class="raw-section">`;
    html += `<h4>Test-Definition</h4>`;
    if (testCase?.jbe_definitionjson) {
        try {
            const defObj = JSON.parse(testCase.jbe_definitionjson);
            html += `<div class="raw-json">${escapeHtml(JSON.stringify(defObj, null, 2))}</div>`;
        } catch {
            html += `<div class="raw-json">${escapeHtml(testCase.jbe_definitionjson)}</div>`;
        }
    } else {
        html += `<div style="color:var(--text-muted);font-size:12px">No definition available.</div>`;
    }
    html += `</div>`;

    // API-Log
    if (steps.length > 0) {
        html += `<div class="raw-section">`;
        html += `<h4>API-Log (chronologisch)</h4>`;
        html += `<table style="width:100%;font-size:11px;border-collapse:collapse;font-family:var(--mono)">`;
        html += `<thead><tr><th style="text-align:left;padding:2px 6px;color:var(--text-muted)">#</th><th style="text-align:left;padding:2px 6px;color:var(--text-muted)">Aktion</th><th style="text-align:left;padding:2px 6px;color:var(--text-muted)">Entity</th><th style="text-align:left;padding:2px 6px;color:var(--text-muted)">Status</th><th style="text-align:right;padding:2px 6px;color:var(--text-muted)">Duration</th></tr></thead><tbody>`;
        for (const s of steps) {
            const statusLabel = s.jbe_stepstatus === 105710000 ? "OK" : s.jbe_stepstatus === 105710001 ? "FAIL" : "SKIP";
            const statusColor = s.jbe_stepstatus === 105710000 ? "var(--accent-green)" : s.jbe_stepstatus === 105710001 ? "var(--accent-red)" : "var(--text-muted)";
            html += `<tr>`;
            html += `<td style="padding:2px 6px">${s.jbe_stepnumber || ""}</td>`;
            html += `<td style="padding:2px 6px">${escapeHtml(s.jbe_action || "")}</td>`;
            html += `<td style="padding:2px 6px">${escapeHtml((s.jbe_entity || "").replace(/^\w+_/, ""))}</td>`;
            html += `<td style="padding:2px 6px;color:${statusColor}">${statusLabel}</td>`;
            html += `<td style="padding:2px 6px;text-align:right">${s.jbe_durationms ? (s.jbe_durationms / 1000).toFixed(1) + "s" : ""}</td>`;
            html += `</tr>`;
        }
        html += `</tbody></table>`;
        html += `</div>`;
    }

    // Error Dump
    if (!isPassed && result.jbe_errormessage) {
        html += `<div class="raw-section">`;
        html += `<h4>Error Dump</h4>`;
        html += `<div class="raw-json" style="color:var(--accent-red)">${escapeHtml(result.jbe_errormessage)}</div>`;
        html += `</div>`;
    }

    html += `</div>`; // /dtab-raw

    container.innerHTML = html;

    // Tab-State wiederherstellen (falls vorher ein anderer Tab aktiv war)
    if (_detailActiveTab !== "overview") {
        // Pruefen ob der Tab existiert (Governance koennte fehlen)
        const tabEl = container.querySelector(`.detail-tab[data-tab="${_detailActiveTab}"]`);
        if (tabEl) {
            _detailSwitchTab(_detailActiveTab);
        } else {
            _detailActiveTab = "overview";
        }
    }
}

// Cleanup test records for a run (keeprecords=true -> manual cleanup)
// Einzeltest-Cleanup via jbe_trackedrecords (oder Fallback Steps)
window._cleanupTestRecords = async function(resultId, btn) {
    if (!confirm("Delete test data for this test?")) return;
    if (btn) { btn.disabled = true; btn.textContent = "Delete..."; }
    try {
        // Versuche zuerst tracked records aus jbe_trackedrecords
        const result = await API.getOne("jbe_testrunresults", resultId, "jbe_trackedrecords");
        let records = [];
        try { records = JSON.parse(result?.jbe_trackedrecords || "[]"); } catch {}

        if (records.length === 0) {
            // Fallback: aus Steps lesen
            const steps = await API.getMany("jbe_teststeps",
                `$filter=_jbe_testrunresultid_value eq '${resultId}' and jbe_recordid ne null and jbe_recordid ne ''&$select=jbe_entity,jbe_recordid,jbe_action&$orderby=jbe_stepnumber desc`);
            records = steps.filter(s => s.jbe_action !== "DeleteRecord" && s.jbe_recordid && s.jbe_entity)
                .map(s => ({ entity: s.jbe_entity, id: s.jbe_recordid }));
        }

        let deleted = 0;
        // Reverse Order (Contacts vor Accounts)
        for (const rec of [...records].reverse()) {
            try {
                await API.del(rec.entity, rec.id);
                deleted++;
                if (btn) btn.textContent = `${deleted}/${records.length} deleted...`;
            } catch (e) {
                JBELog.warn("Cleanup", `  ${rec.entity} ${rec.id}: ${e.message}`);
            }
        }
        // Tracked records leeren
        try { await API.update("jbe_testrunresults", resultId, { jbe_trackedrecords: "[]" }); } catch {}
        if (btn) { btn.textContent = `${deleted} records deleted`; btn.style.color = "var(--accent-green)"; }
    } catch (err) {
        if (btn) { btn.textContent = "Error: " + err.message; btn.style.color = "var(--accent-red)"; }
    }
};

window.cleanupRunRecords = async function(runId) {
    if (!confirm("Alle Testdaten dieses Laufs cleanup?")) return;
    JBELog.info("Cleanup", `Manual cleanup for run ${runId}`);
    try {
        // Lade alle Steps mit RecordIds
        const results = await API.getMany("jbe_testrunresults",
            `$filter=_jbe_testrunid_value eq '${runId}'&$select=jbe_testrunresultid`);
        let deleted = 0;
        for (const r of results) {
            const steps = await API.getMany("jbe_teststeps",
                `$filter=_jbe_testrunresultid_value eq '${r.jbe_testrunresultid}' and jbe_recordid ne null and jbe_recordid ne ''&$select=jbe_entity,jbe_recordid,jbe_action&$orderby=jbe_stepnumber desc`);
            for (const s of steps) {
                if (s.jbe_action === "DeleteRecord" || !s.jbe_recordid || !s.jbe_entity) continue;
                try {
                    await API.del(s.jbe_entity, s.jbe_recordid);
                    JBELog.info("Cleanup", `  Deleted: ${s.jbe_entity} ${s.jbe_recordid}`);
                    deleted++;
                } catch (e) {
                    JBELog.warn("Cleanup", `  Error: ${s.jbe_entity} ${s.jbe_recordid} - ${e.message}`);
                }
            }
        }
        // Update Run: keeprecords auf false setzen
        await API.update("jbe_testruns", runId, { jbe_keeprecords: false });
        const bar = document.getElementById("run-cleanup-bar");
        if (bar) bar.innerHTML = `<span style="color:var(--accent-green);font-size:13px">${deleted} Testdaten-Records cleaned up.</span>`;
        JBELog.info("Cleanup", `Fertig: ${deleted} records deleted`);
    } catch (err) {
        showError("Cleanup fehlgeschlagen", err.message);
    }
};

// Show flow visualization for a specific test in a run
window.showTestFlow = async function(testId, runId) {
    const container = "#run-flow-container";
    $(container).innerHTML = `<div class="card"><div class="card-title">Flow: ${escapeHtml(testId)}</div><div id="run-flow-viz">Loading test case definition...</div></div>`;

    try {
        // Load the test case definition
        const cases = await API.getMany("jbe_testcases",
            `$select=jbe_testid,jbe_definitionjson&$filter=jbe_testid eq '${testId}'&$top=1`);

        // Load the assertion results for this test in this run
        const results = await API.getMany("jbe_testrunresults",
            `$select=jbe_assertionresults&$filter=jbe_testid eq '${testId}' and _jbe_testrunid_value eq '${runId}'&$top=1`);

        if (cases.length > 0 && cases[0].jbe_definitionjson) {
            let assertionResults = null;
            if (results.length > 0 && results[0].jbe_assertionresults) {
                try { assertionResults = JSON.parse(results[0].jbe_assertionresults); } catch {}
            }

            const nodes = FlowViz.parseDefinition(cases[0].jbe_definitionjson, assertionResults);
            FlowViz.renderSvg(nodes, "#run-flow-viz");
        } else {
            $("#run-flow-viz").innerHTML = `<div class="empty-state">Test case definition for ${escapeHtml(testId)} not found.</div>`;
        }
    } catch (err) {
        $("#run-flow-viz").innerHTML = `<span style="color:var(--accent-red)">${escapeHtml(err.message)}</span>`;
    }
};
