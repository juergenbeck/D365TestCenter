<title>Integration Test Center</title>
<style>
/* ================================================================
   Integration Test Center — Dark Theme, Dashboard-Stil
   ================================================================ */

:root {
    --bg-primary: #1a1b2e;
    --bg-secondary: #242540;
    --bg-tertiary: #2d2e4a;
    --bg-card: #2a2b45;
    --bg-input: #1e1f38;
    --border: #3a3b5c;
    --text-primary: #e8e8f0;
    --text-secondary: #a0a0b8;
    --text-muted: #6c6c88;
    --accent-green: #4caf50;
    --accent-green-bg: rgba(76,175,80,0.12);
    --accent-red: #f44336;
    --accent-red-bg: rgba(244,67,54,0.12);
    --accent-yellow: #ff9800;
    --accent-yellow-bg: rgba(255,152,0,0.12);
    --accent-blue: #42a5f5;
    --accent-blue-bg: rgba(66,165,245,0.12);
    --accent-purple: #ab47bc;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: var(--font);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
}

/* ── Layout ──────────────────────────────────────────── */

#app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
}

#app-header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent-blue);
    letter-spacing: 0.5px;
}

#app-header .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
}

#app-nav {
    display: flex;
    gap: 4px;
    padding: 8px 24px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
}

#app-nav a {
    color: var(--text-secondary);
    text-decoration: none;
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
}

#app-nav a:hover { background: var(--bg-tertiary); color: var(--text-primary); }
#app-nav a.active { background: var(--accent-blue-bg); color: var(--accent-blue); }

#app-content {
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
}

/* ── Cards ───────────────────────────────────────────── */

.card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
}

.card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 16px;
}

/* ── KPI Tiles ───────────────────────────────────────── */

.kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
}

.kpi-tile {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    box-shadow: var(--shadow);
}

.kpi-tile .kpi-value {
    font-size: 36px;
    font-weight: 700;
    line-height: 1.1;
}

.kpi-tile .kpi-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.kpi-green .kpi-value { color: var(--accent-green); }
.kpi-blue .kpi-value { color: var(--accent-blue); }
.kpi-red .kpi-value { color: var(--accent-red); }
.kpi-yellow .kpi-value { color: var(--accent-yellow); }

/* ── Tables ──────────────────────────────────────────── */

.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

.data-table th {
    text-align: left;
    padding: 10px 12px;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 2px solid var(--border);
}

.data-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
}

.data-table tr:hover td { background: var(--bg-tertiary); }
.data-table tr:last-child td { border-bottom: none; }

/* ── Badges ──────────────────────────────────────────── */

.badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
}

.badge-passed { background: var(--accent-green-bg); color: var(--accent-green); }
.badge-failed { background: var(--accent-red-bg); color: var(--accent-red); }
.badge-error { background: var(--accent-yellow-bg); color: var(--accent-yellow); }
.badge-skipped { background: rgba(108,108,136,0.2); color: var(--text-muted); }
.badge-running { background: var(--accent-blue-bg); color: var(--accent-blue); }
.badge-active { background: var(--accent-green-bg); color: var(--accent-green); }
.badge-disabled { background: rgba(108,108,136,0.2); color: var(--text-muted); }

/* ── Buttons ─────────────────────────────────────────── */

.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
}

.btn:hover { background: var(--border); }
.btn-primary { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
.btn-primary:hover { background: #1e88e5; }
.btn-danger { background: var(--accent-red); border-color: var(--accent-red); color: #fff; }
.btn-danger:hover { background: #e53935; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Forms ───────────────────────────────────────────── */

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }

.form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-size: 13px;
    font-family: var(--font);
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent-blue);
}

.form-textarea { font-family: var(--mono); font-size: 12px; resize: vertical; min-height: 200px; }

/* ── Progress Bar ────────────────────────────────────── */

.progress-bar {
    width: 100%;
    height: 8px;
    background: var(--bg-input);
    border-radius: 4px;
    overflow: hidden;
    margin: 12px 0;
}

.progress-bar-fill {
    height: 100%;
    background: var(--accent-blue);
    border-radius: 4px;
    transition: width 0.5s ease;
}

.progress-bar-fill.success { background: var(--accent-green); }
.progress-bar-fill.error { background: var(--accent-red); }

/* ── Log Output ──────────────────────────────────────── */

.log-output {
    background: #0d0e1a;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
}

.log-output .log-ok { color: var(--accent-green); }
.log-output .log-fail { color: var(--accent-red); }
.log-output .log-warn { color: var(--accent-yellow); }
.log-output .log-info { color: var(--text-secondary); }
.log-output .log-time { color: var(--text-muted); }

/* ── JSON Editor ─────────────────────────────────────── */

.json-editor-wrapper {
    position: relative;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
}

.json-editor {
    width: 100%;
    min-height: 300px;
    padding: 16px;
    background: #0d0e1a;
    color: #d4d4d4;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    border: none;
    resize: vertical;
    tab-size: 2;
}

.json-editor:focus { outline: none; }

.json-error {
    padding: 8px 16px;
    background: var(--accent-red-bg);
    color: var(--accent-red);
    font-size: 12px;
    font-family: var(--mono);
}

.json-valid {
    padding: 8px 16px;
    background: var(--accent-green-bg);
    color: var(--accent-green);
    font-size: 12px;
}

/* ── Split View ──────────────────────────────────────── */

.split-view {
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 16px;
}

@media (max-width: 900px) {
    .split-view { grid-template-columns: 1fr; }
}

/* ── Live Run View ───────────────────────────────────── */

.live-run-header {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 16px 20px; background: var(--bg-card); border-radius: 8px;
    margin-bottom: 16px; border: 1px solid var(--border);
}
.live-run-header .run-title { font-size: 18px; font-weight: 600; white-space: nowrap; }
.live-run-header .run-counters { display: flex; gap: 12px; font-size: 14px; }
.live-run-header .run-counters span { font-weight: 600; }
.live-run-header .run-eta { color: var(--text-secondary); font-size: 13px; margin-left: auto; }
.live-run-header .run-actions { display: flex; gap: 8px; }
.live-progress { width: 100%; height: 6px; background: var(--bg-tertiary); border-radius: 3px; margin-top: 8px; }
.live-progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.live-progress-fill.mixed { background: linear-gradient(90deg, var(--accent-green) var(--pass-pct), var(--accent-red) var(--pass-pct)); }
.live-progress-fill.all-pass { background: var(--accent-green); }

.live-split {
    display: grid; grid-template-columns: 340px 1fr; gap: 16px;
    min-height: calc(100vh - 240px);
}
@media (max-width: 900px) { .live-split { grid-template-columns: 1fr; } }

.live-list {
    background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
}
.live-list-toolbar {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.live-list-toolbar input {
    flex: 1; min-width: 80px; padding: 5px 8px; font-size: 12px;
    background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-primary); outline: none;
}
.filter-chips { display: flex; gap: 4px; }
.filter-chip {
    padding: 3px 10px; font-size: 11px; border-radius: 12px; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--text-secondary);
    transition: all 0.15s;
}
.filter-chip:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
.filter-chip.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }

.live-list-items { flex: 1; overflow-y: auto; }
.live-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px;
    border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s;
}
.live-item:hover { background: var(--bg-tertiary); }
.live-item.selected { background: rgba(59,130,246,0.12); border-left: 3px solid var(--accent-blue); }
.live-item-dot {
    width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0;
}
.live-item-dot.pending { background: var(--text-muted); opacity: 0.4; }
.live-item-dot.running { background: var(--accent-blue); animation: pulse-dot 1.2s infinite; }
.live-item-dot.passed { background: var(--accent-green); }
.live-item-dot.failed { background: var(--accent-red); }
@keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
}
.live-item-body { flex: 1; min-width: 0; }
.live-item-top { display: flex; justify-content: space-between; align-items: baseline; }
.live-item-id { font-weight: 600; font-size: 13px; }
.live-item-dur { font-size: 11px; color: var(--text-secondary); }
.live-item-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.live-item-sub.error-hint { color: var(--accent-red); }
.live-item-sub.running-hint { color: var(--accent-blue); }

.live-detail {
    background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border);
    overflow-y: auto; padding: 0;
}
.live-detail-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 12px;
}
.live-detail-header h3 { margin: 0; font-size: 16px; }
.live-detail-section { border-bottom: 1px solid var(--border); }
.live-detail-section:last-child { border-bottom: none; }
.live-detail-toggle {
    display: flex; align-items: center; gap: 8px; padding: 10px 16px;
    cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-secondary);
    user-select: none;
}
.live-detail-toggle:hover { color: var(--text-primary); }
.live-detail-toggle .arrow { transition: transform 0.2s; }
.live-detail-toggle.open .arrow { transform: rotate(90deg); }
.live-detail-content { padding: 0 16px 12px; }
.live-detail-content.collapsed { display: none; }

.step-row {
    display: flex; align-items: center; gap: 8px; padding: 4px 0;
    font-size: 12px; font-family: var(--font-mono);
}
.step-icon { width: 18px; text-align: center; flex-shrink: 0; }
.step-icon.ok { color: var(--accent-green); }
.step-icon.fail { color: var(--accent-red); }
.step-icon.skip { color: var(--text-muted); }
.step-action { color: var(--accent-blue); }
.step-entity { color: var(--text-secondary); }
.step-dur { margin-left: auto; color: var(--text-muted); font-size: 11px; }
.step-governance { padding-left: 26px; font-size: 11px; color: var(--accent-purple); }

.assert-table { width: 100%; font-size: 12px; border-collapse: collapse; }
.assert-table th { text-align: left; font-weight: 600; padding: 4px 8px; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
.assert-table td { padding: 4px 8px; }
.assert-table tr.passed td { color: var(--text-secondary); }
.assert-table tr.failed td { color: var(--accent-red); }
.assert-table tr.failed td:nth-child(3) { text-decoration: line-through; opacity: 0.6; }
.assert-table tr.failed td:nth-child(4) { font-weight: 600; }

.governance-detail { font-size: 12px; font-family: var(--font-mono); }
.governance-detail .gov-line { padding: 2px 0; }
.governance-detail .gov-label { color: var(--accent-purple); }
.governance-detail .gov-value { color: var(--text-primary); }

/* ── Charts (SVG) ────────────────────────────────────── */

.chart-container { text-align: center; padding: 16px 0; }
.chart-container svg { max-width: 100%; }

/* ── Inline Grid ─────────────────────────────────────── */

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* ── Assertion Detail ────────────────────────────────── */

.assertion-row { padding: 8px 0; border-bottom: 1px solid var(--border); }
.assertion-row:last-child { border-bottom: none; }
.assertion-passed { border-left: 3px solid var(--accent-green); padding-left: 12px; }
.assertion-failed { border-left: 3px solid var(--accent-red); padding-left: 12px; }

/* ── Tags ────────────────────────────────────────────── */

.tag {
    display: inline-block;
    padding: 1px 6px;
    background: var(--bg-tertiary);
    border-radius: 3px;
    font-size: 11px;
    color: var(--text-secondary);
    margin-right: 4px;
}

/* ── Empty State ─────────────────────────────────────── */

.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
}

.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }

/* ── Toolbar ─────────────────────────────────────────── */

.toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

.toolbar .search-input {
    flex: 1;
    min-width: 200px;
}

/* ── Checkbox ────────────────────────────────────────── */

.checkbox-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
}

.checkbox-label input { accent-color: var(--accent-blue); }

/* ── Scrollbar ───────────────────────────────────────── */

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Timeline Chart ──────────────────────────────────── */

.timeline-bar {
    display: inline-block;
    height: 20px;
    border-radius: 3px;
    margin-right: 4px;
    vertical-align: middle;
    min-width: 4px;
}

/* -- Flow Visualizer --------------------------------------------------------- */

.flow-container {
    overflow-x: auto;
    padding: 24px 0;
}

.flow-svg text { font-family: var(--font); }

.flow-node {
    cursor: pointer;
    transition: opacity 0.15s;
}

.flow-node:hover { opacity: 0.85; }

.flow-detail-panel {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 16px;
    font-size: 13px;
}

.flow-detail-panel .detail-title {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 8px;
}

.flow-detail-panel .detail-fields {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 4px 12px;
    font-size: 12px;
}

.flow-detail-panel .detail-fields dt {
    color: var(--text-muted);
    font-weight: 500;
}

.flow-detail-panel .detail-fields dd {
    color: var(--text-primary);
    font-family: var(--mono);
    font-size: 11px;
    word-break: break-all;
}

.flow-legend {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--text-secondary);
    flex-wrap: wrap;
}

.flow-legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.flow-legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    display: inline-block;
}

/* ── Tabs inside a card ──────────────────────────────── */

.card-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    border-bottom: 2px solid var(--border);
}

.card-tabs button {
    padding: 8px 16px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
}

.card-tabs button:hover { color: var(--text-primary); }
.card-tabs button.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

/* ── Help System ─────────────────────────────────────── */

.help-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 24px;
    min-height: calc(100vh - 140px);
}

@media (max-width: 900px) { .help-layout { grid-template-columns: 1fr; } }

.help-sidebar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    position: sticky;
    top: 100px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
}

.help-sidebar .help-search {
    width: 100%;
    margin-bottom: 12px;
}

.help-nav-group { margin-bottom: 12px; }

.help-nav-group-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 8px;
}

.help-nav-item {
    display: block;
    padding: 6px 12px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.1s;
}

.help-nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.help-nav-item.active { background: var(--accent-blue-bg); color: var(--accent-blue); font-weight: 500; }

.help-content { max-width: 800px; }

.help-content h2 {
    font-size: 22px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
}

.help-content h3 {
    font-size: 16px;
    color: var(--accent-blue);
    margin: 24px 0 8px 0;
}

.help-content h4 {
    font-size: 14px;
    color: var(--text-secondary);
    margin: 16px 0 6px 0;
}

.help-content p {
    margin-bottom: 12px;
    line-height: 1.7;
    color: var(--text-secondary);
}

.help-content ul, .help-content ol {
    margin: 8px 0 16px 20px;
    color: var(--text-secondary);
    line-height: 1.7;
}

.help-content li { margin-bottom: 4px; }

.help-content code {
    background: var(--bg-input);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent-blue);
}

.help-content pre {
    background: #0d0e1a;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin: 8px 0 16px 0;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    color: #d4d4d4;
}

.help-content .help-tip {
    background: var(--accent-blue-bg);
    border-left: 3px solid var(--accent-blue);
    padding: 12px 16px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 12px 0;
    font-size: 13px;
    color: var(--text-secondary);
}

.help-content .help-warning {
    background: var(--accent-yellow-bg);
    border-left: 3px solid var(--accent-yellow);
    padding: 12px 16px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 12px 0;
    font-size: 13px;
    color: var(--text-secondary);
}

.help-content .help-table {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0 16px 0;
    font-size: 13px;
}

.help-content .help-table th {
    text-align: left;
    padding: 8px 12px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 12px;
}

.help-content .help-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
}

.help-role-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    margin-left: 6px;
}

.help-role-tester { background: var(--accent-green-bg); color: var(--accent-green); }
.help-role-dev { background: var(--accent-blue-bg); color: var(--accent-blue); }
.help-role-admin { background: var(--accent-yellow-bg); color: var(--accent-yellow); }

.help-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.help-btn:hover { background: var(--accent-blue-bg); color: var(--accent-blue); border-color: var(--accent-blue); }

/* -- Metadata Explorer ---------------------------------------------------- */

.meta-tabs { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
.meta-tabs button { padding: 8px 16px; background: transparent; border: none; color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.meta-tabs button:hover { color: var(--text-primary); }
.meta-tabs button.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

.meta-detail { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 16px; }

.copy-btn {
    display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border: 1px solid var(--border);
    border-radius: 3px; background: var(--bg-input); color: var(--text-muted); font-size: 11px; cursor: pointer;
    font-family: var(--mono); transition: all 0.15s;
}
.copy-btn:hover { background: var(--accent-blue-bg); color: var(--accent-blue); border-color: var(--accent-blue); }
.copy-btn.copied { background: var(--accent-green-bg); color: var(--accent-green); border-color: var(--accent-green); }

.meta-type-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
.meta-type-string { background: rgba(66,165,245,0.15); color: #42a5f5; }
.meta-type-int { background: rgba(171,71,188,0.15); color: #ab47bc; }
.meta-type-bool { background: rgba(76,175,80,0.15); color: #4caf50; }
.meta-type-datetime { background: rgba(255,152,0,0.15); color: #ff9800; }
.meta-type-lookup { background: rgba(255,87,34,0.15); color: #ff5722; }
.meta-type-optionset { background: rgba(0,188,212,0.15); color: #00bcd4; }
.meta-type-money { background: rgba(255,235,59,0.15); color: #fdd835; }
.meta-type-memo { background: rgba(66,165,245,0.15); color: #42a5f5; }
.meta-type-other { background: rgba(108,108,136,0.15); color: var(--text-muted); }

.meta-snippet { background: #0d0e1a; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; font-family: var(--mono); font-size: 12px; color: #d4d4d4; margin-top: 8px; position: relative; white-space: pre-wrap; }
.meta-snippet .copy-btn { position: absolute; top: 8px; right: 8px; }

.meta-optionset-list { margin: 4px 0 0 12px; }
.meta-optionset-list li { font-size: 12px; color: var(--text-secondary); list-style: none; padding: 2px 0; }
.meta-optionset-list li code { background: var(--bg-input); padding: 0 4px; border-radius: 2px; color: var(--accent-purple); }

/* ── Run Cards (Verlauf) ────────────────────────────── */

.run-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
}
.run-card:hover { border-color: var(--accent-blue); }

.run-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    gap: 8px;
    flex-wrap: wrap;
}
.run-card-date { font-weight: 600; font-size: 13px; white-space: nowrap; }
.run-card-filter { font-size: 12px; color: var(--text-secondary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.run-card-duration { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

.run-card-bar {
    height: 4px;
    border-radius: 2px;
    display: flex;
    overflow: hidden;
    margin-bottom: 8px;
    background: var(--bg-tertiary);
}
.run-card-bar-pass { background: var(--accent-green); }
.run-card-bar-fail { background: var(--accent-red); }

.run-card-stats {
    font-size: 12px;
    display: flex;
    gap: 16px;
}
.stat-pass { color: var(--accent-green); }
.stat-fail { color: var(--accent-red); }
.stat-total { color: var(--text-secondary); }
.stat-rate { color: var(--accent-blue); font-weight: 600; }

/* ── Sparkline Card ─────────────────────────────────── */

.sparkline-card { text-align: center; }
.sparkline-rates { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* ── Insight Cards ──────────────────────────────────── */

.insight-link {
    color: var(--accent-red);
    text-decoration: none;
    font-size: 13px;
    display: block;
    padding: 2px 0;
}
.insight-link:hover { text-decoration: underline; }

.flaky-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 0;
    font-size: 13px;
}
.flaky-name { color: var(--accent-yellow); }
.flaky-count { color: var(--text-muted); font-size: 12px; }

/* ── Timeline Chart (Verlauf) ───────────────────────── */

.timeline-chart-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    overflow-x: auto;
}

@media (max-width: 900px) {
    .grid-3 { grid-template-columns: 1fr; }
}

/* ── Detail-Panel Tabs (v2.0) ──────────────────────────────────── */

/* Tab-Leiste */
.detail-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
.detail-tab { padding: 8px 16px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; font-size: 13px; font-weight: 500; transition: all 0.2s; }
.detail-tab:hover { color: var(--text-primary); }
.detail-tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
.detail-tab-content { display: none; }
.detail-tab-content.active { display: block; }

/* Ueberblick Bento-Grid */
.detail-bento { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.detail-result-card { background: var(--bg-tertiary); border-radius: var(--radius); padding: 16px; text-align: center; }
.detail-result-card .result-badge { font-size: 24px; font-weight: 700; }
.detail-result-card .result-badge.passed { color: var(--accent-green); }
.detail-result-card .result-badge.failed { color: var(--accent-red); }
.detail-result-card .result-duration { font-size: 18px; color: var(--text-secondary); margin-top: 4px; }
.detail-result-card .result-error { font-size: 11px; color: var(--accent-red); margin-top: 8px; max-height: 60px; overflow: hidden; }
.detail-meta-card { background: var(--bg-tertiary); border-radius: var(--radius); padding: 12px 16px; }
.detail-meta-card h4 { font-size: 14px; margin-bottom: 8px; }
.detail-meta-card .meta-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; font-size: 12px; color: var(--text-secondary); }
.detail-meta-card .meta-label { color: var(--text-muted); min-width: 70px; }
.tag-chip { display: inline-block; background: var(--bg-input); border-radius: 4px; padding: 1px 6px; font-size: 11px; color: var(--text-secondary); margin-right: 4px; }
.story-link { color: var(--accent-blue); text-decoration: none; font-size: 12px; }
.story-link:hover { text-decoration: underline; }

/* Phase-Summary */
.phase-summary { width: 100%; font-size: 12px; border-collapse: collapse; }
.phase-summary td { padding: 4px 8px; }
.phase-summary tr { cursor: pointer; border-radius: 4px; }
.phase-summary tr:hover { background: var(--bg-tertiary); }
.phase-summary .phase-name { font-weight: 500; }
.phase-summary .phase-count { color: var(--accent-green); }
.phase-summary .phase-count.has-fail { color: var(--accent-red); }
.phase-summary .phase-dur { color: var(--text-muted); text-align: right; }

/* Timeline SVG */
.timeline-bar { width: 100%; height: 32px; margin-bottom: 12px; border-radius: 4px; overflow: hidden; background: var(--bg-input); }
.timeline-bar rect { cursor: pointer; }
.timeline-tooltip { position: absolute; background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 11px; pointer-events: none; z-index: 100; }

/* Step-Gruppen */
.step-group { margin-bottom: 8px; }
.step-group-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; background: var(--bg-tertiary); border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; }
.step-group-header:hover { background: var(--bg-input); }
.step-group-header .group-status { font-size: 11px; }
.step-group-header .group-status.all-ok { color: var(--accent-green); }
.step-group-header .group-status.has-fail { color: var(--accent-red); }
.step-group-body { padding-left: 8px; border-left: 2px solid var(--border); margin-left: 8px; }
.step-row-expandable { cursor: pointer; }
.step-row-expandable:hover { background: var(--bg-tertiary); border-radius: 4px; }
.step-expand-content { padding: 4px 8px 8px 26px; font-size: 11px; color: var(--text-secondary); background: var(--bg-input); border-radius: 0 0 4px 4px; margin-bottom: 2px; }
.step-expand-content pre { font-family: var(--mono); font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 150px; overflow-y: auto; }

/* Assertion Cards */
.assertion-card { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
.assertion-card.passed { border-left: 3px solid var(--accent-green); }
.assertion-card.failed { border-left: 3px solid var(--accent-red); }
.assertion-card-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: 12px; font-weight: 500; }
.assertion-card-header .assert-badge { font-weight: 700; }
.assertion-card-header .assert-badge.pass { color: var(--accent-green); }
.assertion-card-header .assert-badge.fail { color: var(--accent-red); }
.assertion-card-body { padding: 6px 12px 10px; font-size: 12px; border-top: 1px solid var(--border); }
.assertion-card-body .assert-row { display: flex; gap: 8px; margin-bottom: 2px; }
.assertion-card-body .assert-label { color: var(--text-muted); min-width: 80px; }
.assertion-card-body .assert-value { font-family: var(--mono); }
.assertion-card-body .assert-value.expected-fail { text-decoration: line-through; color: var(--accent-red); opacity: 0.6; }
.assertion-card-body .assert-value.actual-fail { font-weight: 700; color: var(--accent-red); }
.assertion-hint { margin-top: 6px; padding: 6px 8px; background: var(--accent-yellow-bg); border-radius: 4px; font-size: 11px; color: var(--accent-yellow); }

/* Governance Cards */
.governance-card { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; padding: 12px; }
.governance-card-header { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
.governance-stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.governance-stat-value { font-weight: 600; color: var(--text-primary); }
.decision-table { width: 100%; font-size: 11px; border-collapse: collapse; }
.decision-table th { text-align: left; padding: 3px 6px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); }
.decision-table td { padding: 3px 6px; }
.source-chip { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
.source-chip.pisa { background: rgba(171,71,188,0.2); color: var(--accent-purple); }
.source-chip.dynamics { background: var(--accent-blue-bg); color: var(--accent-blue); }
.source-chip.platform { background: var(--accent-green-bg); color: var(--accent-green); }

/* Raw Data */
.raw-section { margin-bottom: 12px; }
.raw-section h4 { font-size: 13px; margin-bottom: 6px; color: var(--text-secondary); }
.raw-json { background: var(--bg-input); border-radius: var(--radius); padding: 12px; font-family: var(--mono); font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; color: var(--text-secondary); }

/* Aktions-Buttons im Ueberblick */
.detail-actions { display: flex; gap: 8px; margin-top: 12px; }
.detail-actions .btn { font-size: 11px; padding: 4px 12px; }

/* ====== Visual Editor: CSS ====== */

/* Modus-Leiste (Visuell / JSON / Flow) */
.ve-mode-bar {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    border-bottom: 2px solid var(--border);
}
.ve-mode-btn {
    padding: 8px 18px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
}
.ve-mode-btn:hover { color: var(--text-primary); }
.ve-mode-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

/* Kompakte Metadaten-Zeile */
.ve-meta-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    padding: 12px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
}
.ve-meta-row .form-group { margin-bottom: 0; flex: 0 0 auto; }
.ve-meta-row .form-input,
.ve-meta-row .form-select { padding: 5px 8px; font-size: 12px; }
.ve-meta-row label.form-label { margin-bottom: 2px; font-size: 11px; }

/* 3+1 Spalten Layout */
.ve-layout {
    display: grid;
    grid-template-columns: 280px 280px 280px 1fr;
    gap: 12px;
    min-height: 400px;
    align-items: start;
}
@media (max-width: 1100px) {
    .ve-layout { grid-template-columns: 1fr 1fr 1fr; }
    .ve-preview { display: none; }
}
@media (max-width: 760px) {
    .ve-layout { grid-template-columns: 1fr; }
}

/* Spalten */
.ve-column {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    min-height: 300px;
    max-height: calc(100vh - 260px);
}
.ve-column-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
.ve-column-header .ve-count {
    background: var(--bg-tertiary);
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    color: var(--text-muted);
}
.ve-column-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
}

/* Editor-Cards */
.ve-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    transition: border-color 0.15s, box-shadow 0.15s;
}
.ve-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.ve-card.valid { border-left-color: var(--accent-green); }
.ve-card.warning { border-left-color: var(--accent-yellow); }
.ve-card.error { border-left-color: var(--accent-red); }
.ve-card.dragging { opacity: 0.5; }

.ve-card-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 500;
}
.ve-card-header .ve-drag-handle {
    cursor: grab;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1;
    user-select: none;
    flex-shrink: 0;
}
.ve-card-header .ve-drag-handle:active { cursor: grabbing; }
.ve-card-header .ve-card-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ve-card-header .ve-card-delete {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 14px; padding: 0 2px; transition: color 0.15s; flex-shrink: 0;
}
.ve-card-header .ve-card-delete:hover { color: var(--accent-red); }

.ve-card-body { padding: 8px 10px; }

/* Entity-Badges */
.ve-entity-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    flex-shrink: 0;
}
.ve-entity-badge.account { background: var(--accent-blue-bg); color: var(--accent-blue); }
.ve-entity-badge.contact { background: var(--accent-green-bg); color: var(--accent-green); }
.ve-entity-badge.contactsource { background: rgba(171,71,188,0.15); color: var(--accent-purple); }
.ve-entity-badge.other { background: var(--bg-tertiary); color: var(--text-secondary); }

/* Feld-Grid innerhalb einer Card */
.ve-field-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
}
.ve-field-name {
    flex: 0 0 45%;
    min-width: 0;
}
.ve-field-name select,
.ve-field-name input {
    width: 100%;
    padding: 3px 6px;
    font-size: 11px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-primary);
}
.ve-field-value {
    flex: 1;
    min-width: 0;
}
.ve-field-value input,
.ve-field-value select {
    width: 100%;
    padding: 3px 6px;
    font-size: 11px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-primary);
}
.ve-field-value input:focus,
.ve-field-value select:focus,
.ve-field-name select:focus,
.ve-field-name input:focus { outline: none; border-color: var(--accent-blue); }
.ve-field-remove {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 12px; padding: 0 2px; flex-shrink: 0; transition: color 0.15s;
}
.ve-field-remove:hover { color: var(--accent-red); }
.ve-field-add {
    background: none; border: 1px dashed var(--border); border-radius: 3px;
    color: var(--text-muted); cursor: pointer; font-size: 11px;
    padding: 3px 8px; margin-top: 4px; width: 100%; text-align: center;
    transition: all 0.15s;
}
.ve-field-add:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

/* Alias-Input */
.ve-alias-input {
    padding: 2px 6px;
    font-size: 11px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--accent-blue);
    font-family: var(--mono);
    width: 80px;
}
.ve-alias-input:focus { outline: none; border-color: var(--accent-blue); }

/* Hinzufügen-Menü */
.ve-add-menu {
    position: absolute;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    z-index: 50;
    min-width: 180px;
    padding: 4px 0;
}
.ve-add-menu-item {
    display: block;
    width: 100%;
    padding: 7px 14px;
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 12px;
    text-align: left;
    cursor: pointer;
    transition: background 0.1s;
}
.ve-add-menu-item:hover { background: var(--bg-tertiary); }
.ve-add-menu-item .ve-menu-desc {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 1px;
}
.ve-add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%;
    padding: 8px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
}
.ve-add-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

/* Autocomplete-Popup */
.ve-autocomplete {
    position: absolute;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    z-index: 60;
    max-height: 200px;
    overflow-y: auto;
    min-width: 220px;
}
.ve-autocomplete-category {
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.ve-autocomplete-item {
    display: block;
    width: 100%;
    padding: 4px 10px;
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 12px;
    font-family: var(--mono);
    text-align: left;
    cursor: pointer;
}
.ve-autocomplete-item:hover,
.ve-autocomplete-item.selected { background: var(--accent-blue-bg); color: var(--accent-blue); }

/* Vorlagen-Auswahl */
.ve-template-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    padding: 8px 0;
}
.ve-template-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
}
.ve-template-card:hover { border-color: var(--accent-blue); box-shadow: 0 2px 12px rgba(66,165,245,0.15); }
.ve-template-card .ve-tpl-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.ve-template-card .ve-tpl-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.4; }
.ve-template-card .ve-tpl-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 12px; }

/* Vorschau-Spalte */
.ve-preview {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    min-height: 300px;
    max-height: calc(100vh - 260px);
    overflow: hidden;
}
.ve-preview-header {
    display: flex;
    gap: 2px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
.ve-preview-tab {
    padding: 3px 10px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.1s;
}
.ve-preview-tab:hover { color: var(--text-primary); }
.ve-preview-tab.active { background: var(--bg-tertiary); color: var(--text-primary); }
.ve-preview-body {
    flex: 1;
    overflow: auto;
    padding: 8px;
}
.ve-json-preview {
    font-family: var(--mono);
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-secondary);
    line-height: 1.5;
}

/* Validierungsleiste */
.ve-validation-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-top: 12px;
    font-size: 12px;
}
.ve-validation-bar .ve-val-ok { color: var(--accent-green); }
.ve-validation-bar .ve-val-warn { color: var(--accent-yellow); }
.ve-validation-bar .ve-val-err { color: var(--accent-red); }

/* Drop-Indikator (Drag-and-Drop) */
.ve-insert-zone {
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0.25;
    transition: opacity 0.15s, height 0.15s, border-color 0.15s;
    position: relative;
    border: 1px dashed var(--border-color);
    border-radius: 4px;
    margin: 2px 0;
}
.ve-insert-zone:hover {
    opacity: 1;
    height: 28px;
    border-color: var(--accent-green);
    background: rgba(76, 175, 80, 0.08);
}
.ve-insert-btn {
    font-size: 11px;
    color: var(--accent-blue);
    background: var(--bg-tertiary);
    border: 1px dashed var(--accent-blue);
    border-radius: 3px;
    padding: 0 8px;
    line-height: 16px;
}
.ve-drop-indicator {
    height: 2px;
    background: var(--accent-blue);
    border-radius: 1px;
    margin: 2px 0;
    transition: opacity 0.15s;
}

/* Assertion Live-Text */
.ve-assert-preview {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
    padding: 4px 0 0;
}

/* Checkbox-Zeile in Cards */
.ve-checkbox-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-secondary);
    margin: 4px 0;
}
.ve-checkbox-row input { accent-color: var(--accent-blue); }

/* Wait-Slider */
.ve-wait-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
}
.ve-wait-row input[type="range"] {
    flex: 1;
    accent-color: var(--accent-blue);
}
.ve-wait-row input[type="number"] {
    width: 55px;
    padding: 3px 6px;
    font-size: 11px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-primary);
    text-align: center;
}
.ve-wait-row span { font-size: 11px; color: var(--text-muted); }

/* Ausgegraute automatische Felder */
.ve-field-row.auto-field {
    opacity: 0.5;
}
.ve-field-row.auto-field input,
.ve-field-row.auto-field select { pointer-events: none; }

</style>
</head>
